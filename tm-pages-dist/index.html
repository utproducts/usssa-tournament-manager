        {builtGames&&<span style={{marginLeft:"auto",alignSelf:"center",fontSize:10,color:"#16a34a",fontWeight:600}}>✓ Custom bracket</span>}
      </div>

      {/* ── Builder tab ── */}
      {tab==="build"&&(!bracketCtx?.evId||bracketCtx?.activeDivLabel)&&<BracketBuilderView
        key={bracketCtx?.activeDivLabel||'free'}
        teams={bracketCtx?.activeDivLabel?teams.filter(t=>t.cls===bracketCtx.activeDivLabel):teams}
        games={games} onBuild={onBuild}/>}

      {/* ── Bracket view tab ── */}
      {tab==="view"&&(
        <div>
          {champ&&(
            <div style={{background:"linear-gradient(135deg,#b45309,#f59e0b)",color:"#fff",
              padding:"10px 18px",borderRadius:10,marginBottom:14,display:"flex",
              alignItems:"center",gap:12,boxShadow:"0 4px 14px rgba(0,0,0,.18)"}}>
              <span style={{fontSize:26}}>🏆</span>
              <div>
                <div style={{fontSize:9,fontWeight:700,opacity:.85,textTransform:"uppercase",letterSpacing:1.2}}>Division Champion</div>
                <div style={{fontSize:15,fontWeight:900,marginTop:1}}>{getT(champ)?.name}</div>
              </div>
            </div>
          )}
          {editable&&builtGames&&bracketCtx?.activeDivLabel&&(
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
              <button onClick={saveBracket}
                style={{background:"#16a34a",color:"#fff",border:"none",borderRadius:8,
                  padding:"9px 20px",fontWeight:800,fontSize:13,cursor:"pointer",
                  boxShadow:"0 2px 8px rgba(22,163,74,.35)",display:"flex",alignItems:"center",gap:8}}>
                💾 Save {bracketCtx.activeDivLabel} Bracket &amp; Pick Next Division
              </button>
              <button onClick={()=>{setBuiltGames(null);setBuiltSeeds(null);setTab("build");}}
                style={{background:"#fff",color:"#475569",border:"1px solid #cbd5e1",borderRadius:8,
                  padding:"9px 16px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                ⚙️ Rebuild
              </button>
              {savedBrackets&&Object.keys(savedBrackets).length>0&&(
                <span style={{fontSize:11,color:"#16a34a",fontWeight:700}}>
                  ✓ Done: {Object.keys(savedBrackets).join(" · ")}
                </span>
              )}
            </div>
          )}
          {editable&&<Alrt type="info">✏️ Enter scores on each game to advance teams. Use the Builder tab to set up a new bracket.</Alrt>}
          {/* Round headers */}
          <div style={{display:"flex",marginBottom:6}}>
            {rounds.map((_,ri)=>(
              <div key={ri} style={{width:GW+CONN,flexShrink:0,paddingRight:CONN}}>
                <div style={{textAlign:"center",fontSize:10,fontWeight:800,color:"#fff",
                  background:NAVY,padding:"5px 0",borderRadius:4,textTransform:"uppercase",letterSpacing:.8}}>
                  {rndLabel[ri]||`Round ${ri+1}`}
                </div>
              </div>
            ))}
          </div>
          {/* Bracket canvas */}
          <div style={{overflowX:"auto",paddingBottom:20}}>
            <div style={{position:"relative",width:totalW,height:totalH}}>
              {/* Game slots */}
              {rounds.map((round,ri)=>
                dGames.filter(g=>g.round===round).map((g,pi)=>{
                  if(g.status==="bye") return null; // hide bye slots; pi intact for positioning
                  const t1=getT(g.t1),t2=g.t2?getT(g.t2):null;
                  const w=winOf(g);
                  const isBye=false;
                  const top=GT(ri,pi),left=RX(ri);
                  const teamRow=(side)=>{
                    const isT1=side===1;
                    const tId=isT1?g.t1:g.t2;
                    const t=isT1?t1:t2;
                    const s=isT1?g.s1:g.s2;
                    const sKey=isT1?"s1":"s2";
                    const win=w===tId,lose=!!w&&w!==tId;
                    return(
                      <div style={{display:"flex",alignItems:"center",height:TEAM_H,
                        padding:"0 7px",
                        background:win?"#f0fdf4":lose?"#fff8f8":"#fff",
                        borderTop:isT1?"none":"1px solid #e8ecf0"}}>
                        {/* Seed badge — shown for all rounds using seedMap */}
                        {(()=>{
                          const sn=seedMap[tId];
                          if(!sn)return null;
                          const bg=sn===1?"#b45309":sn===2?"#1d4ed8":sn===3?"#7c3aed":sn<=4?"#0e7490":sn<=8?"#1e3a5f":"#475569";
                          return(
                            <span style={{background:bg,color:"#fff",borderRadius:3,
                              fontSize:8,fontWeight:800,padding:"1px 4px",marginRight:4,
                              flexShrink:0,fontFamily:"monospace",lineHeight:"14px"}}>
                              #{sn}
                            </span>
                          );
                        })()}
                        <span style={{flex:1,fontSize:11,fontWeight:win?700:500,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                          color:lose?"#c0cad8":"#1e293b",
                          textDecoration:lose?"line-through":"none"}}>
                          {t?t.name:(<em style={{color:"#c0cad8",fontSize:10,fontWeight:400}}>TBD</em>)}
                        </span>
                        {editable&&tId&&!isBye?(
                          <input type="number" min="0" value={s??""} placeholder=""
                            style={{width:30,textAlign:"center",fontSize:11,fontWeight:700,
                              border:"1px solid "+(win?"#86efac":"#e2e8f0"),borderRadius:3,
                              padding:"1px 2px",background:win?"#dcfce7":"#f8fafc",
                              color:win?"#15803d":"#334155",outline:"none",flexShrink:0}}
                            onChange={e=>upd(g.id,sKey,e.target.value)}/>
                        ):s!=null?(
                          <span style={{minWidth:22,textAlign:"center",fontWeight:800,fontSize:11,flexShrink:0,
                            background:win?"#16a34a":"transparent",color:win?"#fff":lose?"#d1d5db":"#475569",
                            borderRadius:3,padding:"1px 4px"}}>{s}</span>
                        ):null}
                      </div>
                    );
                  };
                  return(
                    <div key={g.id} style={{position:"absolute",top,left,width:GW,zIndex:2}}>
                      {/* Compact header: game num + date/time/field */}
                      <div style={{height:HDR_H,display:"flex",alignItems:"center",justifyContent:"space-between",
                        padding:"0 7px",background:NAVY,borderRadius:"5px 5px 0 0"}}>
                        <span style={{background:"#0e7490",color:"#fff",borderRadius:3,
                          fontSize:8,fontWeight:800,padding:"1px 5px",fontFamily:"monospace"}}>
                          {displayNum[g.id]||g.num}
                        </span>
                        <span style={{fontSize:8,color:"rgba(255,255,255,.55)",fontWeight:400}}>
                          {[g.date,g.time,g.field].filter(Boolean).join(" · ")||""}
                        </span>
                      </div>
                      {/* Team rows */}
                      <div style={{border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 5px 5px",
                        overflow:"hidden",background:"#fff",boxShadow:"0 2px 6px rgba(0,0,0,.07)"}}>
                        {teamRow(1)}
                        {isBye?(
                          <div style={{height:TEAM_H,display:"flex",alignItems:"center",
                            padding:"0 7px",borderTop:"1px solid #e8ecf0",background:"#fafafa"}}>
                            <span style={{fontSize:9,color:"#b0bbd0",fontStyle:"italic",letterSpacing:.3}}>— BYE —</span>
                          </div>
                        ):teamRow(2)}
                      </div>
                    </div>
                  );
                })
              )}
              {/* SVG connector lines */}
              <svg style={{position:"absolute",top:0,left:0,pointerEvents:"none",overflow:"visible"}}
                width={totalW} height={totalH}>
                {rounds.slice(0,-1).map((_,ri)=>{
                  const rGames=dGames.filter(g=>g.round===rounds[ri]);
                  const pairs=Math.ceil(rGames.length/2);
                  return Array.from({length:pairs}).map((__,pi)=>{
                    const g1=rGames[pi*2],g2=rGames[pi*2+1];
                    const g1Bye=g1?.status==="bye";
                    const g2Bye=!g2||g2?.status==="bye";
                    const y1=GC(ri,pi*2);
                    const y2=g2?GC(ri,pi*2+1):y1;
                    const yMid=GC(ri+1,pi);
                    const x1=RX(ri)+GW;
                    const xC=x1+CONN/2;
                    const x2=RX(ri+1);
                    // Vertical line spans only between visible game(s) and QF center
                    const vTop=g1Bye?Math.min(y2,yMid):y1;
                    const vBot=g2Bye?Math.max(y1,yMid):y2;
                    const w1=winOf(g1||{});
                    return(
                      <g key={`c${ri}-${pi}`}>
                        {!g1Bye&&<line x1={x1} y1={y1} x2={xC} y2={y1} stroke="#94a3b8" strokeWidth={1.5}/>}
                        {!g2Bye&&<line x1={x1} y1={y2} x2={xC} y2={y2} stroke="#94a3b8" strokeWidth={1.5}/>}
                        <line x1={xC} y1={vTop} x2={xC} y2={vBot} stroke="#94a3b8" strokeWidth={1.5}/>
                        <line x1={xC} y1={yMid} x2={x2} y2={yMid} stroke="#94a3b8" strokeWidth={1.5}/>
                        {w1&&(
                          <text x={(xC+x2)/2} y={yMid-3} textAnchor="middle"
                            style={{fontSize:8,fill:"#475569",fontFamily:"sans-serif"}}>
                            {getT(w1)?.name?.split(" ").slice(-1)[0]||""}
                          </text>
                        )}
                      </g>
                    );
                  });
                })}
              </svg>
              {/* Champion trophy */}
              {champ&&(
                <div style={{position:"absolute",top:GC(N-1,0)-34,left:RX(N-1)+GW+CONN+6,
                  textAlign:"center",width:80}}>
                  <div style={{fontSize:24}}>🏆</div>
                  <div style={{fontSize:10,fontWeight:800,color:"#b45309",lineHeight:1.3,marginTop:2}}>
                    {getT(champ)?.name}
                  </div>
                  <div style={{fontSize:8,color:"#d97706",fontWeight:700,letterSpacing:.5}}>CHAMPION</div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ── Score Entry tab ── */}
      {tab==="scores"&&(
        <div>
          {champ&&(
            <div style={{background:"linear-gradient(135deg,#b45309,#f59e0b)",color:"#fff",
              padding:"10px 18px",borderRadius:10,marginBottom:14,display:"flex",
              alignItems:"center",gap:12,boxShadow:"0 4px 14px rgba(0,0,0,.18)"}}>
              <span style={{fontSize:26}}>🏆</span>
              <div>
                <div style={{fontSize:9,fontWeight:700,opacity:.85,textTransform:"uppercase",letterSpacing:1.2}}>Division Champion</div>
                <div style={{fontSize:15,fontWeight:900,marginTop:1}}>{getT(champ)?.name}</div>
              </div>
            </div>
          )}
          {editable&&<div style={{background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:8,
            padding:"9px 14px",marginBottom:14,fontSize:12,color:"#0369a1",fontWeight:600}}>
            ✏️ Enter final scores — winners advance automatically in the bracket view.
          </div>}
          {!dGames.filter(g=>g.status!=="bye").length&&(
            <div style={{textAlign:"center",padding:"40px 20px",color:"#94a3b8",fontSize:13}}>
              No bracket games yet — use the Builder tab to generate a bracket first.
            </div>
          )}
          {dGames.filter(g=>g.status!=="bye").length>0&&(
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"separate",borderSpacing:"0 6px",minWidth:560}}>
                <thead>
                  <tr>
                    <th style={{padding:"8px 12px",background:NAVY,color:"#fff",fontSize:10,fontWeight:800,
                      textTransform:"uppercase",letterSpacing:.5,textAlign:"center",
                      borderRadius:"8px 0 0 8px",width:66}}>Game</th>
                    <th style={{padding:"8px 12px",background:NAVY,color:"#fff",fontSize:10,fontWeight:800,
                      textTransform:"uppercase",letterSpacing:.5,textAlign:"left"}}>Team 1</th>
                    <th style={{padding:"8px 8px",background:NAVY,color:"#fff",fontSize:10,fontWeight:800,
                      textTransform:"uppercase",textAlign:"center",width:90}}>Score</th>
                    <th style={{padding:"8px 4px",background:NAVY,color:"rgba(255,255,255,.4)",
                      fontSize:11,textAlign:"center",width:28}}>vs</th>
                    <th style={{padding:"8px 8px",background:NAVY,color:"#fff",fontSize:10,fontWeight:800,
                      textTransform:"uppercase",textAlign:"center",width:90}}>Score</th>
                    <th style={{padding:"8px 12px",background:NAVY,color:"#fff",fontSize:10,fontWeight:800,
                      textTransform:"uppercase",letterSpacing:.5,textAlign:"left"}}>Team 2</th>
                    <th style={{padding:"8px 12px",background:NAVY,color:"#fff",fontSize:10,fontWeight:800,
                      textTransform:"uppercase",textAlign:"center",borderRadius:"0 8px 8px 0",width:96}}>Status</th>
                  </tr>
                </thead>
                <tbody>
                  {dGames.filter(g=>g.status!=="bye").map(g=>{
                    const t1=getT(g.t1),t2=getT(g.t2);
                    const w=winOf(g);
                    const final=g.status==="final";
                    const gNum=displayNum[g.id]||g.num;
                    const rIdx=rounds.indexOf(g.round);
                    const t1win=w===g.t1,t2win=w===g.t2;
                    const scoreStyle=(isWin)=>({
                      width:74,height:42,textAlign:"center",fontSize:24,fontWeight:900,
                      border:`2px solid ${isWin?"#16a34a":"#d1d5db"}`,borderRadius:8,
                      background:isWin?"#dcfce7":"#fff",
                      color:isWin?"#15803d":"#1e293b",
                      outline:"none",padding:"0 4px"
                    });
                    return(
                      <tr key={g.id} style={{background:final?"#f0fdf4":"#fff",
                        boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                        {/* Game badge */}
                        <td style={{padding:"10px 10px",textAlign:"center",
                          borderRadius:"8px 0 0 8px",borderLeft:`3px solid ${final?"#16a34a":NAVY}`}}>
                          <span style={{background:NAVY,color:"#fff",borderRadius:5,
                            padding:"3px 8px",fontSize:11,fontWeight:800,fontFamily:"monospace",
                            display:"inline-block",marginBottom:3}}>{gNum}</span>
                          <div style={{fontSize:9,color:"#94a3b8",fontWeight:600,lineHeight:1.2}}>
                            {rndLabel[rIdx]||`Rd ${rIdx+1}`}
                          </div>
                        </td>
                        {/* Team 1 */}
                        <td style={{padding:"10px 8px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            {seedMap[g.t1]&&(
                              <span style={{background:"#1e3a5f",color:"#fff",borderRadius:4,
                                fontSize:9,fontWeight:800,padding:"2px 6px",flexShrink:0}}>
                                #{seedMap[g.t1]}
                              </span>
                            )}
                            <span style={{fontSize:13,fontWeight:t1win?800:500,
                              color:w&&!t1win?"#94a3b8":"#1e293b"}}>
                              {t1?t1.name:<em style={{color:"#c0cad8",fontSize:11}}>TBD</em>}
                            </span>
                            {t1win&&<span style={{fontSize:14}}>🏆</span>}
                          </div>
                        </td>
                        {/* Score 1 */}
                        <td style={{padding:"6px 6px",textAlign:"center"}}>
                          {editable&&g.t1?(
                            <input type="number" min="0" max="99" value={g.s1??""}
                              onChange={e=>upd(g.id,"s1",e.target.value)}
                              style={scoreStyle(t1win)}/>
                          ):(
                            <span style={{fontSize:22,fontWeight:900,
                              color:t1win?"#16a34a":"#374151"}}>{g.s1??"-"}</span>
                          )}
                        </td>
                        {/* vs */}
                        <td style={{padding:"6px 2px",textAlign:"center"}}>
                          <span style={{fontSize:11,fontWeight:700,color:"#cbd5e1"}}>vs</span>
                        </td>
                        {/* Score 2 */}
                        <td style={{padding:"6px 6px",textAlign:"center"}}>
                          {editable&&g.t2?(
                            <input type="number" min="0" max="99" value={g.s2??""}
                              onChange={e=>upd(g.id,"s2",e.target.value)}
                              style={scoreStyle(t2win)}/>
                          ):(
                            <span style={{fontSize:22,fontWeight:900,
                              color:t2win?"#16a34a":"#374151"}}>{g.s2??"-"}</span>
                          )}
                        </td>
                        {/* Team 2 */}
                        <td style={{padding:"10px 8px"}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            {t2win&&<span style={{fontSize:14}}>🏆</span>}
                            {seedMap[g.t2]&&(
                              <span style={{background:"#1e3a5f",color:"#fff",borderRadius:4,
                                fontSize:9,fontWeight:800,padding:"2px 6px",flexShrink:0}}>
                                #{seedMap[g.t2]}
                              </span>
                            )}
                            <span style={{fontSize:13,fontWeight:t2win?800:500,
                              color:w&&!t2win?"#94a3b8":"#1e293b"}}>
                              {t2?t2.name:<em style={{color:"#c0cad8",fontSize:11}}>TBD</em>}
                            </span>
                          </div>
                        </td>
                        {/* Status + clear */}
                        <td style={{padding:"10px 10px",textAlign:"center",borderRadius:"0 8px 8px 0"}}>
                          <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
                            <span style={{padding:"4px 10px",borderRadius:20,fontSize:10,fontWeight:700,
                              background:final?"#dcfce7":"#f1f5f9",
                              color:final?"#16a34a":"#64748b",
                              border:`1px solid ${final?"#86efac":"#e2e8f0"}`}}>
                              {final?"✓ Final":"Scheduled"}
                            </span>
                            {editable&&final&&(
                              <button onClick={()=>setDGames(prev=>prev.map(g2=>g2.id===g.id?{...g2,s1:null,s2:null,status:"scheduled"}:g2))}
                                style={{border:"none",background:"none",cursor:"pointer",
                                  color:"#94a3b8",fontSize:10,fontWeight:600,padding:"1px 4px"}}>
                                ✕ clear
                              </button>
                            )}
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ════════════════════ POOL2BRACKET ════════════════════ */
function Pool2BracketView({poolGames,teams}){
  const finalGames=poolGames.filter(g=>g.status==="final");
  const st=calcUSSSAStandings(teams,finalGames);
  const maxSeeds=st.length;
  const [assigns,setAssigns]=useState(()=>Object.fromEntries(st.map((t,i)=>[`s${i+1}`,t.id])));
  function autoAssign(){setAssigns(Object.fromEntries(st.map((t,i)=>[`s${i+1}`,t.id])));}
  const NAVY="#1e3a5f";
  return(
    <div>
      <Alrt type="info">📋 Pool standings → bracket seeding. Seed 1 (best record) plays Seed {maxSeeds} in Round 1. Uses full USSSA tiebreaker order.</Alrt>
      <div className="g2" style={{gap:20,alignItems:"start"}}>
        <div style={{flex:"1 1 340px"}}>
          <div style={{fontWeight:800,fontSize:13,color:NAVY,marginBottom:8}}>📊 Pool Final Standings</div>
          <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
            <table style={{borderCollapse:"collapse",width:"100%",fontSize:12}}>
              <thead>
                <tr style={{background:NAVY,color:"#fff"}}>
                  <th style={{padding:"7px 8px",fontWeight:700,width:40}}>Seed</th>
                  <th style={{padding:"7px 10px",fontWeight:700,textAlign:"left"}}>Team</th>
                  <th style={{padding:"7px 8px",fontWeight:700}}>Record</th>
                  <th style={{padding:"7px 8px",fontWeight:700}}>Win%</th>
                  <th style={{padding:"7px 8px",fontWeight:700}}>RD</th>
                  <th style={{padding:"7px 8px",fontWeight:700}}>PA</th>
                </tr>
              </thead>
              <tbody>{st.map((t,i)=>(
                <tr key={t.id} style={{background:i%2===0?"#fff":"#f8fafc",borderTop:"1px solid #f1f5f9"}}>
                  <td style={{textAlign:"center",padding:"6px 4px"}}><SeedRank n={i+1}/></td>
                  <td style={{padding:"6px 10px",fontWeight:600,color:NAVY}}>{t.name}</td>
                  <td style={{textAlign:"center",fontFamily:"monospace",fontWeight:700}}>{t.record}</td>
                  <td style={{textAlign:"center",fontWeight:800,
                    color:t.winPct===1000?"#15803d":t.winPct===0?"#dc2626":"#1e293b"}}>{t.winPct}</td>
                  <td style={{textAlign:"center",fontWeight:600,
                    color:parseFloat(t.avgRDMax8)>0?"#15803d":parseFloat(t.avgRDMax8)<0?"#dc2626":"#64748b"}}>
                    {parseFloat(t.avgRDMax8)>0?"+":""}{t.avgRDMax8}
                  </td>
                  <td style={{textAlign:"center",color:"#dc2626",fontWeight:600}}>{t.avgRA}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>
        <div style={{flex:"1 1 260px"}}>
          <div style={{fontWeight:800,fontSize:13,color:NAVY,marginBottom:8}}>🏆 Assign to Bracket Slots</div>
          {st.map((_,i)=>{
            const sKey=`s${i+1}`;
            return(
              <div key={sKey} style={{marginBottom:8,display:"flex",alignItems:"center",gap:8}}>
                <SeedRank n={i+1}/>
                <select style={{flex:1,fontSize:12,padding:"6px 8px",border:"1px solid #cbd5e1",borderRadius:6}}
                  value={assigns[sKey]||""}
                  onChange={e=>setAssigns(p=>({...p,[sKey]:e.target.value}))}>
                  <option value="">— Select Team —</option>
                  {st.map((t,j)=><option key={t.id} value={t.id}>#{j+1} {t.name} ({t.record})</option>)}
                </select>
              </div>
            );
          })}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button className="btn btn-secondary" style={{flex:1}} onClick={autoAssign}>⚡ Auto-Assign by Seed</button>
          </div>
          <button className="btn btn-green mt2 w100">✓ Lock Bracket Seeding</button>
        </div>
      </div>
    </div>
  );
}

    {id:'bv_fl_620',name:'Whispering Pines Park',city:'Port St Lucie',state:'FL',fields:['Field 1','Field 2','Field 3','Field 4'],source:'builtin'},
    {id:'bv_fl_621',name:'Whitehouse',city:'Jacksonville',state:'FL',fields:['Field 1'],source:'builtin'},
    {id:'bv_fl_622',name:'Whitesell Field',city:'Largo',state:'FL',fields:['Field 1','Field 2','Field 3'],source:'builtin'},
    {id:'bv_fl_623',name:'Whitesell Softball Complex',city:'Largo',state:'FL',fields:['Field 1','Field 2','Field 3'],source:'builtin'},
    {id:'bv_fl_624',name:'Wickers Sports Complex',city:'Key West',state:'FL',fields:['Field 1'],source:'builtin'},
    {id:'bv_fl_625',name:'Windy Hill park',city:'Jacksonville',state:'FL',fields:['Field 1','Field 2'],source:'builtin'},
    {id:'bv_fl_626',name:'Wingate Park',city:'Jacksonville Beach',state:'FL',fields:['Field 1','Field 2','Field 3'],source:'builtin'},
    {id:'bv_fl_627',name:'Winter Haven DiamondPlex',city:'Winter Haven',state:'FL',fields:['Field 1','Field 2'],source:'builtin'},
    {id:'bv_fl_628',name:'Winterhaven',city:'Winterhaven',state:'FL',fields:['Field 1','Field 2'],source:'builtin'},
    {id:'bv_fl_629',name:'Wirz Park',city:'Casselberry',state:'FL',fields:['Field 1'],source:'builtin'},
    {id:'bv_fl_630',name:'Woodlawn Softball Complex',city:'St. Petersburg',state:'FL',fields:['Field 1','Field 2','Field 3','Field 4','Field 5'],source:'builtin'},
    {id:'bv_fl_631',name:'Woodlea Sports Complex',city:'Tavares',state:'FL',fields:['Field 1','Field 2'],source:'builtin'},
    {id:'bv_fl_632',name:'Woodville Little League',city:'Tallahassee',state:'FL',fields:['Field 1','Field 2','Field 3','Field 4','Field 5','Field 6'],source:'builtin'},
    {id:'bv_fl_633',name:'World of Baseball Sports Complex',city:'Jacksonville',state:'FL',fields:['Field 1','Field 2'],source:'builtin'},
    {id:'bv_fl_634',name:'Youth Baseball & Softball Complex',city:'St. Petersburg',state:'FL',fields:['Field 1','Field 2'],source:'builtin'},
    {id:'bv_fl_635',name:'Youth Fields',city:'Pinellas Park',state:'FL',fields:['Field 1','Field 2','Field 3'],source:'builtin'}

  ];

  const [venues,setVenues]=useState(BUILTIN_VENUES);
  const [loading,setLoading]=useState(true);
  const [loadErr,setLoadErr]=useState('');
  const [search,setSearch]=useState('');
  const [expanded,setExpanded]=useState(null); // venue id
  const [pkTab,setPkTab]=useState('db'); // 'db' | 'add'
  // Add park form state
  const [nName,setNName]=useState('');
  const [nCity,setNCity]=useState('');
  const [nState,setNState]=useState('FL');
  const [nAddress,setNAddress]=useState('');
  const [nFields,setNFields]=useState(['Field 1','Field 2']);
  const [nNewField,setNNewField]=useState('');
  const [saving,setSaving]=useState(false);
  const [saveMsg,setSaveMsg]=useState('');
  const [deleting,setDeleting]=useState(null);

  // Fetch custom venues from worker and merge with built-in list
  React.useEffect(()=>{
    setLoading(true);
    fetch(WORKER+'/venues/custom')
      .then(r=>r.ok?r.json():Promise.reject(new Error(r.status)))
      .then(custom=>{
        const customArr=Array.isArray(custom)?custom:[];
        if(customArr.length>0){
          setVenues(prev=>[...prev.filter(v=>v.source==='builtin'),...customArr.map(v=>({...v,source:'custom'}))]);
        }
      })
      .catch(()=>{/* custom fetch failed — built-in list still shows */})
      .finally(()=>setLoading(false));
  },[]);

  const filtered=venues.filter(v=>{
    if(!search.trim())return true;
    const q=search.toLowerCase();
    return(v.name||'').toLowerCase().includes(q)||(v.city||'').toLowerCase().includes(q)||(v.state||'').toLowerCase().includes(q);
  });

  function toggleExpand(id){setExpanded(p=>p===id?null:id);}

  async function addFieldToNew(){
    if(!nNewField.trim())return;
    setNFields(p=>[...p,nNewField.trim()]);setNNewField('');
  }
  function removeNewField(i){setNFields(p=>p.filter((_,idx)=>idx!==i));}
  function renameNewField(i,val){setNFields(p=>p.map((f,idx)=>idx===i?val:f));}

  async function saveNewVenue(){
    if(!nName.trim()){setSaveMsg('Park name is required.');return;}
    if(nFields.length===0){setSaveMsg('Add at least one field.');return;}
    setSaving(true);setSaveMsg('');
    const newVenue={id:'cv_'+Date.now(),name:nName,city:nCity,state:nState,address:nAddress,fields:nFields,source:'custom'};
    try{
      // Live worker uses /venues/custom POST (appends to KV list)
      const r=await fetch(WORKER+'/venues/custom',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(newVenue)
      });
      const j=await r.json();
      if(j.ok||j.status==='ok'){
        setVenues(p=>[...p,newVenue]);
        setNName('');setNCity('');setNState('FL');setNAddress('');setNFields(['Field 1','Field 2']);
        setSaveMsg('✅ Park saved!');
        setPkTab('db');
        setTimeout(()=>setSaveMsg(''),3000);
      } else {setSaveMsg('Error: '+(j.message||j.error||'unknown'));}
    }catch(e){setSaveMsg('Save failed: '+e.message);}
    setSaving(false);
  }

  async function deleteVenue(venue){
    if(venue.source!=='custom'){return;}
    if(!window.confirm('Remove "'+venue.name+'" from your venue list?'))return;
    setDeleting(venue.id);
    // Remove from local view; KV cleanup handled on next worker update
    setVenues(p=>p.filter(v=>v.id!==venue.id));
    setDeleting(null);
  }

  const inS={padding:'6px 10px',border:'1px solid #cbd5e1',borderRadius:5,fontSize:12,background:'#fff',color:'#0f172a',width:'100%',boxSizing:'border-box'};

  return(
    <div>
      {/* Tab bar */}
      <div style={{display:'flex',gap:0,marginBottom:18,borderBottom:'2px solid #e2e8f0'}}>
        {[['db','🏟 Venue Database'],['add','➕ Add New Park']].map(([k,lbl])=>(
          <div key={k} onClick={()=>setPkTab(k)}
            style={{padding:'8px 20px',fontWeight:700,fontSize:13,cursor:'pointer',
              borderBottom:'3px solid '+(pkTab===k?NAVY:'transparent'),
              color:pkTab===k?NAVY:'#64748b',marginBottom:'-2px',transition:'all .15s'}}>
            {lbl}
          </div>
        ))}
      </div>

      {pkTab==='db'?(
        <div>
          {/* Search bar */}
          <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:14}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  Search parks, city, or state…"
              style={{...inS,flex:1,fontSize:13,padding:'8px 12px'}}/>
            {loading&&<span style={{fontSize:12,color:'#94a3b8'}}>Loading…</span>}
            {!loading&&<span style={{fontSize:12,color:'#64748b',whiteSpace:'nowrap'}}>{filtered.length} venues</span>}
          </div>
          {loadErr&&<Alrt type="info">ℹ️ {loadErr} — showing built-in venue list.</Alrt>}

          {/* Venue list */}
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {filtered.map(v=>{
              const isExp=expanded===v.id;
              const isCustom=v.source==='custom';
              return(
                <div key={v.id} style={{background:'#fff',border:'1px solid '+(isExp?'#93c5fd':'#e2e8f0'),borderRadius:10,overflow:'hidden',boxShadow:isExp?'0 2px 8px rgba(0,0,0,.08)':'0 1px 2px rgba(0,0,0,.04)',transition:'all .15s'}}>
                  {/* Header row */}
                  <div style={{display:'flex',alignItems:'center',padding:'10px 14px',cursor:'pointer',gap:10}}
                    onClick={()=>toggleExpand(v.id)}>
                    <div style={{flex:1}}>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontWeight:700,fontSize:13,color:NAVY}}>{v.name}</span>
                        {isCustom&&<span style={{fontSize:10,background:'#dbeafe',color:'#1e40af',borderRadius:20,padding:'1px 7px',fontWeight:700}}>Custom</span>}
                      </div>
                      {(v.city||v.state)&&<div style={{fontSize:11,color:'#64748b',marginTop:2}}>{[v.city,v.state].filter(Boolean).join(', ')}</div>}
                    </div>
                    <div style={{display:'flex',alignItems:'center',gap:10}}>
                      {v.fields&&v.fields.length>0&&(
                        <span style={{fontSize:11,background:'#f0fdf4',color:'#15803d',border:'1px solid #bbf7d0',borderRadius:20,padding:'2px 9px',fontWeight:700}}>
                          {v.fields.length} field{v.fields.length!==1?'s':''}
                        </span>
                      )}
                      {isCustom&&(
                        <div onClick={e=>{e.stopPropagation();deleteVenue(v);}}
                          style={{padding:'3px 8px',fontSize:11,color:'#ef4444',cursor:'pointer',borderRadius:4,background:'#fff1f2',border:'1px solid #fecaca',fontWeight:600,opacity:deleting===v.id?0.5:1}}>
                          {deleting===v.id?'…':'✕ Remove'}
                        </div>
                      )}
                      <span style={{color:'#94a3b8',fontSize:12}}>{isExp?'▲':'▼'}</span>
                    </div>
                  </div>
                  {/* Expanded: field list */}
                  {isExp&&(
                    <div style={{borderTop:'1px solid #e2e8f0',padding:'12px 14px',background:'#f8fafc'}}>
                      {v.address&&<div style={{fontSize:11,color:'#64748b',marginBottom:10}}>📍 {v.address}</div>}
                      {v.fields&&v.fields.length>0?(
                        <div>
                          <div style={{fontWeight:700,fontSize:11,color:'#475569',textTransform:'uppercase',letterSpacing:.6,marginBottom:8}}>Fields</div>
                          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                            {v.fields.map((f,i)=>(
                              <span key={i} style={{background:'#dbeafe',color:'#1e40af',borderRadius:6,padding:'4px 10px',fontSize:12,fontWeight:600}}>
                                {f}
                              </span>
                            ))}
                          </div>
                        </div>
                      ):(
                        <div style={{fontSize:12,color:'#94a3b8'}}>No fields configured.</div>
                      )}
                    </div>
                  )}
                </div>
              );
            })}
            {!loading&&filtered.length===0&&(
              <div style={{textAlign:'center',padding:'40px 20px',color:'#94a3b8',fontSize:13}}>
                No venues found{search?' matching "'+search+'"':''}.
              </div>
            )}
          </div>
        </div>
      ):(
        /* Add New Park tab */
        <div style={{maxWidth:580}}>
          <div style={{background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,padding:'20px 24px',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
            <div style={{fontWeight:800,fontSize:15,color:NAVY,marginBottom:16}}>New Park / Venue</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
              <div style={{gridColumn:'1/-1'}}>
                <div style={{fontSize:11,fontWeight:700,color:'#475569',marginBottom:4}}>Park Name *</div>
                <input style={inS} placeholder="e.g. Frank Brown Park" value={nName} onChange={e=>setNName(e.target.value)}/>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:'#475569',marginBottom:4}}>City</div>
                <input style={inS} placeholder="Panama City Beach" value={nCity} onChange={e=>setNCity(e.target.value)}/>
              </div>
              <div>
                <div style={{fontSize:11,fontWeight:700,color:'#475569',marginBottom:4}}>State</div>
                <input style={inS} placeholder="FL" maxLength={2} value={nState} onChange={e=>setNState(e.target.value.toUpperCase())}/>
              </div>
              <div style={{gridColumn:'1/-1'}}>
                <div style={{fontSize:11,fontWeight:700,color:'#475569',marginBottom:4}}>Address (optional)</div>
                <input style={inS} placeholder="123 Main St, City, FL 00000" value={nAddress} onChange={e=>setNAddress(e.target.value)}/>
              </div>
            </div>

            {/* Field names */}
            <div style={{marginBottom:16}}>
              <div style={{fontSize:11,fontWeight:700,color:'#475569',marginBottom:8}}>Field Names</div>
              <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:8}}>
                {nFields.map((f,i)=>(
                  <div key={i} style={{display:'flex',gap:6,alignItems:'center'}}>
                    <input value={f} onChange={e=>renameNewField(i,e.target.value)}
                      style={{...inS,flex:1}} placeholder={'Field '+(i+1)}/>
                    <div onClick={()=>removeNewField(i)}
                      style={{padding:'5px 10px',background:'#fff1f2',border:'1px solid #fecaca',borderRadius:5,cursor:'pointer',fontSize:12,color:'#ef4444',fontWeight:700,flexShrink:0}}>✕</div>
                  </div>
                ))}
              </div>
              <div style={{display:'flex',gap:6}}>
                <input value={nNewField} onChange={e=>setNNewField(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addFieldToNew();}}}
                  placeholder="Field name (e.g. Field 3, Diamond A)…"
                  style={{...inS,flex:1}}/>
                <button className="btn btn-secondary btn-sm" onClick={addFieldToNew} style={{flexShrink:0}}>+ Add Field</button>
              </div>
            </div>

            {saveMsg&&<div style={{fontSize:12,marginBottom:10,color:saveMsg.startsWith('✅')?'#15803d':'#dc2626',fontWeight:600}}>{saveMsg}</div>}
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary" onClick={saveNewVenue} disabled={saving||!nName.trim()}>
                {saving?'Saving…':'💾 Save Park'}
              </button>
              <button className="btn btn-secondary" onClick={()=>{setNName('');setNCity('');setNState('FL');setNAddress('');setNFields(['Field 1','Field 2']);setSaveMsg('');}}>
                Clear
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ════════════════════ UMPIRES ════════════════════ */
function UmpiresView(){
  const [umps,setUmps]=useState([
    {id:"u1",name:"John Martinez",cert:"Blue",state:"FL",games:4,phone:"(561) 555-0101"},
    {id:"u2",name:"Derek Smith",cert:"Blue",state:"FL",games:3,phone:"(561) 555-0182"},
    {id:"u3",name:"Marcus Williams",cert:"Green",state:"FL",games:0,phone:"(954) 555-0247"},
    {id:"u4",name:"Tony Fernandez",cert:"Red",state:"FL",games:2,phone:"(305) 555-0318"},
  ]);
  const [showAdd,setShowAdd]=useState(false);
  const [nu,setNu]=useState({name:"",cert:"Blue",state:"FL",phone:""});
  const [assignId,setAssignId]=useState(null);
  const [assignGame,setAssignGame]=useState("");
  const CERTS=["Blue","Green","Red","Gold"];
  function saveUmp(){
    if(!nu.name.trim())return;
    setUmps(p=>[...p,{id:"u"+Date.now(),...nu,games:0}]);
    setNu({name:"",cert:"Blue",state:"FL",phone:""});
    setShowAdd(false);
  }
  function removeUmp(id){setUmps(p=>p.filter(u=>u.id!==id));if(assignId===id)setAssignId(null);}
  function assignTo(uid){
    if(!assignGame.trim()){setAssignId(null);return;}
    setUmps(p=>p.map(u=>u.id===uid?{...u,games:u.games+1}:u));
    setAssignId(null);setAssignGame("");
  }
  const inS={padding:"6px 10px",border:"1px solid #ddd",borderRadius:5,fontSize:12,width:"100%",boxSizing:"border-box"};
  return(
    <div onClick={()=>setAssignId(null)}>
      <Alrt type="info">🟡 Assign certified umpires to specific games. Certification level must match division requirements.</Alrt>
      <div className="flex-b mb4">
        <span className="fw7 t-navy">Registered Umpires ({umps.length})</span>
        <button className="btn btn-primary btn-sm" onClick={e=>{e.stopPropagation();setShowAdd(!showAdd);setAssignId(null);}}>➕ Add Umpire</button>
      </div>
      {showAdd?(
        <div style={{background:"#f0f7ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"16px 18px",marginBottom:16}} onClick={e=>e.stopPropagation()}>
          <div style={{fontWeight:700,fontSize:13,color:"var(--navy)",marginBottom:12}}>New Umpire</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:12}}>
            <div><div style={{fontSize:11,fontWeight:700,color:"var(--gray)",marginBottom:4}}>Full Name *</div><input style={inS} placeholder="Name" value={nu.name} onChange={e=>setNu(p=>({...p,name:e.target.value}))}/></div>
            <div><div style={{fontSize:11,fontWeight:700,color:"var(--gray)",marginBottom:4}}>Certification</div>
              <select style={inS} value={nu.cert} onChange={e=>setNu(p=>({...p,cert:e.target.value}))}>
                {CERTS.map(c=><option key={c} value={c}>{c}</option>)}
              </select>
            </div>
            <div><div style={{fontSize:11,fontWeight:700,color:"var(--gray)",marginBottom:4}}>State</div><input style={inS} placeholder="FL" maxLength={2} value={nu.state} onChange={e=>setNu(p=>({...p,state:e.target.value.toUpperCase()}))}/></div>
            <div><div style={{fontSize:11,fontWeight:700,color:"var(--gray)",marginBottom:4}}>Phone</div><input style={inS} placeholder="(555) 000-0000" value={nu.phone} onChange={e=>setNu(p=>({...p,phone:e.target.value}))}/></div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-primary btn-sm" onClick={saveUmp} disabled={!nu.name.trim()}>✓ Save Umpire</button>
            <button className="btn btn-secondary btn-sm" onClick={()=>{setShowAdd(false);setNu({name:"",cert:"Blue",state:"FL",phone:""});}}>Cancel</button>
          </div>
        </div>
      ):null}
      <div className="tbl-wrap">
        <table>
          <thead><tr><th>Name</th><th>Cert</th><th>State</th><th>Phone</th><th>Games</th><th style={{width:160}}>Actions</th></tr></thead>
          <tbody>{umps.map(u=>{
            const isAssigning=assignId===u.id;
            const certClr=u.cert==="Blue"?"b-blue":u.cert==="Red"?"b-red":u.cert==="Gold"?"b-gold":"b-green";
            return(
              <tr key={u.id}>
                <td className="fw7">{u.name}</td>
                <td><span className={"badge "+certClr}>{u.cert}</span></td>
                <td>{u.state}</td>
                <td className="t-sm">{u.phone}</td>
                <td><span className="badge b-gray">{u.games} games</span></td>
                <td style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
                  <div style={{display:"flex",gap:4}}>
                    <button className="btn btn-sm btn-secondary" style={{fontSize:11,padding:"3px 8px"}} onClick={()=>setAssignId(isAssigning?null:u.id)}>📋 Assign</button>
                    <button className="btn btn-sm" style={{fontSize:11,padding:"3px 8px",background:"none",border:"1px solid #fca5a5",color:"var(--red)",borderRadius:4,cursor:"pointer"}} onClick={()=>removeUmp(u.id)}>✕</button>
                  </div>
                  {isAssigning?(
                    <div style={{position:"absolute",right:0,top:"110%",zIndex:300,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,boxShadow:"0 6px 20px rgba(0,0,0,.15)",padding:"12px 14px",minWidth:220}}>
                      <div style={{fontSize:12,fontWeight:700,color:"var(--navy)",marginBottom:8}}>Assign to Game #</div>
                      <input style={{...inS,marginBottom:8}} placeholder="Game number or ID" value={assignGame} onChange={e=>setAssignGame(e.target.value)}/>
                      <div style={{display:"flex",gap:6}}>
                        <button className="btn btn-primary btn-sm" style={{flex:1,fontSize:11}} onClick={()=>assignTo(u.id)}>✓ Assign</button>
                        <button className="btn btn-secondary btn-sm" style={{fontSize:11}} onClick={()=>setAssignId(null)}>Cancel</button>
                      </div>
                    </div>
                  ):null}
                </td>
              </tr>
            );
          })}</tbody>
        </table>
      </div>
    </div>
  );
}

/* ════════════════════ PP MATRIX ════════════════════ */
function PPMatrixView(){
  const [np,setNp]=useState(4);
  const [nt,setNt]=useState(16);
  const pools=Array.from({length:np},(_,i)=>String.fromCharCode(65+i));
  const rows=Math.ceil(nt/np);
  function seed(r,c){const s=r%2===0?r*np+(c+1):r*np+(np-c);return s<=nt?s:null}
  return(
    <div>
      <Alrt type="info">🔢 Serpentine seeding: Seed 1→Pool A, 2→B, etc., then direction reverses each row to balance pool strength.</Alrt>
      <div className="flex gap-3 mb4" style={{alignItems:"flex-end"}}>
        <div><label>Number of Pools</label>
          <select value={np} onChange={e=>setNp(+e.target.value)}>
            {[2,3,4,5,6,8].map(n=><option key={n}>{n}</option>)}
          </select>
        </div>
        <div><label>Number of Teams</label>
          <select value={nt} onChange={e=>setNt(+e.target.value)}>
            {[8,12,16,20,24,28,32,33,40,48,54,64].map(n=><option key={n}>{n}</option>)}
          </select>
        </div>
      </div>
      <div className="card">
        <div className="card-hd"><span className="card-title">Pool Seeding Matrix — {nt} teams ÷ {np} pools</span></div>
        <div className="card-body">
          <table style={{width:"auto"}}>
            <thead><tr>
              <th style={{width:70}}></th>
              {pools.map(p=><th key={p} style={{textAlign:"center",width:52}}>Pool {p}</th>)}
            </tr></thead>
            <tbody>{Array.from({length:rows},(_,r)=>(
              <tr key={r}>
                <td className="t-sm fw7 t-gray">Row {r+1}</td>
                {pools.map((_,c)=>{const s=seed(r,c);return(
                  <td key={c} style={{textAlign:"center",padding:"4px 6px"}}>
                    {s!=null&&<div className={`pp-cell ${r===0?"pp-cell-top":c===0?"pp-cell-2":""}`}>{s}</div>}
                  </td>
                )})}
              </tr>
            ))}</tbody>
          </table>
          <div className="t-xs t-gray mt3">
            Teams per pool: {pools.map((p,pi)=>{
              const cnt=Array.from({length:rows},(_,r)=>seed(r,pi)!=null?1:0).reduce((a,b)=>a+b,0);
              return `${p}: ${cnt}`;
            }).join(" · ")}
          </div>
        </div>
      </div>
    </div>
  );
}

                </tr></thead>
                <tbody>
                  {summary.map((s,i)=>{
                    const full=Math.floor(s.totalOuts/3);
                    const rem=s.totalOuts%3;
                    const dispInns=rem===0?`${full}.0`:`${full}.${rem}`;
                    return(
                      <tr key={i}>
                        <td className="t-sm">{tm(s.tId).name}</td>
                        <td className="fw7">{s.player}</td>
                        <td style={{textAlign:"center"}}>{s.gamesCount}</td>
                        <td style={{textAlign:"center",fontFamily:"monospace",fontWeight:700,fontSize:15}}>{dispInns}</td>
                        <td style={{textAlign:"center",fontSize:12,color:"#64748b"}}>{s.totalOuts}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          }
        </div>
      )}
      </div>}
    </div>
  );
}

/* ════════════════════ PLACING ════════════════════ */
function PlacingView({bGames,teams}){
  const NAVY="#1e3a5f";
  function tm(id){return tByIdFrom(id,teams)}
  const ordSfx=n=>n===1?"st":n===2?"nd":n===3?"rd":"th";
  // Build all placings by traversing every round's losers (bottom-up)
  // Determine total rounds
  const rounds=[...new Set(bGames.filter(g=>g.status!=="bye").map(g=>g.round))].sort((a,b)=>b-a);
  if(!rounds.length)return <Alrt type="info">🏆 No bracket games recorded yet.</Alrt>;
  const lastRound=rounds[0];
  // Walk rounds from last → first to assign places
  // Championship winner = 1st, loser = 2nd
  // Semi-final losers = 3rd/4th, Quarter-final losers = 5th–8th, etc.
  const places=[];
  let nextPlace=1;
  const placed=new Set();
  rounds.forEach(r=>{
    const roundGames=bGames.filter(g=>g.round===r&&g.status!=="bye");
    if(r===lastRound){
      // Championship
      roundGames.forEach(g=>{
        const w=winOf(g),l=loseOf(g);
        if(w&&!placed.has(w)){places.push({pos:nextPlace,id:w,lbl:"Champion",ico:"🥇"});placed.add(w);nextPlace++;}
        if(l&&!placed.has(l)){places.push({pos:nextPlace,id:l,lbl:"Runner-Up",ico:"🥈"});placed.add(l);nextPlace++;}
      });
    } else {
      // All losers from this round tie for nextPlace
      const losers=roundGames.map(g=>loseOf(g)).filter(id=>id&&!placed.has(id));
      const numLosers=losers.length;
      if(numLosers===0)return;
      const startPos=nextPlace;
      const endPos=nextPlace+numLosers-1;
      const posLabel=startPos===endPos?`${startPos}${ordSfx(startPos)}`:
        `${startPos}${ordSfx(startPos)}–${endPos}${ordSfx(endPos)}`;
      const ico=startPos===3?"🥉":startPos<=4?"4️⃣":startPos<=8?"🎖":"📋";
      losers.forEach(id=>{
        if(!placed.has(id)){
          places.push({pos:startPos,id,lbl:posLabel+" Place",ico});
          placed.add(id);
          nextPlace++;
        }
      });
    }
  });
  // Any team in the bracket but not placed = TBD
  const allBracketTeams=new Set(bGames.filter(g=>g.status!=="bye").flatMap(g=>[g.t1,g.t2]).filter(Boolean));
  allBracketTeams.forEach(id=>{
    if(!placed.has(id)){
      places.push({pos:nextPlace,id,lbl:"TBD",ico:"⏳"});
      nextPlace++;
    }
  });
  const top3=places.filter(p=>p.pos<=3);
  return(
    <div>
      <Alrt type="success">🏆 Final division standings based on bracket results. Positions auto-calculated from game outcomes.</Alrt>
      {/* Podium cards */}
      {top3.length>0&&(
        <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:20}}>
          {[1,2,3].map(pos=>{
            const p=top3.find(x=>x.pos===pos);
            const medBg=pos===1?"linear-gradient(135deg,#fbbf24,#f59e0b)":pos===2?"linear-gradient(135deg,#94a3b8,#64748b)":"linear-gradient(135deg,#f97316,#ea580c)";
            return(
              <div key={pos} style={{flex:"1 1 150px",minWidth:140,textAlign:"center",
                borderRadius:12,overflow:"hidden",boxShadow:"0 4px 16px rgba(0,0,0,.1)"}}>
                <div style={{background:medBg,padding:"16px 8px 12px"}}>
                  <div style={{fontSize:32}}>{p?.ico||"❓"}</div>
                  <div style={{color:"#fff",fontWeight:900,fontSize:11,marginTop:4,letterSpacing:1}}>{p?.lbl||`${pos}${ordSfx(pos)} Place`}</div>
                </div>
                <div style={{background:"#fff",padding:"12px 8px",borderTop:"3px solid rgba(0,0,0,.05)"}}>
                  <div style={{fontWeight:800,fontSize:13,color:NAVY,lineHeight:1.3}}>
                    {p?.id?tm(p.id)?.name:<span style={{color:"#94a3b8",fontStyle:"italic"}}>TBD</span>}
                  </div>
                  {p?.id&&<div style={{fontSize:10,color:"#94a3b8",marginTop:2}}>{tm(p.id)?.cls}</div>}
                </div>
              </div>
            );
          })}
        </div>
      )}
      {/* Full placing table */}
      <div style={{border:"1px solid #e2e8f0",borderRadius:8,overflow:"hidden"}}>
        <table style={{borderCollapse:"collapse",width:"100%",fontSize:13}}>
          <thead>
            <tr style={{background:NAVY,color:"#fff"}}>
              <th style={{padding:"9px 12px",fontWeight:700,width:80}}>Place</th>
              <th style={{padding:"9px 12px",fontWeight:700,textAlign:"left"}}>Team</th>
              <th style={{padding:"9px 12px",fontWeight:700,width:80,textAlign:"center"}}>Class</th>
              <th style={{padding:"9px 12px",fontWeight:700,textAlign:"left",width:160}}>Notes</th>
              <th style={{padding:"9px 12px",fontWeight:700,textAlign:"center",width:100}}>Set Place</th>
            </tr>
          </thead>
          <tbody>
            {places.sort((a,b)=>a.pos-b.pos).map((p,i)=>{
              const team=tm(p.id);
              const rowBg=i%2===0?"#fff":"#f8fafc";
              const plcColor=p.pos===1?"#b45309":p.pos===2?"#64748b":p.pos===3?"#c2410c":"#1e293b";
              return(
                <tr key={p.id||i} style={{background:rowBg,borderTop:"1px solid #f1f5f9"}}>
                  <td style={{padding:"8px 12px",textAlign:"center",fontWeight:900,fontSize:14,color:plcColor}}>
                    {p.ico} {p.pos}{ordSfx(p.pos)}
                  </td>
                  <td style={{padding:"8px 12px",fontWeight:700,color:NAVY}}>
                    {team?<>
                      {team.state&&<span style={{fontSize:10,color:"#94a3b8",marginRight:4}}>[{team.state}]</span>}
                      {team.name}
                    </>:<span style={{color:"#94a3b8",fontStyle:"italic"}}>TBD</span>}
                  </td>
                  <td style={{padding:"8px 12px",textAlign:"center"}}>
                    {team&&<span style={{background:"#f1f5f9",border:"1px solid #cbd5e1",borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700,color:"#475569"}}>{team.cls}</span>}
                  </td>
                  <td style={{padding:"8px 12px",color:"#64748b",fontSize:12}}>{p.lbl}</td>
                  <td style={{padding:"8px 12px",textAlign:"center"}}>
                    <input type="number" min="0" placeholder="Override"
                      style={{width:64,padding:"4px 6px",border:"1px solid #cbd5e1",borderRadius:4,fontSize:11,textAlign:"center"}}/>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
      <div style={{marginTop:10,fontSize:11,color:"#94a3b8"}}>
        * Set Place to 0 to hide a team from standings display. Overrides are used for tiebreak situations not resolvable by bracket position alone.
      </div>
    </div>
  );
}

                      placeholder="coach@email.com"
                      style={{width:"100%",padding:"6px 8px",border:"1px solid #bfdbfe",borderRadius:5,fontSize:12,boxSizing:"border-box",background:"#fff"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <label style={{fontSize:11,fontWeight:700,color:"#64748b",display:"block",marginBottom:3}}>Cell / Phone</label>
                    <input value={teamOverride.phone} onChange={e=>setTeamOverride(p=>({...p,phone:e.target.value}))}
                      placeholder="(555) 000-0000"
                      style={{width:"100%",padding:"6px 8px",border:"1px solid #bfdbfe",borderRadius:5,fontSize:12,boxSizing:"border-box",background:"#fff"}}/>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* STEP 2: Compose */}
        <div style={{marginBottom:12}}>
          <div style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.6,marginBottom:8}}>Step 2 — Compose Message</div>
          <input value={subject} onChange={e=>setSubject(e.target.value)} maxLength={40}

            style={{width:"100%",padding:"8px 10px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:13,marginBottom:8,boxSizing:"border-box"}}/>
          <textarea value={body} onChange={e=>setBody(e.target.value)} rows={3}
            placeholder="Your message to team managers..."
            style={{width:"100%",padding:"8px 10px",border:"1px solid #e2e8f0",borderRadius:6,fontSize:13,resize:"vertical",boxSizing:"border-box"}}/>
          <div style={{fontSize:11,color:smsOver?"#dc2626":"#94a3b8",marginTop:3,textAlign:"right"}}>
            {smsLen}/80 SMS chars {smsOver&&"⚠️ Over limit — SMS may be split"}
          </div>
        </div>

        {/* STEP 3: Send */}
        <div style={{borderTop:"1px solid #f1f5f9",paddingTop:12,display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <div style={{flex:1,fontSize:12,color:"#64748b",minWidth:140}}>
            {sent?(
              <span style={{color:"#16a34a",fontWeight:700}}>✅ Queued for {sent==="email"?"email":"SMS"} — {targetTeams.length} team{targetTeams.length!==1?"s":""}</span>
            ):targetTeams.length>0?(
              <span>Sending to <strong style={{color:NAVY}}>{targetTeams.length} team{targetTeams.length!==1?"s":""}</strong></span>
            ):(
              <span style={{color:"#94a3b8"}}>Select recipient(s) above to continue</span>
            )}
          </div>
          <button onClick={()=>handleSend("email")} disabled={!canSend||sending}
            style={{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",borderRadius:7,border:"none",
              background:canSend&&!sending?"#2563eb":"#e2e8f0",color:canSend&&!sending?"#fff":"#94a3b8",
              cursor:canSend&&!sending?"pointer":"not-allowed",fontWeight:700,fontSize:13,transition:"all .15s"}}>
            {sending?"⏳ Sending…":"📧 Email "+btnLabel}
          </button>
          <button onClick={()=>handleSend("text")} disabled={!canSend||sending}
            style={{display:"flex",alignItems:"center",gap:6,padding:"9px 18px",borderRadius:7,border:"none",
              background:canSend&&!sending?"#16a34a":"#e2e8f0",color:canSend&&!sending?"#fff":"#94a3b8",
              cursor:canSend&&!sending?"pointer":"not-allowed",fontWeight:700,fontSize:13,transition:"all .15s"}}>
            💬 Text {btnLabel}
          </button>
          {sentError&&<div style={{color:"#dc2626",fontSize:12,marginTop:4,width:"100%"}}>⚠️ {sentError}</div>}
        </div>
      </div>
    </React.Fragment>
  );
}

/* ════════════════════ ASSIGN FIELDS TAB ════════════════════ */
function AssignFieldsTab({evId,fieldAssignments,setFieldAssignments,onNext}){
  const PARK_COLORS_LOCAL=["#1e3a5f","#14532d","#4c1d95","#7c2d12","#164e63","#713f12","#881337","#134e4a","#1c4532","#374151"];
  const [allVenues,setAllVenues]=React.useState([]);
  const [loading,setLoading]=React.useState(false);
  const [search,setSearch]=React.useState("");
  const [cityFilter,setCityFilter]=React.useState("");
  const [expandedId,setExpandedId]=React.useState(null);
  const [editFields,setEditFields]=React.useState({}); // venueKey → ["Field 1","Field 2",...]
  const [newFieldText,setNewFieldText]=React.useState({});

  // Load venues from worker
  React.useEffect(()=>{
    setLoading(true);
    fetch("https://usssa-poller.chad-157.workers.dev/venues")
      .then(r=>r.json())
      .then(d=>{
        const venues=(d.venues||d||[]);
        setAllVenues(venues);
        setLoading(false);
      })
      .catch(()=>setLoading(false));
  },[]);

  const assignedIds=new Set(fieldAssignments.map(a=>a.venueKey));

  const cities=React.useMemo(()=>{
    const s=new Set(allVenues.map(v=>v.city||"").filter(Boolean));
    return [...s].sort();
  },[allVenues]);

  const filtered=React.useMemo(()=>{
    let list=allVenues;
    if(search.trim())list=list.filter(v=>(v.name||"").toLowerCase().includes(search.toLowerCase())||(v.city||"").toLowerCase().includes(search.toLowerCase()));
    if(cityFilter)list=list.filter(v=>v.city===cityFilter);
    return list;
  },[allVenues,search,cityFilter]);

  const topCities=React.useMemo(()=>{
    const freq={};
    allVenues.forEach(v=>{if(v.city)freq[v.city]=(freq[v.city]||0)+1;});
    return Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([c])=>c);
  },[allVenues]);

  function venueKey(v){return `${v.name}__${v.city}`;}

  function toggleVenue(v){
    const key=venueKey(v);
    if(assignedIds.has(key)){
      setFieldAssignments(fieldAssignments.filter(a=>a.venueKey!==key));
    } else {
      const colorIdx=fieldAssignments.length%PARK_COLORS_LOCAL.length;
      const defaultFields=["Field 1","Field 2","Field 3"];
      setEditFields(prev=>({...prev,[key]:defaultFields}));
      setFieldAssignments([...fieldAssignments,{venueKey:key,venueId:v.id||v.venueID||key,venueName:v.name,city:v.city||"",fields:defaultFields,color:PARK_COLORS_LOCAL[colorIdx]}]);
      setExpandedId(key);
    }
  }

  function updateFields(key,fields){
    setEditFields(prev=>({...prev,[key]:fields}));
    setFieldAssignments(fieldAssignments.map(a=>a.venueKey===key?{...a,fields}:a));
  }

  function addField(key){
    const txt=(newFieldText[key]||"").trim();
    if(!txt)return;
    const cur=(editFields[key]||fieldAssignments.find(a=>a.venueKey===key)?.fields||[]);
    updateFields(key,[...cur,txt]);
    setNewFieldText(p=>({...p,[key]:""}));
  }

  function removeField(key,i){
    const cur=editFields[key]||fieldAssignments.find(a=>a.venueKey===key)?.fields||[];
    updateFields(key,cur.filter((_,idx)=>idx!==i));
  }

  function renameField(key,i,val){
    const cur=(editFields[key]||fieldAssignments.find(a=>a.venueKey===key)?.fields||[]).slice();
    cur[i]=val;
    updateFields(key,cur);
  }

  const totalFields=fieldAssignments.reduce((s,a)=>s+(a.fields||[]).length,0);

  return(
    <div style={{display:"flex",height:"calc(100vh - 230px)",minHeight:480,overflow:"hidden",borderRadius:10,border:"1px solid #e2e8f0",background:"#fff"}}>

      {/* ── LEFT PANEL: Park browser (60%) ── */}
      <div style={{flex:"0 0 58%",display:"flex",flexDirection:"column",borderRight:"2px solid #e2e8f0",overflow:"hidden"}}>

        {/* Search bar */}
        <div style={{padding:"10px 12px",borderBottom:"1px solid #e2e8f0",background:"#fff"}}>
          <input
            placeholder="🔍 Search parks or city..."
            value={search}
            onChange={e=>setSearch(e.target.value)}
            autoFocus
            style={{width:"100%",padding:"7px 11px",border:"1.5px solid #cbd5e1",borderRadius:8,fontSize:13,boxSizing:"border-box",outline:"none"}}
          />
        </div>

        {/* City quick-filter pills */}
        <div style={{padding:"6px 10px",borderBottom:"1px solid #e2e8f0",background:"#f8fafc",display:"flex",gap:4,flexWrap:"nowrap",overflowX:"auto"}}>
          {["All",...topCities].map(c=>{
            const active=cityFilter===(c==="All"?"":c);
            return(
              <span key={c} onClick={()=>setCityFilter(c==="All"?"":c)}
                style={{padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0,whiteSpace:"nowrap",
                  background:active?"#1e3a5f":"#fff",color:active?"#fff":"#475569",
                  border:`1.5px solid ${active?"#1e3a5f":"#cbd5e1"}`}}>
                {c}
              </span>
            );
          })}
          {(search||cityFilter)&&(
            <span onClick={()=>{setSearch("");setCityFilter("");}}
              style={{padding:"3px 9px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0,
                background:"#fee2e2",color:"#991b1b",border:"1.5px solid #fca5a5"}}>
              ✕ Clear
            </span>
          )}
        </div>

        {/* Count bar */}
        <div style={{padding:"3px 12px",fontSize:10,color:"#94a3b8",background:"#fff",borderBottom:"1px solid #f1f5f9"}}>
          {loading?"Loading venues...":`${filtered.length} of ${allVenues.length} venues • tap to assign`}
        </div>

        {/* Scrollable venue list */}
        <div style={{flex:1,overflowY:"auto"}}>
          {loading?(
            <div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>
              <div style={{fontSize:28,marginBottom:8}}>🔄</div>
              <div style={{fontSize:13}}>Loading Florida venues...</div>
            </div>
          ):filtered.length===0?(
            <div style={{textAlign:"center",padding:40,color:"#94a3b8"}}>
              <div style={{fontSize:24,marginBottom:8}}>🔍</div>
              <div style={{fontSize:12}}>No venues match your search</div>
            </div>
          ):(
            filtered.map((v,vi)=>{
              const key=venueKey(v);
              const sel=assignedIds.has(key);
              const asgn=fieldAssignments.find(a=>a.venueKey===key);
              const fldCount=asgn?(editFields[key]||asgn.fields||[]).length:0;
              return(
                <div key={vi} onClick={()=>toggleVenue(v)}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",cursor:"pointer",
                    borderBottom:"1px solid #f1f5f9",
                    background:sel?"#f0fdf4":"#fff",transition:"background .08s"}}>

  const [importOk,setImportOk]=useState('');
  function parseDivClass(lbl){const m=(lbl||'').match(/^(\d+)(.*)/);if(!m)return'';const s=m[2].toUpperCase().trim();if(s.startsWith('OP')||s==='O'||s==='0P')return'open';if(s==='AAA')return'aaa';if(s==='AA')return'aa';if(s==='A')return'a';return s.toLowerCase();}
  function teamMatchesDiv(t,divLbl){const divAge=parseInt(((divLbl||'').match(/^(\d+)/)||['','0'])[1]);const divCls=parseDivClass(divLbl);const tCls=(t.cls||'').toUpperCase();const tAge=parseInt((tCls.match(/(\d+)/)||['','0'])[1]);if(tAge!==divAge)return false;if(divCls==='open')return tCls.includes('OPEN')||tCls.includes('OP');if(divCls==='aaa')return tCls.includes('AAA');if(divCls==='aa')return tCls.includes('AA')&&!tCls.includes('AAA');if(divCls==='a')return(tCls.endsWith(' A')||tCls.endsWith('A')||tCls.includes(' A '))&&!tCls.includes('AA');return false;}
  async function syncFromUSSSA(){
    if(syncStatus==='loading')return;

    try{
      const evState=ev.state||'FL';
      const evId=String(ev.evid||ev.id);

      const allTeams=[];

        const r=await fetch(url);const j=await r.json();

      }

      }

      await sr.json();

    try{

  function runTeamSearch(){

  function usssaId(t){return "us_"+String(ev.evid||"")+"_"+(t.team_name||"").replace(/\W+/g,"_");}

  const ENTRY_STATUSES=["Approved","Pending","Hold","Waitlist"];

  function updateRoster(fn){setEvRosters(p=>({...p,[rosterKey]:fn(p[rosterKey]||[])}));}
  function moveTeam(team,targetDivId){
    const targetDiv=divisions.find(d=>d.id===targetDivId);
    if(!targetDiv)return;
    const targetKey=String(ev.id)+"_"+targetDivId;
    updateRoster(prev=>prev.filter(x=>x.id!==team.id));
    setEvRosters(p=>{
      const tgt=p[targetKey]||[];
      if(tgt.some(x=>x.id===team.id))return p;
      return{...p,[targetKey]:[...tgt,{...team,cls:targetDiv.label}]};
    });
    setActionTeamId(null);setMovingTeamId(null);
  }
  function addTeam(team){
    const isUSSSA=!team.id;
    const tid=isUSSSA?usssaId(team):team.id;
    const already=(evRosters[rosterKey]||[]).some(t=>t.id===tid);
    if(already)return;
    const dp=divPricing[rosterKey]||{};
    const rawEntry=team.entry_status||"";
    const rawPay=team.payment_status||"";
    const entryS=rawEntry==="Approved"?"Approved":rawEntry==="Pending"?"Pending":rawEntry==="Hold"?"Hold":"Approved";
    const payS=rawPay==="Paid"?"Paid":rawPay.toLowerCase().includes("partial")?"Partial Paid":"Not Paid";
    updateRoster(prev=>[...prev,{
      id:tid,
      name:team.name||team.team_name||"Unknown",
      city:team.city||team.team_city||"",
      state:team.state||team.team_state||"",
      cls:team.cls||activeDivObj?.label||"",
      pts:team.pts||0,
      phone:team.manager_phone||"",
      email:team.manager_email||"",
      manager:team.manager_name||"",
      entryStatus:entryS,
      payStatus:payS,
      entryFee:dp.entryFee||"",
      gateFee:dp.gateFee||"",
      discount:"",
      notes:""
    }]);
    setTeamSearch("");
  }
  function applyPricingToAll(){
    const dp=divPricing[rosterKey]||{};
    updateRoster(prev=>prev.map(t=>({...t,entryFee:dp.entryFee||t.entryFee,gateFee:dp.gateFee||t.gateFee})));
  }
  function removeTeam(teamId){updateRoster(prev=>prev.filter(t=>t.id!==teamId));}
  function setField(teamId,field,val){updateRoster(prev=>prev.map(t=>t.id===teamId?{...t,[field]:val}:t));}
  function handleSchedule(){
    if(divRoster.length===0){setSchedMsg("Add teams to this division first before opening Schedule Builder.");return;}
    setSchedMsg("");
    if(onSchedule)onSchedule({evId:ev.id,evName:ev.name,divId:activeDivId,divLabel:activeDivObj?activeDivObj.label:"Division",teams:divRoster});
  }

  return(
    <div onClick={()=>setActionTeamId(null)}>
      <div className="flex-b mb4">
        <button className="btn btn-secondary btn-sm" onClick={onBack}>← Back to Events</button>
        <div className="flex-c gap-3">
          
          <Ev_StatusBadge status={ev.status}/>
        </div>
      </div>
      <div className="card mb4">
        <div className="card-body" style={{padding:"14px 20px"}}>
          <div style={{fontSize:20,fontWeight:900,color:"var(--navy)",marginBottom:4}}>{ev.name}</div>
          <div className="t-sm t-gray">📍 {ev.loc} · 📅 {ev.date} · {ev.stature}{ev.director?` · Director: ${ev.director}`:""}</div>
          <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
            {ev.format?<span className="badge b-blue">{ev.format}</span>:null}
            <span className="badge b-gray">{divisions.length} Division{divisions.length!==1?"s":""}</span>
            <span className="badge b-gray">{totalTeams} Teams</span>
            {ev.lwc?<span className="badge b-gold">{ev.lwc==="open"?"Open for Entries":ev.lwc==="waitlist"?"Wait List":ev.lwc==="closed"?"Closed":"On Hold"}</span>:null}
          </div>
        </div>
      </div>
      <div className="tabs" style={{marginBottom:16}}>
        <div className={`tab ${evTab==="roster"?"active":""}`} onClick={()=>setEvTab("roster")}>👥 Teams in Event</div>
        <div className={`tab ${evTab==="director"?"active":""}`} onClick={()=>setEvTab("director")}>🔧 Director Tools</div>
        <div className={`tab ${evTab==="public"?"active":""}`} onClick={()=>setEvTab("public")}>👁 Public View</div>
      </div>
      {evTab==="roster"?(
        <div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16,alignItems:"center"}}>
            {divisions.map(d=>{
              const dk=String(ev.id)+"_"+d.id;
              const divArr=(evRosters[dk]||[]);
              const cnt=divArr.length;
              const paidCnt=divArr.filter(t=>t.payStatus==="Paid").length;
              return(
                <div key={d.id} className={`div-pill ${activeDivId===d.id?"dp-on":"dp-off"}`}
                  onClick={e=>{e.stopPropagation();setActiveDivId(d.id);setActionTeamId(null);setMovingTeamId(null);setTeamSearch("");setSchedMsg("");}}>
                  {d.label}<span style={{fontSize:10,opacity:.65,marginLeft:4}}>{cnt>0?"("+cnt+" entered · "+paidCnt+" paid)":"("+d.numTeams+"t)"}</span>
                </div>
              );
            })}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10,marginBottom:12}}>
            <div className="stat-card"><div className="stat-ico" style={{background:"#dbeafe"}}>👥</div><div><div className="stat-val">{divRoster.length}</div><div className="stat-lbl">Entered</div></div></div>
            <div className="stat-card"><div className="stat-ico" style={{background:"#dcfce7"}}>✓</div><div><div className="stat-val">{approvedCount}</div><div className="stat-lbl">Approved</div></div></div>
            <div className="stat-card"><div className="stat-ico" style={{background:"#d1fae5"}}>💰</div><div><div className="stat-val">{paidCount}</div><div className="stat-lbl">Paid</div></div></div>
            <div className="stat-card"><div className="stat-ico" style={{background:"#fef9c3"}}>$</div><div><div className="stat-val">{"$"+totalPaid.toFixed(0)}</div><div className="stat-lbl">Collected</div></div></div>
            <div className="stat-card"><div className="stat-ico" style={{background:"#fee2e2"}}>!</div><div><div className="stat-val" style={{color:totalOwed>0?"var(--red)":"var(--green)"}}>{"$"+totalOwed.toFixed(0)}</div><div className="stat-lbl">Balance Due</div></div></div>
          </div>
          <div className="card" style={{marginBottom:12}}>
            <div className="card-hd" style={{cursor:"pointer"}} onClick={e=>{e.stopPropagation();setShowPricing(!showPricing);}}>
              <span className="card-title">💲 Division Pricing — {activeDivObj?activeDivObj.label:""}</span>
              <div style={{display:"flex",gap:12,alignItems:"center",fontSize:12,color:"var(--gray)"}}>
                {defPricing.entryFee?<span>Entry: <strong style={{color:"var(--navy)"}}>${defPricing.entryFee}</strong></span>:<span style={{color:"#aaa"}}>No entry fee set</span>}
                {defPricing.gateFee?<span>Gate: <strong style={{color:"var(--navy)"}}>${defPricing.gateFee}</strong></span>:null}
                <span style={{fontSize:11,color:"var(--blue)"}}>{showPricing?"▲ Close":"▼ Edit Pricing"}</span>
              </div>
            </div>
            {showPricing?(
              <div style={{padding:"14px 18px",background:"#f8fafc",borderTop:"1px solid #e2e8f0",display:"flex",gap:16,alignItems:"flex-end",flexWrap:"wrap"}} onClick={e=>e.stopPropagation()}>
                <div><div style={{fontSize:11,fontWeight:700,color:"var(--gray)",marginBottom:4}}>Default Entry Fee ($)</div><input type="number" min="0" step="5" style={{padding:"6px 10px",border:"1px solid #ddd",borderRadius:5,fontSize:13,width:110}} placeholder="e.g. 150" value={defPricing.entryFee} onChange={e=>setDivPricing(p=>({...p,[rosterKey]:{...defPricing,entryFee:e.target.value}}))}/></div>
                <div><div style={{fontSize:11,fontWeight:700,color:"var(--gray)",marginBottom:4}}>Default Gate Fee ($)</div><input type="number" min="0" step="5" style={{padding:"6px 10px",border:"1px solid #ddd",borderRadius:5,fontSize:13,width:110}} placeholder="e.g. 10" value={defPricing.gateFee} onChange={e=>setDivPricing(p=>({...p,[rosterKey]:{...defPricing,gateFee:e.target.value}}))}/></div>
                <button className="btn btn-primary btn-sm" onClick={applyPricingToAll}>Apply to All Teams</button>
                <div style={{fontSize:11,color:"var(--gray)"}}>New teams added will inherit these fees. Use per-team Discount % to reduce individual pricing.</div>
              </div>
            ):null}
          </div>
          <div className="card">

              <span className="card-title">👥 {activeDivObj?activeDivObj.label:"Division"} — Teams in Event ({divRoster.length}{activeDivObj?" / "+activeDivObj.numTeams+"t":""})</span>

                {schedMsg?<span style={{fontSize:12,color:"var(--red)",fontWeight:600}}>⚠ {schedMsg}</span>:null}

                  style={{display:"flex",alignItems:"center",gap:4,fontSize:11}}>
                  📥 Import JSON
                </button>
                <button className="btn btn-secondary btn-sm" onClick={syncFromUSSSA} disabled={syncStatus==='loading'}

                  {syncStatus==='loading'?'⟳ Syncing…':'🔄 Sync USSSA'}

                <button className="btn btn-green btn-sm" onClick={e=>{e.stopPropagation();setShowAdd(true);setUsssaTeams([]);setHasSearched(false);setTeamSearch("");}}

                  ➕ Add Team
                </button>
              </div>
            </div>
            {syncMsg&&<div style={{padding:"8px 18px",fontSize:12,borderTop:"1px solid #e2e8f0",background:syncStatus==='done'?"#f0fdf4":syncStatus==='error'?"#fef2f2":"#fffbeb",color:syncStatus==='done'?"#166534":syncStatus==='error'?"#dc2626":"#92400e",lineHeight:1.5}}>{syncMsg}</div>}

                    <th style={{width:80}}>Entry Fee</th>

                    <th style={{width:70}}>Disc %</th>
                    <th style={{width:80}}>Final Due</th>
                    <th style={{width:110}}>Actions</th>
