                    <strong>Drag</strong> a team onto any open slot to start a matchup —
                    then drag a <strong>second team</strong> onto the same slot to complete it.
                  </div>
                  {halfFill&&(
                    <button onClick={()=>setHalfFill(null)}
                      style={{marginLeft:"auto",fontSize:11,padding:"3px 9px",background:"none",
                        border:"1px solid #93c5fd",borderRadius:4,cursor:"pointer",color:"#dc2626",whiteSpace:"nowrap"}}>
                      ✕ Cancel
                    </button>
                  )}
                </div>

                {/* Pool selector */}
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:.5}}>Pool:</span>
                  {["A","B","C","D","E","F","Open"].map(p=>(
                    <button key={p} onClick={()=>setGamePool(p)}
                      style={{padding:"3px 11px",borderRadius:6,border:gamePool===p?"2px solid #2563eb":"1px solid #d1d5db",
                        background:gamePool===p?"#eff6ff":"#fff",color:gamePool===p?"#1d4ed8":"#374151",
                        fontWeight:700,fontSize:12,cursor:"pointer"}}>
                      {p}
                    </button>
                  ))}
                </div>

                {/* Teams grouped by division */}
                {divs.map(cls=>(
                  <div key={cls} style={{marginBottom:12}}>
                    <div style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1,marginBottom:6,display:"flex",alignItems:"center",gap:6}}>
                      <span style={{background:"#e2e8f0",padding:"1px 7px",borderRadius:10,color:"#475569"}}>{cls}</span>
                      <span style={{fontSize:10,color:"#cbd5e1"}}>{ageTeams.filter(t=>t.cls===cls).length} teams</span>
                    </div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                      {ageTeams.filter(t=>t.cls===cls).map((t,ti)=>{
                        const isHalf1=halfFill&&halfFill.t1Id===t.id;
                        const seed=(t.pts||0)+(t.pr||0);
                        // Count placed games for this team
                        const placedCount=rows.flatMap(r=>Object.values(r.cells))
                          .filter(v=>v&&v!=="blocked")
                          .filter(v=>{const g=games.find(g2=>g2.id===v);return g&&(g.t1===t.id||g.t2===t.id);}).length;
                        const isFull=placedCount>=maxGames;
                        return(
                          <div key={t.id}
                            draggable={isFull?"false":"true"}
                            onDragStart={e=>{
                              if(isFull){e.preventDefault();return;}
                              e.dataTransfer.setData("teamId",t.id);
                              e.dataTransfer.setData("teamCls",cls);
                              e.dataTransfer.effectAllowed="copy";
                            }}
                            title={isFull?`Fully scheduled (${placedCount}/${maxGames} games)`:`${placedCount}/${maxGames} games scheduled`}
                            style={{
                              padding:"7px 12px",borderRadius:8,userSelect:"none",
                              cursor:isFull?"not-allowed":"grab",
                              opacity:isFull?0.42:1,
                              border:isFull?"1.5px solid #e2e8f0":isHalf1?"2px solid #2563eb":"1.5px solid #e2e8f0",
                              background:isFull?"#f1f5f9":isHalf1?"#dbeafe":"#fff",
                              color:isFull?"#94a3b8":isHalf1?"#1d4ed8":"#0f172a",
                              fontSize:13,fontWeight:600,
                              boxShadow:isFull?"none":isHalf1?"0 0 0 3px rgba(37,99,235,.15)":"0 1px 3px rgba(0,0,0,.06)",
                              transition:"all .12s",display:"flex",alignItems:"center",gap:7,
                              filter:isFull?"grayscale(1)":"none"
                            }}>
                            {/* Seed rank badge */}
                            <span style={{width:20,height:20,borderRadius:"50%",
                              background:isFull?"#cbd5e1":isHalf1?"#1d4ed8":"#1e3a5f",color:"#fff",
                              fontSize:9,fontWeight:900,display:"flex",alignItems:"center",
                              justifyContent:"center",flexShrink:0}}>{ti+1}</span>
                            <span>{t.name}</span>
                            {/* Game count pill — always visible */}
                            <span style={{marginLeft:"auto",fontSize:9,fontWeight:800,
                              color:isFull?"#fff":"#475569",
                              background:isFull?"#94a3b8":"#e2e8f0",
                              borderRadius:10,padding:"1px 6px",whiteSpace:"nowrap",flexShrink:0}}>
                              {isFull?"✓ done":`${placedCount}/${maxGames}`}
                            </span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      })()}

      {/* Picked-game move banner (only shows when moving a placed game via ↩ icon) */}
      {picked&&pickedGame&&(
        <div style={{background:"#eff6ff",border:"2px solid #93c5fd",borderRadius:8,padding:"10px 16px",
          marginBottom:12,display:"flex",alignItems:"center",gap:10,boxShadow:"0 2px 8px rgba(37,99,235,.1)"}}>
          <span style={{fontSize:22}}>✋</span>
          <div>
            <strong style={{color:"#1d4ed8",fontSize:13}}>Moving {pickedGame.num}</strong>
            <span style={{fontSize:12,color:"#475569",marginLeft:8}}>Click any open slot to drop it</span>
          </div>
          <button onClick={()=>setPicked(null)} style={{marginLeft:"auto",...B("#fff","#dc2626",{border:"1.5px solid #fca5a5",padding:"4px 12px"})}}>✕ Cancel</button>
        </div>
      )}

      {/* ── Drop Validation Alert ── */}
      {dropAlert&&(
        <div style={{background:"#fef2f2",border:"2px solid #fca5a5",borderRadius:8,padding:"12px 16px",
          marginBottom:12,display:"flex",alignItems:"flex-start",gap:10,boxShadow:"0 2px 8px rgba(220,38,38,.12)"}}>
          <span style={{fontSize:20,flexShrink:0}}>🚫</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,color:"#dc2626",fontSize:13,marginBottom:4}}>Scheduling Conflict</div>
            {dropAlert.map((msg,i)=>(
              <div key={i} style={{fontSize:12,color:"#7f1d1d",lineHeight:1.5}}>• {msg}</div>
            ))}
          </div>
          <button onClick={()=>setDropAlert(null)} style={{background:"none",border:"none",cursor:"pointer",color:"#dc2626",fontSize:16,flexShrink:0}}>✕</button>
        </div>
      )}

      {/* ── Field Pagination Nav (shown when nf > FIELDS_PER_PAGE) ── */}
      {nf>FIELDS_PER_PAGE&&(
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,padding:"7px 14px",
          background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:7}}>
          <button onClick={()=>setFieldPageStart(s=>Math.max(0,s-FIELDS_PER_PAGE))}
            disabled={fieldPageStart===0}
            style={{padding:"4px 12px",borderRadius:5,border:"1px solid #0ea5e9",fontWeight:800,fontSize:12,cursor:fieldPageStart===0?"not-allowed":"pointer",
              background:fieldPageStart===0?"#e0f2fe":"#0ea5e9",color:fieldPageStart===0?"#94a3b8":"#fff"}}>
            ◀ Prev
          </button>
          <span style={{fontSize:12,fontWeight:700,color:"#0369a1",flex:1,textAlign:"center"}}>
            Showing Fields {fieldPageStart+1}–{Math.min(fieldPageStart+FIELDS_PER_PAGE,nf)} of {nf}
          </span>
          <button onClick={()=>setFieldPageStart(s=>Math.min(Math.max(0,nf-FIELDS_PER_PAGE),s+FIELDS_PER_PAGE))}
            disabled={fieldPageStart+FIELDS_PER_PAGE>=nf}
            style={{padding:"4px 12px",borderRadius:5,border:"1px solid #0ea5e9",fontWeight:800,fontSize:12,
              cursor:fieldPageStart+FIELDS_PER_PAGE>=nf?"not-allowed":"pointer",
              background:fieldPageStart+FIELDS_PER_PAGE>=nf?"#e0f2fe":"#0ea5e9",
              color:fieldPageStart+FIELDS_PER_PAGE>=nf?"#94a3b8":"#fff"}}>
            Next ▶
          </button>
        </div>
      )}

      {/* ══ Schedule Grid ══ */}
      <div style={{overflowX:"auto",border:"1px solid #cbd5e1",borderRadius:8,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
        <table style={{borderCollapse:"collapse",fontSize:12}}>
          <thead>
            <tr>
              <th style={STH(SL[0],SW[0])}>Row</th>
              <th style={STH(SL[1],SW[1])}>Date</th>
              <th style={{...STH(SL[2],SW[2]),boxShadow:"3px 0 8px rgba(0,0,0,.18)"}}>Time</th>
              {fields.map((f,lfi)=>{
                const fi=fieldPageStart+lfi;
                const [hBg,hBdr]=[getFC(fi)[0],getFC(fi)[1]];
                return(
                <th key={fi} style={{background:hBg,color:"#fff",padding:"7px 8px",
                  textAlign:"center",minWidth:170,borderLeft:`3px solid ${hBdr}`,verticalAlign:"middle"}}>
                  <div style={{fontSize:9,color:"rgba(255,255,255,.6)",fontWeight:700,letterSpacing:.8,marginBottom:2,textTransform:"uppercase"}}>Field {fi+1}</div>
                  <button onClick={e=>{e.stopPropagation();setFieldPickModal({fi});}}
                    style={{fontSize:11,padding:"3px 8px",borderRadius:4,border:"1px solid rgba(255,255,255,.4)",
                      background:"rgba(255,255,255,.15)",color:"#fff",cursor:"pointer",fontWeight:700,
                      width:"100%",textAlign:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                    {fieldNames[fi]||`Field ${fi+1}`} ✎
                  </button>
                </th>
                );
              })}
              <th style={{background:NAVY,padding:"7px 6px",width:52,borderLeft:"2px solid rgba(255,255,255,.1)"}}></th>
            </tr>
          </thead>
          <tbody>
            {dayGroups.map((date,dgi)=>{
              const dayRows=rows.filter(r=>r.date===date);
              const d=new Date(date+"T12:00:00");
              const dayName=d.toLocaleDateString('en-US',{weekday:'long'});
              const mo=d.getMonth()+1,dd2=d.getDate(),yr=d.getFullYear();
              const dispDate=`${mo}/${dd2}/${yr}`;
              const dayBg=["#f0f4ff","#f0fff4","#fff8f0","#fdf4ff","#f0f9ff","#fefce8"][dgi%6];
              return(
                <React.Fragment key={date}>
                  {/* Day header row */}
                  <tr>
                    <td colSpan={3+fields.length+1} style={{padding:0,position:"sticky",left:0,zIndex:2}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,padding:"6px 12px",
                        background:dayBg,borderTop:"2px solid #e2e8f0",borderBottom:"1px solid #e2e8f0"}}>
                        <button onClick={()=>blockDay(date)}
                          style={B("#16a34a","#fff",{fontSize:11,padding:"4px 12px",borderRadius:4})}>
                          Block This Day
                        </button>
                        <span style={{fontWeight:800,color:"#1e293b",fontSize:13}}>{dayName}</span>
                        <span style={{fontSize:11,color:"#94a3b8",fontWeight:500}}>{dispDate}</span>
                        <span style={{fontSize:11,color:"#94a3b8",marginLeft:4}}>· {dayRows.length} slot{dayRows.length!==1?"s":""}</span>
                      </div>
                    </td>
                  </tr>
                  {/* Rows for this day */}
                  {dayRows.map((row,ri)=>{
                    const rowBg=ri%2===0?"#fff":"#f9fafb";
                    return(
                      <tr key={row.id}>
                        <td style={STD(SL[0],SW[0],rowBg,{fontWeight:800,fontSize:14,color:NAVY,borderBottom:"1px solid #f1f5f9"})}>{row.num}</td>
                        <td style={STD(SL[1],SW[1],rowBg,{borderBottom:"1px solid #f1f5f9"})}>
                          <input type="date" value={row.date} onChange={e=>updRow(row.id,"date",e.target.value)}
                            style={{...F,width:108,fontSize:11,padding:"3px 4px"}}/>
                        </td>
                        <td style={{...STD(SL[2],SW[2],rowBg,{borderBottom:"1px solid #f1f5f9"}),boxShadow:"2px 0 6px rgba(0,0,0,.06)"}}>
                          <select value={row.time} onChange={e=>updRow(row.id,"time",e.target.value)}
                            style={{...F,width:108,fontSize:11,padding:"3px 4px"}}>
                            {TIME_OPTS.map(t=><option key={t}>{t}</option>)}
                          </select>
                        </td>
                        {fields.map((fieldLabel,lfi)=>{
                          const fi=fieldPageStart+lfi;
                          const val=row.cells[fi];
                          const game=val&&val!=="blocked"?games.find(g=>g.id===val):null;
                          const isBlocked=val==="blocked";
                          const canPlace=!!picked&&!isBlocked&&!game;
                          const isHalfThis=halfFill&&halfFill.rowId===row.id&&halfFill.fi===fi;
                          // Always show full team names
                          const t1obj=game?tByIdFrom(game.t1,teams):null;
                          const t2obj=game?tByIdFrom(game.t2,teams):null;
                          const t1n=t1obj?.name||"TBD";
                          const t2n=t2obj?.name||"TBD";
                          const half1obj=isHalfThis?teams.find(t=>t.id===halfFill.t1Id):null;
                          const homeId=game?(game.home||game.t1):null;
                          const awayId=game?(homeId===game.t1?game.t2:game.t1):null;
                          const homeName=homeId?(tByIdFrom(homeId,teams)?.name||"TBD"):t1n;
                          const awayName=awayId?(tByIdFrom(awayId,teams)?.name||"TBD"):t2n;
                          const [hBg,hBdr,tintEven,tintOdd,accentText,accentBorder]=getFC(fi);
                          let cellBg=ri%2===0?tintEven:tintOdd;
                          if(isBlocked)cellBg="#fee2e2";
                          else if(isHalfThis)cellBg="#eff6ff";
                          else if(canPlace)cellBg=tintEven;
                          else if(game)cellBg=ri%2===0?tintEven:tintOdd;
                          return(
                            <td key={fi} onClick={()=>{setSelCell(row.id+'|'+fi);clickCell(row.id,fi);}}
                              onDragOver={e=>{if(!game&&!isBlocked){e.preventDefault();e.dataTransfer.dropEffect="copy";}}}
                              onDrop={e=>{
                                e.preventDefault();
                                const teamId=e.dataTransfer.getData("teamId");
                                const teamCls=e.dataTransfer.getData("teamCls");
                                if(!teamId||game||isBlocked)return;
                                if(isHalfThis){
                                  // Second team — validate both, then complete matchup
                                  if(teamId===halfFill.t1Id)return;
                                  const errs1=validateDrop(halfFill.t1Id,row.id);
                                  const errs2=validateDrop(teamId,row.id);
                                  const allErrs=[...errs1,...errs2];
                                  if(allErrs.length>0){showDropAlert(allErrs);return;}
                                  const gameId=`gx_${Date.now()}`;
                                  const num=`G${games.length+1}`;
                                  const cls=teams.find(t=>t.id===halfFill.t1Id)?.cls||teamCls||"";
                                  setGames(pg=>[...pg,{id:gameId,num,pool:gamePool,division:cls,
                                    date:row.date,time:row.time,field:fieldLabel,
                                    t1:halfFill.t1Id,t2:teamId,home:halfFill.t1Id,
                                    s1:null,s2:null,status:"scheduled"}]);
                                  setRows(prev=>prev.map(r=>r.id===row.id?{...r,cells:{...r.cells,[fi]:gameId}}:r));
                                  setHalfFill(null);
                                }else{
                                  // First team — validate then set halfFill
                                  const errs=validateDrop(teamId,row.id);
                                  if(errs.length>0){showDropAlert(errs);return;}
                                  setHalfFill({rowId:row.id,fi,t1Id:teamId});
                                }
                              }}
                              style={{borderLeft:`3px solid ${hBdr}`,borderBottom:"1px solid #e2e8f0",
                                padding:0,verticalAlign:"middle",
                                minWidth:170,background:cellBg,cursor:"pointer",transition:"background .1s",
                                outline:isHalfThis?"2px dashed #2563eb":"none"}}>
                              {game?(
                                <div style={{padding:"4px 5px"}}>
                                  <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",alignItems:"center",gap:3}}>
                                    <div style={{textAlign:"right",minWidth:0}}>
                                      {showHomeAway?<span style={{fontSize:8,fontWeight:800,color:"#16a34a",background:"#dcfce7",borderRadius:3,padding:"0 4px",display:"inline-block",marginBottom:2,letterSpacing:.3}}>HOME</span>:null}
                                      <div style={{fontSize:10,fontWeight:800,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.2}}>{homeName}</div>
                                    </div>
                                    <div style={{textAlign:"center",flexShrink:0,padding:"0 3px"}}>
                                      <div style={{fontSize:8,color:"#94a3b8",fontWeight:700,lineHeight:1}}>vs</div>
                                      {showHomeAway?<button onClick={ev=>{ev.stopPropagation();setGames(prev=>prev.map(g=>g.id===game.id?{...g,home:g.home===g.t1?g.t2:g.t1}:g));}} title="Swap Home/Away" style={{background:"none",border:"1px solid #d1d5db",borderRadius:4,cursor:"pointer",fontSize:10,padding:"1px 4px",color:"#64748b",marginTop:2,display:"block",lineHeight:1}}>⇄</button>:null}
                                    </div>
                                    <div style={{textAlign:"left",minWidth:0}}>
                                      {showHomeAway?<span style={{fontSize:8,fontWeight:800,color:"#64748b",background:"#f1f5f9",borderRadius:3,padding:"0 4px",display:"inline-block",marginBottom:2,letterSpacing:.3}}>AWAY</span>:null}
                                      <div style={{fontSize:10,fontWeight:800,color:"#0f172a",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",lineHeight:1.2}}>{awayName}</div>
                                    </div>
                                  </div>
                                  <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:4,marginTop:3,paddingTop:3,borderTop:"1px solid rgba(0,0,0,.06)"}}>
                                    {game.division?<span style={{fontSize:8,background:hBg,color:"#fff",borderRadius:3,padding:"1px 5px",fontWeight:800}}>{game.division}</span>:null}
                                    {game.pool?<span style={{fontSize:8,background:accentBorder,color:hBg,borderRadius:3,padding:"1px 5px",fontWeight:700}}>Pool {game.pool}</span>:null}
                                    <span style={{color:"#16a34a",fontSize:12,fontWeight:700,marginLeft:2}}>✓</span>
                                    <span onClick={ev=>{ev.stopPropagation();setPicked(val);setRows(prev=>prev.map(r=>{if(r.id!==row.id)return r;const c={...r.cells};delete c[fi];return{...r,cells:c};}));}} title="Move to another slot" style={{color:"#f59e0b",fontSize:12,cursor:"pointer"}}>↩</span>
                                    <span onClick={ev=>{ev.stopPropagation();setRows(prev=>prev.map(r=>{if(r.id!==row.id)return r;const c={...r.cells};delete c[fi];return{...r,cells:c};}));}} title="Remove game" style={{color:"#dc2626",fontSize:12,cursor:"pointer"}}>✕</span>
                                  </div>
                                </div>
                              ):isBlocked?(
                                <div style={{padding:"8px 4px",background:"#fee2e2"}}>
                                  <div style={{fontSize:10,fontWeight:800,color:"#dc2626",letterSpacing:.5}}>BLOCKED</div>
                                  <div style={{fontSize:11,color:"#fca5a5",marginTop:2}}>click to unblock</div>
                                </div>
                              ):isHalfThis?(
                                <div style={{padding:"4px 6px"}} onClick={ev=>ev.stopPropagation()}>
                                  <div style={{fontSize:10,fontWeight:800,color:"#1d4ed8",overflow:"hidden",
                                    textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:3}}>
                                    🏠 {half1obj?.name||"Team 1"}
                                  </div>
                                  <div style={{display:"flex",gap:3,alignItems:"center",marginBottom:3}}>
                                    <input
                                      placeholder="Add opponent..."
                                      value={cellPickModal?.rowId===row.id&&cellPickModal?.fi===fi?cellPickSearch:""}
                                      onClick={ev=>{ev.stopPropagation();const r=ev.currentTarget.getBoundingClientRect();setCellPickPos({bottom:r.bottom+2,left:r.left});setCellPickSearch("");setCellPickModal({rowId:row.id,fi,fieldLabel,step:2,t1Id:halfFill.t1Id});}}
                                      onChange={ev=>{ev.stopPropagation();const r=ev.currentTarget.getBoundingClientRect();setCellPickPos({bottom:r.bottom+2,left:r.left});setCellPickSearch(ev.target.value);setCellPickModal({rowId:row.id,fi,fieldLabel,step:2,t1Id:halfFill.t1Id});}}
                                      style={{flex:1,padding:"3px 5px",border:"1px solid #93c5fd",borderRadius:4,fontSize:10,minWidth:0,boxSizing:"border-box"}}/>
                                    <button onClick={ev=>{ev.stopPropagation();const r=ev.currentTarget.getBoundingClientRect();setCellPickPos({bottom:r.bottom+2,left:r.left});setCellPickSearch("");setCellPickModal({rowId:row.id,fi,fieldLabel,step:2,t1Id:halfFill.t1Id});}}
                                      style={{background:"#eff6ff",border:"1px solid #93c5fd",borderRadius:4,padding:"3px 6px",cursor:"pointer",fontSize:10,color:"#1d4ed8",flexShrink:0}}>▼</button>
                                  </div>
                                  <div onClick={ev=>{ev.stopPropagation();setHalfFill(null);}}
                                    style={{fontSize:9,color:"#dc2626",cursor:"pointer"}}>✕ cancel</div>
                                </div>
                              ):(
                                <div style={{padding:"4px 6px"}} onClick={ev=>ev.stopPropagation()}>
                                  {canPlace?(
                                    <div style={{fontSize:12,fontWeight:700,color:accentText,padding:"6px 0",textAlign:"center"}}>→ Drop Here</div>
                                  ):(
                                    <div style={{display:"flex",gap:3,alignItems:"center"}}>
                                      <input
                                        placeholder={selAge?`${selAge}U teams...`:"pick age ↑"}
                                        disabled={!selAge}
                                        value={cellPickModal?.rowId===row.id&&cellPickModal?.fi===fi?cellPickSearch:""}
                                        onClick={ev=>{ev.stopPropagation();if(!selAge)return;const r=ev.currentTarget.getBoundingClientRect();setCellPickPos({bottom:r.bottom+2,left:r.left});setCellPickSearch("");setCellPickModal({rowId:row.id,fi,fieldLabel,step:1,t1Id:null});}}
                                        onChange={ev=>{ev.stopPropagation();if(!selAge)return;const r=ev.currentTarget.getBoundingClientRect();setCellPickPos({bottom:r.bottom+2,left:r.left});setCellPickSearch(ev.target.value);setCellPickModal({rowId:row.id,fi,fieldLabel,step:1,t1Id:null});}}
                                        style={{flex:1,padding:"3px 5px",border:"1px solid #e2e8f0",borderRadius:4,
                                          fontSize:10,minWidth:0,cursor:selAge?"text":"not-allowed",
                                          background:selAge?"#fff":"#f8fafc",boxSizing:"border-box"}}/>
                                      <button onClick={ev=>{ev.stopPropagation();if(!selAge)return;const r=ev.currentTarget.getBoundingClientRect();setCellPickPos({bottom:r.bottom+2,left:r.left});setCellPickSearch("");setCellPickModal({rowId:row.id,fi,fieldLabel,step:1,t1Id:null});}}
                                        disabled={!selAge}
                                        style={{background:"#f1f5f9",border:"1px solid #e2e8f0",borderRadius:4,
                                          padding:"3px 6px",cursor:selAge?"pointer":"not-allowed",
                                          fontSize:10,color:"#475569",flexShrink:0}}>▼</button>
                                    </div>
                                  )}
                                </div>
                              )}
                            </td>
                          );
                        })}
                        <td style={{borderLeft:"2px solid #e2e8f0",borderBottom:"1px solid #f1f5f9",
                          padding:"4px 6px",textAlign:"center",background:rowBg,whiteSpace:"nowrap",verticalAlign:"middle"}}>

/* ════════════════════ POOL STANDINGS ════════════════════ */
function calcUSSSAStandings(teams,games){
  const s={};
  teams.forEach(t=>{s[t.id]={...t,w:0,l:0,t_:0,pf:0,pa:0,gp:0,rdMax8Sum:0}});
  games.forEach(g=>{
    if(g.status!=="final"||g.s1==null||g.s2==null)return;
    if(!s[g.t1]||!s[g.t2])return;
    s[g.t1].pf+=g.s1;s[g.t1].pa+=g.s2;s[g.t1].gp++;
    s[g.t2].pf+=g.s2;s[g.t2].pa+=g.s1;s[g.t2].gp++;
    const cap=Math.min(8,Math.abs(g.s1-g.s2));
    const rd1=g.s1>g.s2?cap:g.s1<g.s2?-cap:0;
    s[g.t1].rdMax8Sum+=rd1;s[g.t2].rdMax8Sum-=rd1;
    if(g.s1>g.s2){s[g.t1].w++;s[g.t2].l++}
    else if(g.s2>g.s1){s[g.t2].w++;s[g.t1].l++}
    else{s[g.t1].t_++;s[g.t2].t_++}
  });
  // Build base stats array
  const arr=Object.values(s).map(t=>({
    ...t,
    record:`${t.w}-${t.l}-${t.t_}`,
    winPct:t.gp>0?Math.round((t.w+t.t_*0.5)/t.gp*1000):0,
    avgRA:t.gp>0?(t.pa/t.gp).toFixed(1):"—",
    avgRS:t.gp>0?(t.pf/t.gp).toFixed(1):"—",
    avgRD:t.gp>0?((t.pf-t.pa)/t.gp).toFixed(1):"—",
    avgRDMax8:t.gp>0?(t.rdMax8Sum/t.gp).toFixed(1):"—",
    h2hW:0,h2hL:0,h2hT:0,h2hGP:0,h2hWinPct:0,h2hAllPlayed:false,h2hRecord:"—",
  }));
  // Step 4: Compute H2H among tied groups (same winPct)
  // Only valid if ALL tied teams have played each other
  const byWP={};
  arr.forEach(t=>{if(!byWP[t.winPct])byWP[t.winPct]=[];byWP[t.winPct].push(t);});
  Object.values(byWP).forEach(grp=>{
    if(grp.length<2)return;
    const ids=new Set(grp.map(t=>t.id));
    const h2h=games.filter(g=>g.status==="final"&&g.s1!=null&&g.s2!=null&&ids.has(g.t1)&&ids.has(g.t2));
    // Check all n*(n-1)/2 unique pairs played
    const pairs=new Set(h2h.map(g=>[g.t1,g.t2].sort().join("|")));
    const n=grp.length;
    const allPlayed=pairs.size>=n*(n-1)/2;
    h2h.forEach(g=>{
      const a=arr.find(t=>t.id===g.t1),b=arr.find(t=>t.id===g.t2);
      if(!a||!b)return;
      a.h2hGP++;b.h2hGP++;
      if(g.s1>g.s2){a.h2hW++;b.h2hL++;}
      else if(g.s2>g.s1){b.h2hW++;a.h2hL++;}
      else{a.h2hT++;b.h2hT++;}
    });
    grp.forEach(t=>{
      t.h2hAllPlayed=allPlayed;
      t.h2hWinPct=t.h2hGP>0?Math.round((t.h2hW+t.h2hT*0.5)/t.h2hGP*1000):0;
      t.h2hRecord=t.h2hGP>0?`${t.h2hW}-${t.h2hL}-${t.h2hT}`:"—";
    });
  });
  // Full 8-step USSSA sort
  return arr.sort((a,b)=>{
    if(b.winPct!==a.winPct)return b.winPct-a.winPct;           // 1. Win%
    if(b.w!==a.w)return b.w-a.w;                               // 2. Wins
    if(a.l!==b.l)return a.l-b.l;                               // 3. Losses
    // 4. H2H Win% — only if all tied teams played each other
    if(a.h2hAllPlayed&&b.h2hAllPlayed&&(a.h2hGP>0||b.h2hGP>0)){
      if(b.h2hWinPct!==a.h2hWinPct)return b.h2hWinPct-a.h2hWinPct;
    }
    const paA=a.gp>0?a.pa/a.gp:999,paB=b.gp>0?b.pa/b.gp:999;
    if(Math.abs(paA-paB)>0.001)return paA-paB;                 // 5. Avg PA asc
    const rdA=parseFloat(a.avgRDMax8||0),rdB=parseFloat(b.avgRDMax8||0);
    if(Math.abs(rdA-rdB)>0.001)return rdB-rdA;                 // 6. Avg RD Max8 desc
    return (b.pts||0)-(a.pts||0);                               // 7. USSSA Points desc
  });
}
function StandingsView({standingsCtx,setStandingsCtx,events,evRosters,allGames}){
  const NAVY="#1e3a5f";
  const [noTeamsMsg,setNoTeamsMsg]=useState('');

  // Load teams for a selected event (same pattern as other tools)
  async function loadEvent(ev){
    if(!ev||!setStandingsCtx)return;
    const normalizedDivs=(ev.divisions||[]).map(normDiv);
    const divCounts={};
    let allTeams=normalizedDivs.flatMap(d=>{
      const rk=String(ev.id)+"_"+d.id;
      const t=(evRosters&&evRosters[rk])||[];
      if(d.label)divCounts[d.label]=t.length||d.numTeams||0;
      return t;
    });
    const usssaId=String(ev.evid||ev.id);
    setStandingsCtx({evId:String(ev.id),usssaId,evName:ev.name,teams:allTeams,divCounts,loadingTeams:!allTeams.length,_divisions:ev.divisions||[]});
    if(!allTeams.length){
      setStandingsCtx(prev=>prev?{...prev,loadingTeams:true}:null);
      try{
        const r=await fetch('https://usssa-poller.chad-157.workers.dev/event-teams?event_id='+encodeURIComponent(usssaId));
        const j=await r.json();
        if(j.status==='ok'&&j.teams&&j.teams.length){
          const evId=String(ev.id);
          const appTeams=j.teams.map(t=>({
            id:'us_'+evId+'_'+(t.team_name||'').replace(/\W+/g,'_'),
            name:t.team_name||'',cls:t.division||'',city:t.team_city||'',
            state:t.team_state||'FL',pts:t.pts||0,pr:t.pr||0,
            icr:t.icr||'',ovr:t.ovr||''
          }));

/* ════════════════════ BRACKET GENERATOR ════════════════════ */
function genBracketGames(seeds){
  const N=seeds.length;
  if(N<2)return[];
  const R=Math.ceil(Math.log2(Math.max(N,2)));
  const P=Math.pow(2,R);
  function seedPos(sz){
    if(sz===2)return[0,1];
    // Standard bracket seeding: seed1 top, seed2 bottom, ensures 1v2 only in final
    // For 8 teams produces: 1v8, 4v5, 3v6, 2v7 (matches USSSA/NCAA standard)
    const prev=seedPos(sz/2);
    const half=sz/4;
    const top=prev.slice(0,half);
    const bot=prev.slice(half).reverse(); // reverse bottom half so seed2 stays at bottom
    const r=[];
    for(const x of top){r.push(x);r.push(sz-1-x)}
    for(const x of bot){r.push(x);r.push(sz-1-x)}
    return r;
  }
  const pos=seedPos(P);
  const gs=[];let gn=1;
  for(let p=0;p<P/2;p++){
    const si1=pos[p*2],si2=pos[p*2+1];
    const t1=si1<N?seeds[si1].id:null;
    const t2=si2<N?seeds[si2].id:null;
    const bye=!(t1&&t2);
    // Store which seed number each slot represents (used for badge display)
    const realSn1=t1?si1+1:si2+1; // the team that actually plays
    const realSn2=bye?null:si2+1;
    gs.push({id:`bg${gn}`,num:`G${gn}`,round:1,
      t1:t1||t2,t2:bye?null:(t1?t2:null),
      sn1:realSn1,sn2:realSn2,
      s1:null,s2:null,status:bye?"bye":"scheduled",date:"",time:"",field:""});
    gn++;
  }
  for(let r=2;r<=R;r++){
    const cnt=P/Math.pow(2,r);
    for(let p=0;p<cnt;p++){
      gs.push({id:`bg${gn}`,num:`G${gn}`,round:r,t1:null,t2:null,s1:null,s2:null,status:"scheduled",date:"",time:"",field:""});
      gn++;
    }
  }
  // Auto-advance bye teams into their next-round slots
  const allRounds=[...new Set(gs.map(g=>g.round))].sort((a,b)=>a-b);
  for(const r of allRounds.slice(0,-1)){
    const rGames=gs.filter(g=>g.round===r);
    const rNext=gs.filter(g=>g.round===r+1);
    rGames.forEach((g,pos)=>{
      if(g.status==="bye"&&g.t1){
        const ng=rNext[Math.floor(pos/2)];
        if(ng){if(pos%2===0)ng.t1=g.t1;else ng.t2=g.t1;}
      }
    });
  }
  return gs;
}

function BracketBuilderView({teams,games=[],onBuild}){
  const NAVY="#1e3a5f";
  const TEAL="#0e7490";

  /* ── compute standings-ranked team list ── */
  const rankedTeams=React.useMemo(()=>{
    if(!games.length)return teams;
    const s=calcUSSSAStandings(teams,games);
    // s is already sorted by winPct, wins, etc.
    return s.map(row=>teams.find(t=>t.id===row.id)||row).filter(Boolean);
  },[teams,games]);

  const [count,setCount]=useState(()=>Math.max(4,Math.min(32,teams.length||8)));
  const [names,setNames]=useState(()=>Array(32).fill("").map((_,i)=>rankedTeams[i]?rankedTeams[i].name:""));

  /* ── scheduling state ── */
  const [numFields,setNumFields]=useState(1);
  const [gameMins,setGameMins]=useState(120);   // game duration in minutes
  const [gapMins,setGapMins]=useState(15);      // gap between games (buffer)
  const [startDate,setStartDate]=useState(()=>{const d=new Date();return d.toISOString().slice(0,10)});
  const [startTime,setStartTime]=useState("08:00");

  /* reset seeds to standings order */
  function loadFromStandings(){
    setNames(Array(32).fill("").map((_,i)=>rankedTeams[i]?rankedTeams[i].name:""));
  }

  /* ── auto-schedule helper ────────────────────────────────────────
     Distributes games across fields, round by round.
     Byes are skipped (no field/time needed).
     Within a round, games are spread across fields simultaneously;
     each "wave" of F games occupies one timeslot.
     The next round starts after all current-round games finish + gap.
  ──────────────────────────────────────────────────────────────── */
  function applySchedule(gs){
    const slotMins=parseInt(gameMins)+parseInt(gapMins);
    const F=parseInt(numFields)||1;
    // parse startTime "HH:MM" → minutes since midnight
    const [sh,sm]=startTime.split(":").map(Number);
    let curMin=sh*60+(sm||0);

    const rounds=[...new Set(gs.map(g=>g.round))].sort((a,b)=>a-b);
    rounds.forEach(r=>{
      // include all non-bye games in this round — later rounds have t1/t2=null (TBD) but still need scheduled times
      const playable=gs.filter(g=>g.round===r&&g.status!=="bye");
      if(!playable.length)return;
      let wave=0;
      playable.forEach((g,i)=>{
        wave=Math.floor(i/F);
        const fieldNum=(i%F)+1;
        const tMin=curMin+wave*slotMins;
        const hh=Math.floor(tMin/60)%24;
        const mm=tMin%60;
        const ampm=hh<12?"AM":"PM";
        const h12=hh===0?12:hh>12?hh-12:hh;
        const timeStr=`${h12}:${mm.toString().padStart(2,"0")} ${ampm}`;
        g.date=startDate;
        g.time=timeStr;
        g.field=`F${fieldNum}`;
      });
      // advance clock past all waves in this round + one extra gap
      curMin+=((wave+1)*slotMins);
    });
    return gs;
  }

  function build(){
    const seeds=Array.from({length:count}).map((_,i)=>{
      const nm=names[i]||`Team ${i+1}`;
      const t=teams.find(t2=>t2.name.toLowerCase()===nm.toLowerCase());
      return{id:t?t.id:`seed_${i+1}`,name:nm,cls:t?t.cls:"",state:t?t.state:""};
    });
    const gs=genBracketGames(seeds);
    applySchedule(gs);
    onBuild(gs,seeds);
  }

  const P=Math.pow(2,Math.ceil(Math.log2(Math.max(count,2))));
  const byes=P-count;

  /* seed badge color */
  const seedBg=i=>i===0?"#b45309":i===1?"#1d4ed8":i===2?"#7c3aed":NAVY;

  /* preview: what matchups will the seeding produce? */
  function previewMatchups(){
    const sz=P;
    function seedPos(s){
      if(s===2)return[0,1];
      const prev=seedPos(s/2);
      const h=s/4;
      const top=prev.slice(0,h);
      const bot=prev.slice(h).reverse();
      const r=[];
      for(const x of top){r.push(x);r.push(s-1-x)}
      for(const x of bot){r.push(x);r.push(s-1-x)}
      return r;
    }
    const pos=seedPos(sz);
    const matchups=[];
    for(let p=0;p<sz/2;p++){
      const i1=pos[p*2],i2=pos[p*2+1];
      const n1=i1<count?(names[i1]||`Seed ${i1+1}`):"BYE";
      const n2=i2<count?(names[i2]||`Seed ${i2+1}`):"BYE";
      const bye=i1>=count||i2>=count;
      matchups.push({s1:i1+1,s2:i2+1,n1,n2,bye});
    }
    return matchups;
  }
  const matchups=previewMatchups();

  return(
    <div style={{maxWidth:680}}>
      <div style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:10,padding:"18px",marginBottom:14}}>
        {/* Header row */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontWeight:800,fontSize:14,color:NAVY}}>⚙️ Bracket Setup</div>
          {rankedTeams.length>0&&(
            <button onClick={loadFromStandings}
              style={{padding:"5px 11px",background:"#f0f9ff",border:"1px solid #bae6fd",borderRadius:5,
                fontSize:11,fontWeight:700,color:TEAL,cursor:"pointer"}}>
              ↺ Load from Standings
            </button>
          )}
        </div>

        {/* Count + format row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:"#475569",display:"block",marginBottom:4}}>Number of Teams</label>
            <select value={count} onChange={e=>setCount(parseInt(e.target.value))}
              style={{width:"100%",padding:"7px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13,fontWeight:600}}>
              {Array.from({length:29},(_,i)=>i+4).map(n=>{
                const p2=Math.pow(2,Math.ceil(Math.log2(Math.max(n,2))));
                const b=p2-n;
                return<option key={n} value={n}>{n} Teams{b>0?` — ${b} bye${b>1?"s":""}`:"  (no byes)"}</option>;
              })}
            </select>
          </div>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:"#475569",display:"block",marginBottom:4}}>Format</label>
            <select style={{width:"100%",padding:"7px 10px",border:"1px solid #cbd5e1",borderRadius:6,fontSize:13,fontWeight:600}}>
              <option>Single Elimination</option>
            </select>
          </div>
        </div>

        {/* ── Schedule Configuration ── */}
        <div style={{background:"#f1f5f9",border:"1px solid #cbd5e1",borderRadius:8,padding:"12px 14px",marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:800,color:NAVY,marginBottom:10,textTransform:"uppercase",letterSpacing:.6}}>
            📅 Game Schedule
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:10}}>
            {/* # Fields */}
            <div>
              <label style={{fontSize:10,fontWeight:700,color:"#475569",display:"block",marginBottom:3}}># Fields</label>
              <select value={numFields} onChange={e=>setNumFields(parseInt(e.target.value))}
                style={{width:"100%",padding:"6px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,fontWeight:600,background:"#fff"}}>
                {[1,2,3,4,5,6,7,8].map(n=><option key={n} value={n}>{n} Field{n>1?"s":""}</option>)}
              </select>
            </div>
            {/* Game Time */}
            <div>
              <label style={{fontSize:10,fontWeight:700,color:"#475569",display:"block",marginBottom:3}}>Game Time</label>
              <select value={gameMins} onChange={e=>setGameMins(parseInt(e.target.value))}
                style={{width:"100%",padding:"6px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,fontWeight:600,background:"#fff"}}>
                {[[60,"1 hr"],[75,"1¼ hr"],[90,"1½ hr"],[105,"1¾ hr"],[120,"2 hr"],[135,"2¼ hr"],[150,"2½ hr"],[180,"3 hr"]].map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </select>
            </div>
            {/* Gap */}
            <div>
              <label style={{fontSize:10,fontWeight:700,color:"#475569",display:"block",marginBottom:3}}>Between Games</label>
              <select value={gapMins} onChange={e=>setGapMins(parseInt(e.target.value))}
                style={{width:"100%",padding:"6px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,fontWeight:600,background:"#fff"}}>
                {[[0,"0 min"],[5,"5 min"],[10,"10 min"],[15,"15 min"],[20,"20 min"],[30,"30 min"],[45,"45 min"],[60,"1 hr"]].map(([v,l])=><option key={v} value={v}>{l}</option>)}
              </select>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {/* Start Date */}
            <div>
              <label style={{fontSize:10,fontWeight:700,color:"#475569",display:"block",marginBottom:3}}>Start Date</label>
              <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
                style={{width:"100%",padding:"6px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,boxSizing:"border-box",background:"#fff"}}/>
            </div>
            {/* Start Time */}
            <div>
              <label style={{fontSize:10,fontWeight:700,color:"#475569",display:"block",marginBottom:3}}>Start Time</label>
              <select value={startTime} onChange={e=>setStartTime(e.target.value)}
                style={{width:"100%",padding:"6px 8px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:12,fontWeight:600,background:"#fff"}}>
                {Array.from({length:28},(_,i)=>{
                  const totalMins=i*30+360; // 6:00 AM to 9:30 PM
                  const hh=Math.floor(totalMins/60);const mm=totalMins%60;
                  const ampm=hh<12?"AM":"PM";const h12=hh===0?12:hh>12?hh-12:hh;
                  const val=`${hh.toString().padStart(2,"0")}:${mm.toString().padStart(2,"0")}`;
                  const lbl=`${h12}:${mm.toString().padStart(2,"0")} ${ampm}`;
                  return<option key={val} value={val}>{lbl}</option>;
                })}
              </select>
            </div>
          </div>
          {/* Schedule preview */}
          {(()=>{
            const slotMins=parseInt(gameMins)+parseInt(gapMins);
            const F=parseInt(numFields)||1;
            const [sh,sm]=startTime.split(":").map(Number);
            const rounds=Math.ceil(Math.log2(Math.max(count,2)));
            const r1Games=Math.floor((Math.pow(2,rounds)-count)); // bye-adjusted R1 games actually played
            const actualR1=Math.max(1,count-Math.pow(2,rounds-1)); // real games in R1
            // estimate total time: each round has ceil(gamesInRound/F) waves
            let estMin=sh*60+(sm||0);
            let gamesLeft=count;
            const roundTimes=[];
            for(let r=1;r<=rounds;r++){
              const rGames=Math.max(1,Math.pow(2,rounds-r));
              const waves=Math.ceil(rGames/F);
              const [rh,rm]=[Math.floor(estMin/60)%24,estMin%60];
              const ampm=rh<12?"AM":"PM";const h12=rh===0?12:rh>12?rh-12:rh;
              roundTimes.push(`R${r}: ${h12}:${rm.toString().padStart(2,"0")} ${ampm}`);
              estMin+=waves*slotMins;
            }
            const endH=Math.floor(estMin/60)%24,endM=estMin%60;
            const endAmpm=endH<12?"AM":"PM";const endH12=endH===0?12:endH>12?endH-12:endH;
            return(
              <div style={{marginTop:10,padding:"6px 10px",background:"#e0f2fe",borderRadius:5,fontSize:10,color:"#0369a1"}}>
                <span style={{fontWeight:700}}>Est. Schedule: </span>
                {roundTimes.join("  →  ")}
                <span style={{marginLeft:6,color:"#7c3aed",fontWeight:700}}>
                  Done ≈ {endH12}:{endM.toString().padStart(2,"0")} {endAmpm}
                </span>
              </div>
            );
          })()}
        </div>

        {/* Two-column layout: seed entry + matchup preview */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
          {/* Left: seed entry */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:6,textTransform:"uppercase",letterSpacing:.5}}>
              Seeds (standings order):
            </div>
            {/* Bye banner — shown only when there are byes */}
            {byes>0&&(
              <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:5,
                padding:"5px 8px",marginBottom:7,fontSize:10,color:"#15803d",fontWeight:600}}>
                ⏭️ Seeds <strong>#1–#{byes}</strong> receive a 1st round bye
                <span style={{color:"#94a3b8",fontWeight:400,marginLeft:6}}>
                  (seeds #{byes+1}–#{count} play Round 1)
                </span>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:count>12?"1fr 1fr":"1fr",gap:4,
              maxHeight:count>16?300:count>8?260:220,overflowY:"auto",paddingRight:2}}>
              {Array.from({length:count}).map((_,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:5}}>
                  <span style={{background:seedBg(i),color:"#fff",borderRadius:3,
                    minWidth:22,height:18,display:"inline-flex",alignItems:"center",
                    justifyContent:"center",fontSize:9,fontWeight:800,flexShrink:0,padding:"0 3px"}}>
                    #{i+1}
                  </span>
                  <input value={names[i]||""} onChange={e=>{const a=[...names];a[i]=e.target.value;setNames(a)}}
                    placeholder={`Seed ${i+1}…`}
                    style={{flex:1,minWidth:0,padding:"3px 6px",border:"1px solid",fontSize:10,
                      borderColor:i<byes?"#86efac":"#cbd5e1",
                      borderRadius:4,outline:"none",
                      background:i<byes?"#f0fdf4":"#fff"}}/>
                </div>
              ))}
            </div>
          </div>

          {/* Right: matchup preview */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:"#475569",marginBottom:8,textTransform:"uppercase",letterSpacing:.5}}>
              Round 1 Matchups:
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:4,
              maxHeight:count>16?320:count>8?280:240,overflowY:"auto"}}>
              {matchups.map((m,i)=>(
                <div key={i} style={{background:m.bye?"#f0fdf4":"#fff",border:"1px solid",
                  borderColor:m.bye?"#bbf7d0":"#e2e8f0",borderRadius:5,padding:"4px 8px",
                  fontSize:10}}>
                  {m.bye?(
                    <span style={{color:"#15803d",fontWeight:600}}>
                      <span style={{background:"#dcfce7",color:"#15803d",borderRadius:3,padding:"1px 4px",marginRight:4,fontWeight:800}}>#{m.s1<m.s2?m.s1:m.s2}</span>
                      {m.s1<m.s2?m.n1:m.n2}
                      <span style={{color:"#86efac",marginLeft:5}}>⏭ BYE</span>
                    </span>
                  ):(
                    <span style={{color:"#1e293b"}}>
                      <span style={{background:"#e0f2fe",borderRadius:3,padding:"1px 4px",marginRight:3,color:NAVY,fontWeight:700}}>#{m.s1}</span>
                      <span style={{fontWeight:600}}>{m.n1}</span>
                      <span style={{color:"#94a3b8",margin:"0 4px",fontWeight:700}}>vs</span>
                      <span style={{background:"#e0f2fe",borderRadius:3,padding:"1px 4px",marginRight:3,color:NAVY,fontWeight:700}}>#{m.s2}</span>
                      <span style={{fontWeight:600}}>{m.n2}</span>
                    </span>
                  )}
                </div>
              ))}
            </div>
          </div>
        </div>

        <button onClick={build}
          style={{marginTop:16,width:"100%",padding:"11px",background:NAVY,color:"#fff",
            border:"none",borderRadius:7,fontWeight:800,fontSize:13,cursor:"pointer",
            boxShadow:"0 2px 8px rgba(30,58,95,.3)"}}>
          ⚡ Generate Bracket →
        </button>
      </div>
      <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:6,padding:"10px 14px",
        fontSize:11,color:"#1d4ed8",display:"flex",gap:16,flexWrap:"wrap"}}>
        <span>🏟️ <strong>{count}</strong> Teams</span>
        <span>🎮 <strong>{count-1}</strong> Games</span>
        {byes>0&&<span>⏭️ <strong>{byes}</strong> Bye{byes>1?"s":""} → top seed{byes>1?"s":""}</span>}
        <span>📋 Single Elimination</span>
        <span>🏆 R1: {matchups.filter(m=>!m.bye).map(m=>`#${m.s1}v#${m.s2}`).join(' · ')}</span>
      </div>
    </div>
  );
}

/* ════════════════════ BRACKET ════════════════════ */
function BracketView({bGames,setBGames,teams:propTeams,games=[],editable,events,evRosters,bracketCtx,setBracketCtx,savedBrackets,setSavedBrackets}){
  const NAVY="#1e3a5f";
  const [tab,setTab]=useState("build");  // open Builder first by default
  const [builtGames,setBuiltGames]=useState(null);
  const [builtSeeds,setBuiltSeeds]=useState(null);
  const [bracketNoTeamsMsg,setBracketNoTeamsMsg]=useState('');

  function onBuild(games,seeds){setBuiltGames(games);setBuiltSeeds(seeds);setTab("view")}

  function saveBracket(){
    const divLabel=bracketCtx?.activeDivLabel;
    if(!divLabel||!builtGames)return;
    setSavedBrackets&&setSavedBrackets(prev=>({...prev,[divLabel]:{games:builtGames,seeds:builtSeeds,savedAt:new Date().toISOString()}}));
    // Reset builder so director can pick next division
    setBuiltGames(null);setBuiltSeeds(null);setTab("build");
    setBracketCtx&&setBracketCtx(prev=>prev?{...prev,activeDivLabel:null}:null);
  }

  // Effective teams: bracketCtx.teams when event selected, else propTeams (ALL_TEAMS)
  const teams=React.useMemo(()=>{
    if(bracketCtx&&bracketCtx.evId){return(bracketCtx.teams||[]);}
    return propTeams;
  },[propTeams,bracketCtx]);

  const dGames=builtGames||bGames;
  const dTeams=builtSeeds?[...teams,...builtSeeds.filter(s=>!teams.find(t=>t.id===s.id))]:teams;
  const setDGames=builtGames?setBuiltGames:setBGames;

  // Load a division's teams from evRosters or KV when its pill is clicked
  async function loadDivisionTeams(divLabel){
    if(!bracketCtx?.evId||!setBracketCtx)return;
    setBracketNoTeamsMsg('');
    // ── 0. Teams already in context? Just switch active division ──
    if(bracketCtx.teams&&bracketCtx.teams.length>0){
      setBracketCtx(prev=>prev?{...prev,activeDivLabel:divLabel}:null);
      return;
    }
    // ── 1. Try evRosters in memory first ──
    const normalizedDivs=(bracketCtx._divisions||[]).map(normDiv);
    let allTeams=normalizedDivs.flatMap(d=>{
      const rk=String(bracketCtx.evId)+'_'+d.id;
      return (evRosters&&evRosters[rk])||[];
    });
    if(allTeams.length){
      const newDivCounts={};
      normalizedDivs.forEach(d=>{
        const rk=String(bracketCtx.evId)+'_'+d.id;
        if(d.label)newDivCounts[d.label]=((evRosters&&evRosters[rk])||[]).length||d.numTeams||0;
      });
      setBracketCtx(prev=>prev?{...prev,teams:allTeams,divCounts:newDivCounts,activeDivLabel:divLabel,loadingTeams:false}:null);
      return;
    }
    // ── 2. Fallback: fetch from KV worker ──
    setBracketCtx(prev=>prev?{...prev,loadingTeams:true}:null);
    try{
      const r=await fetch('https://usssa-poller.chad-157.workers.dev/event-teams?event_id='+encodeURIComponent(bracketCtx.usssaId||bracketCtx.evId));
      const j=await r.json();
      if(j.status==='ok'&&j.teams&&j.teams.length){
        const evId=bracketCtx.evId;
        const byDivLabel={};
        j.teams.forEach(t=>{const dl=(t.division||'').trim();if(!byDivLabel[dl])byDivLabel[dl]=[];byDivLabel[dl].push(t);});
        const newDivCounts={};
        Object.keys(bracketCtx.divCounts||{}).forEach(lbl=>{newDivCounts[lbl]=(byDivLabel[lbl]||[]).length||bracketCtx.divCounts[lbl]||0;});
        const appTeams=j.teams.map(t=>({
          id:'us_'+evId+'_'+(t.team_name||'').replace(/\W+/g,'_'),
          name:t.team_name||'',cls:t.division||'',city:t.team_city||'',
          state:t.team_state||'FL',coach:t.manager_name||'',
          email:t.manager_email||'',phone:t.manager_phone||''
        }));
        setBracketCtx(prev=>prev?{...prev,teams:appTeams,divCounts:newDivCounts,activeDivLabel:divLabel,loadingTeams:false}:null);
      } else {
        setBracketCtx(prev=>prev?{...prev,loadingTeams:false}:null);
        setBracketNoTeamsMsg('No teams found for this event. Open it in Director Tools → Roster → Sync or Import first.');
      }
    }catch(e){
      setBracketCtx(prev=>prev?{...prev,loadingTeams:false}:null);
      setBracketNoTeamsMsg('Could not load teams: '+e.message);
    }
  }

  /* ── Layout constants (compact USSSA style) ── */
  const GW=205,GH=62,TEAM_H=26,HDR_H=18,BASE_GAP=16,CONN=56;

  // Seed map: teamId → seed number (from builtSeeds array)
  const seedMap=React.useMemo(()=>{const m={};(builtSeeds||[]).forEach((t,i)=>{if(t?.id)m[t.id]=i+1;});return m;},[builtSeeds]);
  // Sequential display numbers for non-bye games only
  const displayNum=React.useMemo(()=>{const m={};let n=1;[...new Set(dGames.map(g=>g.round))].sort((a,b)=>a-b).forEach(r=>{dGames.filter(g=>g.round===r&&g.status!=="bye").forEach(g=>{m[g.id]=`G${n++}`;});});return m;},[dGames]);

  const rounds=[...new Set(dGames.map(g=>g.round))].sort((a,b)=>a-b);
  const maxRound=rounds.length?Math.max(...rounds):1;
  const N=rounds.length||1;
  const SH=ri=>(GH+BASE_GAP)*Math.pow(2,ri);
  const GT=(ri,p)=>(SH(ri)-GH)/2+p*SH(ri);
  const GC=(ri,p)=>GT(ri,p)+GH/2;
  const r1Count=dGames.filter(g=>g.round===rounds[0]).length||1;
  const totalH=Math.max(r1Count*SH(0),GH+BASE_GAP*2)+8;
  const RX=ri=>ri*(GW+CONN);
  const totalW=N*(GW+CONN)+100;

  const rndLabel=[];
  if(N===1){rndLabel[0]="Championship"}
  else if(N===2){rndLabel[0]="Semifinal";rndLabel[1]="Championship"}
  else if(N===3){rndLabel[0]="Quarterfinal";rndLabel[1]="Semifinal";rndLabel[2]="Championship"}
  else{rounds.forEach((_,i)=>{
    if(i===N-1)rndLabel[i]="Championship";
    else if(i===N-2)rndLabel[i]="Semifinal";
    else if(i===N-3)rndLabel[i]="Quarterfinal";
    else{const cnt=Math.round(r1Count/Math.pow(2,i)*2);rndLabel[i]="Round of "+cnt;}
  })}

  function upd(id,k,v){
    if(!editable)return;
    const n=v===""?null:parseInt(v);
    setDGames(prev=>{
      let gs=prev.map(g=>g.id===id?{...g,[k]:isNaN(n)?null:n,status:n!==null?"final":"scheduled"}:g);
      // Propagate winner to next round when both scores are set
      const cg=gs.find(g=>g.id===id);
      if(cg&&cg.s1!==null&&cg.s2!==null){
        const w=cg.s1>cg.s2?cg.t1:cg.t2;
        if(w){
          const rGames=gs.filter(g=>g.round===cg.round);
          const pos=rGames.findIndex(g=>g.id===id);
          const nextGames=gs.filter(g=>g.round===cg.round+1);
          const ng=nextGames[Math.floor(pos/2)];
          if(ng){const slot=pos%2===0?"t1":"t2";gs=gs.map(g=>g.id===ng.id?{...g,[slot]:w}:g);}
        }
      }
      return gs;
    });
  }
  function getT(id){return tByIdFrom(id,dTeams)}

  // Extracted event loader — matches pattern used by SeedsView / StandingsView / LayoutView
  async function loadBracketEvent(ev){
    if(!ev||!setBracketCtx)return;
    const normalizedDivs=(ev.divisions||[]).map(normDiv);
    const divCounts={};
    let allTeams=normalizedDivs.flatMap(d=>{
      const rk=String(ev.id)+"_"+d.id;
      const t=(evRosters&&evRosters[rk])||[];
      if(d.label)divCounts[d.label]=t.length||d.numTeams||0;
      return t;
    });
    const bracketUsssaId=String(ev.evid||ev.id);
    setBracketCtx({evId:String(ev.id),usssaId:bracketUsssaId,evName:ev.name,teams:allTeams,divCounts,loadingTeams:!allTeams.length,_divisions:ev.divisions||[]});
    if(!allTeams.length){
      try{
        const r=await fetch('https://usssa-poller.chad-157.workers.dev/event-teams?event_id='+encodeURIComponent(bracketUsssaId));
        const j=await r.json();
        if(j.status==='ok'&&j.teams&&j.teams.length){
          const evId=String(ev.id);
          const byDivLabel={};
          j.teams.forEach(t=>{const dl=(t.division||'').trim();if(!byDivLabel[dl])byDivLabel[dl]=[];byDivLabel[dl].push(t);});
          const newDivCounts={};
          normalizedDivs.forEach(d=>{newDivCounts[d.label]=(byDivLabel[d.label]||[]).length||d.numTeams||0;});
          allTeams=j.teams.map(t=>({
            id:'us_'+evId+'_'+(t.team_name||'').replace(/\W+/g,'_'),
            name:t.team_name||'',cls:t.division||'',city:t.team_city||'',
            state:t.team_state||'FL',coach:t.manager_name||'',
            email:t.manager_email||'',phone:t.manager_phone||''
          }));
          setBracketCtx({evId,usssaId:bracketUsssaId,evName:ev.name,teams:allTeams,divCounts:newDivCounts,loadingTeams:false,_divisions:ev.divisions||[]});
        }else{
          setBracketCtx(prev=>prev?{...prev,loadingTeams:false}:null);
        }
      }catch(err){setBracketCtx(prev=>prev?{...prev,loadingTeams:false}:null);}
    }
  }

  const finalGame=dGames.find(g=>g.round===maxRound);
  const champ=finalGame?winOf(finalGame):null;

  return(
    <div>
      {/* ── Event selector (direct sidebar access) ── */}
      {editable&&!bracketCtx&&events&&events.length>0&&(
        <div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:8,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#92400e"}}>🏆 Select an event to build a bracket for:</span>
          <select defaultValue="" onChange={e=>{const ev=(events||[]).find(ev=>String(ev.id)===e.target.value);if(ev)loadBracketEvent(ev);}} style={{padding:"5px 10px",borderRadius:6,border:"1px solid #fcd34d",fontSize:13,background:"#fff",minWidth:220,cursor:"pointer"}}>

              <option key={ev.id} value={String(ev.id)}>{ev.name}{ev.date?` (${ev.date})`:""}</option>

          <span style={{fontSize:11,color:"#78350f"}}>Or build a bracket freely below</span>
        </div>

      {/* ── Event context banner ── */}
      {editable&&bracketCtx&&bracketCtx.evId&&(

          <div style={{fontSize:13,fontWeight:700,color:"#1e40af"}}>
            🏆 Bracket for: <span style={{fontWeight:900}}>{bracketCtx.evName}</span>

          <button className="btn btn-secondary btn-sm" onClick={()=>setBracketCtx(null)} style={{padding:"3px 12px",fontSize:11}}>✕ Clear</button>
        </div>
      )}

      {/* ── Division picker (event selected, no teams loaded yet) ── */}
      {editable&&bracketCtx&&bracketCtx.evId&&!bracketCtx.activeDivLabel&&bracketCtx.divCounts&&Object.keys(bracketCtx.divCounts).length>0&&(
        <div className="card mb4">
          <div className="card-hd" style={{background:"linear-gradient(135deg,#1e3a5f,#2563eb)"}}>
            <span className="card-title" style={{color:"#fff"}}>🏆 Bracket Builder</span>
            <span style={{fontSize:11,color:"rgba(255,255,255,.55)",marginLeft:8}}>
              {bracketCtx.loadingTeams?"Loading teams…":"Click a division to seed the bracket"}
            </span>
          </div>
          <div style={{padding:"16px 18px"}}>
            {bracketCtx.loadingTeams
              ?<div style={{textAlign:"center",color:"#2563eb",fontWeight:600,padding:"20px 0",fontSize:13}}>⏳ Loading teams…</div>
              :<>
                {savedBrackets&&Object.keys(savedBrackets).length>0&&(
                  <div style={{marginBottom:12,padding:"8px 12px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:7,fontSize:12,color:"#15803d",fontWeight:700}}>
                    ✓ Brackets saved: {Object.keys(savedBrackets).join(" · ")} — click a green division to view it
                  </div>
                )}
                <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
                  {Object.entries(bracketCtx.divCounts).sort((a,b)=>b[1]-a[1]).map(([lbl,cnt])=>{
                    const dc=getDivColor(lbl);
                    const saved=savedBrackets&&savedBrackets[lbl];
                    return(
                      <span key={lbl} onClick={()=>{
                        if(saved){
                          setBuiltGames(saved.games);setBuiltSeeds(saved.seeds);setTab("view");
                          setBracketCtx&&setBracketCtx(prev=>prev?{...prev,activeDivLabel:lbl}:null);
                        } else {
                          loadDivisionTeams(lbl);
                        }
                      }}
                        style={{fontSize:13,fontWeight:800,padding:"7px 18px",borderRadius:22,cursor:"pointer",
                          userSelect:"none",transition:"transform .1s, box-shadow .1s",
                          background:saved?"#16a34a":dc.bg,color:saved?"#fff":dc.text,
                          border:`2px solid ${saved?"#15803d":dc.border}`,
                          boxShadow:"0 2px 6px rgba(0,0,0,.08)"}}
                        onMouseEnter={e=>{e.currentTarget.style.transform="scale(1.06)";e.currentTarget.style.boxShadow="0 4px 12px rgba(0,0,0,.15)";}}
                        onMouseLeave={e=>{e.currentTarget.style.transform="scale(1)";e.currentTarget.style.boxShadow="0 2px 6px rgba(0,0,0,.08)";}}>
                        {saved&&<span style={{marginRight:5}}>✓</span>}{lbl} <span style={{opacity:.7,fontWeight:600}}>· {cnt} teams</span>
                      </span>
                    );
                  })}
                </div>
                {bracketNoTeamsMsg&&(
                  <div style={{marginTop:12,padding:"10px 14px",background:"#fefce8",border:"1px solid #fde047",
                    borderRadius:7,fontSize:12,color:"#78350f",fontWeight:600}}>
                    ⚠️ {bracketNoTeamsMsg}
                  </div>
                )}
              </>
            }
          </div>
        </div>
      )}

      {/* ── Division switcher (when event selected) ── */}
      {editable&&bracketCtx&&bracketCtx.evId&&bracketCtx.activeDivLabel&&bracketCtx.divCounts&&Object.keys(bracketCtx.divCounts).length>0&&(
        <div style={{marginBottom:12,display:"flex",flexWrap:"wrap",gap:6,alignItems:"center"}}>
          <span style={{fontSize:11,fontWeight:700,color:"#64748b",marginRight:2}}>Division:</span>
          {Object.entries(bracketCtx.divCounts).sort((a,b)=>b[1]-a[1]).map(([lbl,cnt])=>{
            const dc=getDivColor(lbl);
            const active=lbl===bracketCtx.activeDivLabel;
            const saved=savedBrackets&&savedBrackets[lbl];
            return(
              <span key={lbl} onClick={()=>{
                if(saved&&!active){
                  // Load the saved bracket for this division to view it
                  setBuiltGames(saved.games);setBuiltSeeds(saved.seeds);setTab("view");
                  setBracketCtx&&setBracketCtx(prev=>prev?{...prev,activeDivLabel:lbl}:null);
                } else {
                  loadDivisionTeams(lbl);
                }

                  color:active?"#fff":saved?"#fff":dc.text,
                  border:`2px solid ${active?dc.border:saved?"#15803d":dc.border}`,
                  boxShadow:active?"0 2px 8px rgba(0,0,0,.18)":"0 1px 3px rgba(0,0,0,.07)",
                  opacity:active?1:0.85}}

                onMouseLeave={e=>{if(!active){e.currentTarget.style.opacity="0.85";e.currentTarget.style.transform="scale(1)";}}}

                {saved&&!active&&<span style={{marginRight:4}}>✓</span>}{lbl}{active&&<span style={{marginLeft:4,opacity:.8}}>· {cnt}</span>}

          <button key={t} onClick={()=>setTab(t)}
            style={{padding:"7px 16px",border:"none",cursor:"pointer",fontWeight:700,fontSize:12,
              borderRadius:"6px 6px 0 0",marginBottom:-2,
              background:tab===t?NAVY:"#f8fafc",
              color:tab===t?"#fff":"#64748b",
              borderBottom:tab===t?`2px solid ${NAVY}`:"2px solid transparent"}}>
            {label}
          </button>
