                    const final=teamFinalFee(t);
                    const base=(parseFloat(t.entryFee)||0)+(parseFloat(t.gateFee)||0);
                    const hasDisc=parseFloat(t.discount)>0;
                    const totalStr=final>0?("$"+final.toFixed(0)+(hasDisc?" ✂":"")):"—";
                    const isOpen=actionTeamId===t.id;
                    const entryClr=t.entryStatus==="Approved"?"var(--green)":t.entryStatus==="Pending"?"#b45309":"var(--red)";
                    const payClr=t.payStatus==="Paid"?"var(--green)":t.payStatus==="Partial Paid"?"#b45309":"var(--red)";
                    return(
                      <tr key={t.id} style={{background:i%2===0?"#f9fbfc":"#fff"}}>
                        <td style={{textAlign:"center",fontWeight:700,color:"var(--gray)",fontSize:12}}>{i+1}</td>
                        <td style={{fontWeight:700,fontSize:13}}>{t.name}</td>
                        <td><span className="badge b-blue" style={{fontSize:10}}>{t.cls}</span></td>
                        <td className="t-sm t-gray">{t.city}, {t.state}</td>
                        <td style={{fontSize:11,lineHeight:1.5}}>
                          {t.coach&&<div style={{fontWeight:600,color:"#1e293b"}}>{t.coach}</div>}
                          {t.email&&<div style={{color:"#2563eb"}}><a href={"mailto:"+t.email} style={{color:"#2563eb",textDecoration:"none"}}>{t.email}</a></div>}
                          {t.phone&&<div style={{color:"#64748b"}}>{t.phone}</div>}
                          {!t.coach&&!t.email&&!t.phone&&<span style={{color:"#cbd5e1"}}>—</span>}
                        </td>
                        <td>
                          <select style={{fontSize:11,padding:"3px 6px",borderRadius:4,border:"1px solid #ddd",color:entryClr,fontWeight:700,background:"#fff",width:"100%"}}
                            value={t.entryStatus} onChange={e=>setField(t.id,"entryStatus",e.target.value)}>
                            {ENTRY_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                          </select>
                        </td>
                        <td>
                          <select style={{fontSize:11,padding:"3px 6px",borderRadius:4,border:"1px solid #ddd",color:payClr,fontWeight:700,background:"#fff",width:"100%"}}
                            value={t.payStatus} onChange={e=>setField(t.id,"payStatus",e.target.value)}>
                            {PAY_STATUSES.map(s=><option key={s} value={s}>{s}</option>)}
                          </select>
                        </td>
                        <td><input type="number" min="0" step="25" style={inStyle} placeholder="$0" value={t.entryFee} onChange={e=>setField(t.id,"entryFee",e.target.value)}/></td>
                        <td><input type="number" min="0" step="25" style={inStyle} placeholder="$0" value={t.gateFee} onChange={e=>setField(t.id,"gateFee",e.target.value)}/></td>
                        <td><input type="number" min="0" max="100" step="5" style={{...inStyle,color:hasDisc?"var(--red)":"inherit",fontWeight:hasDisc?700:400}} placeholder="0" value={t.discount||""} onChange={e=>setField(t.id,"discount",e.target.value)}/></td>
                        <td style={{fontWeight:700,fontSize:12,textAlign:"right",paddingRight:8,color:t.payStatus==="Paid"?"var(--green)":hasDisc?"var(--red)":"var(--navy)"}}>{totalStr}</td>
                        <td style={{position:"relative"}} onClick={e=>e.stopPropagation()}>
                          <button className="btn btn-secondary btn-sm" style={{fontSize:11,padding:"3px 10px",width:"100%"}}
                            onClick={()=>setActionTeamId(isOpen?null:t.id)}>
                            Actions ▾
                          </button>
                          {isOpen?(
                            <div style={{position:"absolute",right:0,top:"100%",zIndex:200,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,boxShadow:"0 6px 20px rgba(0,0,0,.15)",minWidth:190,padding:"4px 0"}}>
                              <div style={{padding:"7px 14px",fontSize:11,fontWeight:700,color:"var(--gray)",textTransform:"uppercase",letterSpacing:.5,borderBottom:"1px solid #f0f4f8"}}>Entry Status</div>
                              <div style={{padding:"7px 14px",fontSize:13,cursor:"pointer",color:"var(--green)",fontWeight:600}} onClick={()=>{setField(t.id,"entryStatus","Approved");setActionTeamId(null);}}>✓ Set Approved</div>
                              <div style={{padding:"7px 14px",fontSize:13,cursor:"pointer"}} onClick={()=>{setField(t.id,"entryStatus","Pending");setActionTeamId(null);}}>⏳ Set Pending</div>
                              <div style={{padding:"7px 14px",fontSize:13,cursor:"pointer"}} onClick={()=>{setField(t.id,"entryStatus","Hold");setActionTeamId(null);}}>⏸ Place on Hold</div>
                              <div style={{padding:"7px 14px",fontSize:11,fontWeight:700,color:"var(--gray)",textTransform:"uppercase",letterSpacing:.5,borderBottom:"1px solid #f0f4f8",borderTop:"1px solid #f0f4f8",marginTop:2}}>Payment</div>
                              <div style={{padding:"7px 14px",fontSize:13,cursor:"pointer",color:"var(--green)",fontWeight:600}} onClick={()=>{setField(t.id,"payStatus","Paid");setActionTeamId(null);}}>💰 Mark as Paid</div>
                              <div style={{padding:"7px 14px",fontSize:13,cursor:"pointer"}} onClick={()=>{setField(t.id,"payStatus","Partial Paid");setActionTeamId(null);}}>💳 Partial Paid</div>
                              <div style={{padding:"7px 14px",fontSize:13,cursor:"pointer"}} onClick={()=>{setField(t.id,"payStatus","Not Paid");setActionTeamId(null);}}>⚪ Not Paid</div>
                              <div style={{height:1,background:"#f0f4f8",margin:"4px 0"}}></div>
                              <div style={{padding:"7px 14px",fontSize:11,fontWeight:700,color:"var(--gray)",textTransform:"uppercase",letterSpacing:.5,borderBottom:"1px solid #f0f4f8"}}>Move to Division</div>
                              {movingTeamId===t.id?(
                                <div style={{maxHeight:160,overflowY:"auto"}}>
                                  {divisions.filter(d=>d.id!==activeDivId).map(d=>{
                                    const chk=canMoveDiv(activeDivObj?.label||"",d.label);
                                    const disabled=!chk.ok;
                                    return(
                                    <div key={d.id} style={{padding:"6px 14px 6px 22px",fontSize:12,cursor:disabled?"not-allowed":"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",opacity:disabled?0.45:1,background:disabled?"#f8fafc":""}}
                                      onMouseEnter={e=>{if(!disabled)e.currentTarget.style.background="#f0f9ff";}}
                                      onMouseLeave={e=>{if(!disabled)e.currentTarget.style.background="";}}
                                      onClick={()=>{if(!disabled)moveTeam(t,d.id);}}>
                                      <div style={{display:"flex",flexDirection:"column",gap:1}}>
                                        <span style={{fontWeight:600,color:disabled?"#94a3b8":"inherit"}}>{d.label}</span>
                                        {disabled&&<span style={{fontSize:10,color:"#f87171"}}>{chk.reason}</span>}
                                      </div>
                                      <span style={{fontSize:10,color:"#94a3b8"}}>{(evRosters[String(ev.id)+"_"+d.id]||[]).length}t</span>
                                    </div>
                                    );
                                  })}
                                </div>
                              ):(
                                <div style={{padding:"7px 14px",fontSize:13,cursor:"pointer",display:"flex",justifyContent:"space-between"}}
                                  onClick={e=>{e.stopPropagation();setMovingTeamId(t.id);}}>
                                  <span>➡ Select Division…</span><span style={{color:"#94a3b8"}}>▸</span>
                                </div>
                              )}
                              <div style={{height:1,background:"#f0f4f8",margin:"4px 0"}}></div>
                              <div style={{padding:"7px 14px",fontSize:13,cursor:"pointer",color:"var(--red)",fontWeight:600}} onClick={()=>{removeTeam(t.id);setActionTeamId(null);}}>✕ Remove Team</div>
                            </div>
                          ):null}
                        </td>
                      </tr>
                    );
                  })}</tbody>
                </table>
              )}
            </div>
            <div style={{padding:"10px 18px",borderTop:"1px solid #eee",display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fafbfc",flexWrap:"wrap",gap:8}}>
              <div style={{fontSize:12,color:"var(--gray)"}}>
                {divRoster.length>0?(<span>{divRoster.length} teams · {approvedCount} approved · {paidCount} paid · <strong>${totalPaid.toFixed(0)}</strong> collected · <strong style={{color:totalOwed>0?"var(--red)":"inherit"}}>${totalOwed.toFixed(0)}</strong> balance due</span>):(<span>0 teams entered</span>)}
              </div>
            </div>
          </div>
          <div className="card" style={{marginTop:12,overflow:"hidden"}}>
            <ContactToolsCard ev={ev} evRosters={evRosters}/>
          </div>
          {/* ── ADD TEAM MODAL ── */}
          {showAdd&&(
            <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.55)"}} onClick={()=>setShowAdd(false)}>
              <div style={{background:"#fff",borderRadius:12,boxShadow:"0 8px 40px rgba(0,0,0,.25)",width:"min(820px,95vw)",maxHeight:"85vh",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>

                  <span style={{fontSize:18}}>➕</span>
                  <strong style={{fontSize:15}}>Add Team — {activeDivObj?activeDivObj.label:"Division"}</strong>

                    <span style={{marginLeft:4,fontSize:11,background:"rgba(34,197,94,0.3)",borderRadius:10,padding:"2px 8px",color:"#86efac",fontWeight:700}}>● {usssaTeams.length} found</span>
                  )}

                {/* Search filters */}
                <div style={{padding:"14px 18px",borderBottom:"1px solid #e2e8f0",display:"flex",gap:10,alignItems:"flex-end",flexWrap:"wrap",flexShrink:0,background:"#f8fafc"}}>

                      {ALL_STATES.map(s=><option key={s} value={s}>{s}</option>)}

                  </div>
                  <div style={{flex:1,minWidth:160}}>

                  <button className="btn btn-primary" onClick={e=>{e.stopPropagation();runTeamSearch();}} style={{padding:"7px 20px",fontWeight:700,fontSize:13,height:35}}>🔍 Search USSSA</button>

                          <th style={{padding:"8px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Team</th>
                          <th style={{padding:"8px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Class</th>
                          <th style={{padding:"8px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Location</th>
                          <th style={{padding:"8px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Contact</th>
                          <th style={{padding:"8px 12px",textAlign:"left",fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Status</th>
                          <th style={{padding:"8px 12px",textAlign:"center",fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase"}}>Action</th>
                        </tr>
                      </thead>
                      <tbody>{browseable.map((t,i)=>{
                        const tid=t.id||usssaId(t);
                        const inR=rosterIds.has(tid);
                        const nm=t.name||t.team_name||"";
                        const cy=t.city||t.team_city||"";
                        const st=t.state||t.team_state||"";
                        const cl=t.cls||activeDivObj?.label||"";
                        const es=t.entry_status||"";
                        const ps=t.payment_status||"";
                        const mgr=t.manager_name||t.manager||"";
                        const mgrEmail=t.manager_email||t.email||"";
                        const mgrPhone=t.manager_phone||t.phone||"";
                        const esBg=es==="Approved"?"#dcfce7":es==="Pending"?"#fef3c7":"#fee2e2";

                        return(
                          <tr key={tid} style={{background:inR?"#f0fdf4":i%2===0?"#f8fafc":"#fff",borderBottom:"1px solid #f0f4f8"}}>

                            <td style={{padding:"9px 12px",fontWeight:700,fontSize:13}}>{nm}</td>

                            <td style={{padding:"9px 12px",fontSize:12,color:"#64748b"}}>{cy}{cy&&st?", ":""}{st}</td>
                            <td style={{padding:"9px 12px",fontSize:11,color:"#374151"}}>
                              {mgr&&<div style={{fontWeight:600}}>{mgr}</div>}
                              {mgrEmail&&<div style={{color:"#2563eb"}}>{mgrEmail}</div>}
                              {mgrPhone&&<div style={{color:"#16a34a"}}>{mgrPhone}</div>}
                              {!mgr&&!mgrEmail&&!mgrPhone&&<span style={{color:"#aaa"}}>—</span>}
                            </td>
                            <td style={{padding:"9px 12px"}}>
                              {es?(<span style={{fontSize:10,fontWeight:700,background:esBg,color:esClr,borderRadius:10,padding:"2px 8px"}}>{es}</span>):(<span style={{fontSize:11,color:"#aaa"}}>—</span>)}
                            </td>
                            <td style={{padding:"9px 12px",textAlign:"center"}}>
                              {inR?(<span style={{fontSize:11,color:"#16a34a",fontWeight:700}}>✓ Added</span>):(
                                <button style={{background:"#16a34a",color:"#fff",border:"none",borderRadius:6,padding:"5px 14px",fontWeight:700,fontSize:12,cursor:"pointer"}}
                                  onClick={e=>{e.stopPropagation();addTeam(t);}}>
                                  + Add
                                </button>
                              )}
                            </td>
                          </tr>
                        );
                      })}</tbody>
                    </table>

              </div>
            </div>
          )}
          {/* ── IMPORT JSON MODAL ── */}
          {showImport&&(
            <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(0,0,0,0.55)"}} onClick={()=>setShowImport(false)}>
              <div style={{background:"#fff",borderRadius:12,boxShadow:"0 8px 40px rgba(0,0,0,.25)",width:"min(680px,95vw)",maxHeight:"85vh",display:"flex",flexDirection:"column",overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
                <div style={{background:"#1e3a5f",color:"#fff",padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
                  <span style={{fontWeight:700,fontSize:15}}>📥 Import Teams from USSSA DC Export</span>
                  <button onClick={()=>setShowImport(false)} style={{background:"transparent",border:"none",color:"#fff",fontSize:20,cursor:"pointer",lineHeight:1}}>✕</button>
                </div>
                <div style={{padding:"16px 20px",overflowY:"auto"}}>
                  <div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#92400e",lineHeight:1.6}}>
                    <strong>How to get this data:</strong> Log into <strong>dc.usssa.com</strong> → open the event → export/copy the team list as JSON → paste it below. The JSON should be an array of team objects with <code>team_name</code>, <code>division</code>, <code>manager_email</code>, etc. The data will be saved to the cloud so it loads every time.
                  </div>
                  <div style={{fontSize:11,fontWeight:700,color:"var(--gray)",marginBottom:6}}>Paste JSON team array:</div>
                  <textarea value={importText} onChange={e=>setImportText(e.target.value)}
                    placeholder={'[\n  {\n    "team_name": "My Team 14U",\n    "division": "14AA",\n    "team_city": "Tampa",\n    "team_state": "FL",\n    "manager_name": "Coach Name",\n    "manager_email": "coach@email.com",\n    "manager_phone": "8005551234",\n    "entry_status": "Approved",\n    "payment_status": "Not Paid"\n  },\n  ...\n]'}
                    style={{width:"100%",height:260,padding:"10px",border:"1px solid #ddd",borderRadius:8,fontSize:11,fontFamily:"monospace",boxSizing:"border-box",resize:"vertical"}}/>
                  {importErr&&<div style={{marginTop:8,padding:"8px 12px",background:"#fef2f2",color:"#dc2626",borderRadius:6,fontSize:12,fontWeight:600}}>{importErr}</div>}
                  {importOk&&<div style={{marginTop:8,padding:"8px 12px",background:"#dcfce7",color:"#166534",borderRadius:6,fontSize:12,fontWeight:600}}>{importOk}</div>}
                  <div style={{display:"flex",gap:10,marginTop:14,justifyContent:"flex-end"}}>
                    <button className="btn btn-secondary btn-sm" onClick={()=>setShowImport(false)}>Cancel</button>
                    <button className="btn btn-primary btn-sm" onClick={importFromJson} disabled={!importText.trim()} style={{fontWeight:700}}>📥 Import Teams</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      ):(
        evTab==="director"?(
          <div>
            {/* Director sub-tabs */}
            <div style={{display:"flex",gap:0,marginBottom:18,borderBottom:"2px solid #e2e8f0",overflowX:"auto"}}>
              {[["fields","🏟 Assign Fields"],["grid","🗺 Schedule Layout"],["schedule","📅 Build Schedule"]].map(([k,lbl],idx)=>(
                <div key={k} onClick={()=>setDirTab(k)}
                  style={{display:"flex",alignItems:"center",gap:6,padding:"8px 20px",fontWeight:700,fontSize:13,cursor:"pointer",whiteSpace:"nowrap",
                    borderBottom:"3px solid "+(dirTab===k?"var(--red)":"transparent"),
                    color:dirTab===k?"var(--red)":"#64748b",marginBottom:"-2px",transition:"all .15s"}}>
                  {lbl}
                  {idx<2&&<span style={{fontSize:10,color:"#cbd5e1"}}>›</span>}
                </div>
              ))}
            </div>

            {dirTab==="fields"?(
              <AssignFieldsTab evId={ev.id} fieldAssignments={fieldAssignments} setFieldAssignments={setFieldAssignments} onNext={()=>setDirTab("grid")}/>
            ):dirTab==="schedule"?(
              <div>
                <div style={{fontSize:13,color:"#64748b",marginBottom:14}}>
                  Select a division to open it in the Schedule Builder with live team data pre-loaded.
                </div>
                {divisions.length===0?(
                  <div className="card"><div className="card-body" style={{textAlign:"center",padding:48,color:"var(--gray)"}}>No divisions configured for this event.</div></div>
                ):(
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(190px,1fr))",gap:12}}>
                    {divisions.map(d=>{
                      const dk=String(ev.id)+"_"+d.id;
                      const divTeams=evRosters[dk]||[];
                      const paidCnt=divTeams.filter(t=>t.payStatus==="Paid").length;
                      return(
                        <div key={d.id} style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:10,padding:"14px 16px",boxShadow:"0 1px 3px rgba(0,0,0,.06)"}}>
                          <div style={{fontWeight:800,fontSize:15,color:"var(--navy)",marginBottom:4}}>{d.label}</div>
                          <div style={{fontSize:12,color:"#64748b",marginBottom:12}}>
                            {divTeams.length} entered · {paidCnt} paid
                          </div>
                          <button className="btn btn-primary btn-sm"
                            style={{width:"100%",opacity:divTeams.length===0?0.45:1,cursor:divTeams.length===0?"not-allowed":"pointer"}}
                            disabled={divTeams.length===0}
                            onClick={e=>{e.stopPropagation();if(onSchedule)onSchedule({evId:ev.id,evName:ev.name,divId:d.id,divLabel:d.label,teams:divTeams});}}>
                            📅 Schedule →
                          </button>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ):(
              /* Build Grid tab */
              <div>
                {fieldAssignments.length===0&&(
                  <div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:8,padding:"12px 16px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:18}}>💡</span>
                    <div>
                      <span style={{fontWeight:700,fontSize:13,color:"#92400e"}}>No fields assigned yet.</span>
                      <span style={{fontSize:12,color:"#78350f",marginLeft:6}}>Go to <button onClick={()=>setDirTab("fields")} style={{background:"none",border:"none",color:"var(--red)",fontWeight:700,cursor:"pointer",fontSize:12,padding:0,textDecoration:"underline"}}>Assign Fields</button> first to pre-load complexes into the Grid Builder.</span>
                    </div>
                  </div>
                )}
                {fieldAssignments.length>0&&(
                  <div style={{background:"#f0fdf4",border:"1px solid #86efac",borderRadius:8,padding:"12px 16px",marginBottom:14}}>
                    <div style={{fontWeight:700,fontSize:12,color:"#166534",marginBottom:6}}>✅ {fieldAssignments.length} complex{fieldAssignments.length!==1?"es":""} assigned — will auto-load into Grid Builder</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                      {fieldAssignments.map((fa,i)=>(
                        <span key={i} style={{background:"#dcfce7",color:"#166534",borderRadius:20,padding:"2px 10px",fontSize:11,fontWeight:700}}>
                          🏟 {fa.venueName} · {fa.fields.length} fields
                        </span>
                      ))}
                    </div>
                  </div>
                )}
                <div style={{background:"#fff",border:"1px solid #e2e8f0",borderRadius:12,padding:"20px 24px",marginBottom:16,boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
                  <div style={{fontWeight:800,fontSize:16,color:"var(--navy)",marginBottom:4}}>{ev.name}</div>
                  <div style={{fontSize:12,color:"#64748b",marginBottom:14}}>
                    {ev.loc} · {ev.date} · {divisions.length} divisions
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:7,marginBottom:20}}>
                    {divisions.map(d=>{
                      const dk=String(ev.id)+"_"+d.id;
                      const cnt=(evRosters[dk]||[]).length;
                      return(
                        <div key={d.id} style={{background:"#f8fafc",border:"1px solid #e2e8f0",borderRadius:7,padding:"7px 10px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontWeight:700,fontSize:12,color:"var(--navy)"}}>{d.label}</span>
                          <span style={{fontSize:11,background:"#dbeafe",color:"#1e40af",borderRadius:20,padding:"1px 7px",fontWeight:700}}>{cnt}t</span>
                        </div>
                      );
                    })}
                  </div>
                  <button className="btn btn-primary"
                    onClick={e=>{e.stopPropagation();if(onGrid)onGrid({
                      evId:ev.id,evName:ev.name,
                      divisions:divisions.map(d=>d.label),
                      totalTeams:divisions.reduce((s,d)=>{const dk=String(ev.id)+"_"+d.id;return s+(evRosters[dk]||[]).length;},0)
                    });}}>
                    🗺 Open Grid Builder →
                  </button>
                </div>
              </div>
            )}
          </div>
        ):(
          <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"var(--sh-lg)"}}>
            <div className="pub-header">
              <div className="pub-ename">{ev.name}</div>
              <div className="pub-meta">📍 {ev.loc} · 📅 {ev.date} · {ev.stature}</div>
              <div className="pub-divs">
                {divisions.map(d=>(
                  <div key={d.id} className={`pub-div ${pubDivId===d.id?"on":""}`}
                    onClick={()=>{setPubDivId(d.id);setPubBg(bracketGamesDB(d.id));}}>
                    {d.label}
                  </div>
                ))}
              </div>
              <div className="pub-tabs">
                {["standings","bracket","schedule"].map(t=>(
                  <div key={t} className={`pub-tab ${pubTab===t?"on":""}`} onClick={()=>setPubTab(t)}>
                    {t==="standings"?"📊 Standings":t==="bracket"?"🏆 Bracket":"📅 Schedule"}
                  </div>
                ))}
              </div>
            </div>
            <div className="pub-body">
              {pubTab==="standings"?<StandingsView teams={pubTeams} games={pubGames}/>:null}
              {pubTab==="bracket"?<BracketView bGames={pubBg} setBGames={setPubBg} teams={pubTeams} editable={false}/>:null}
              {pubTab==="schedule"?(
                <div className="tbl-wrap">
                  <table>
                    <thead><tr><th>#</th><th>Pool</th><th>Date</th><th>Time</th><th>Field</th><th>Home</th><th>Score</th><th>Away</th><th>Status</th></tr></thead>
                    <tbody>{pubGames.map(g=>{
                      const t1=tByIdFrom(g.t1,pubTeams),t2=tByIdFrom(g.t2,pubTeams),w=winOf(g);
                      return<tr key={g.id}>
                        <td className="fw7">{g.num}</td>
                        <td>{g.pool?<span className={`chip ${poolChipClass(g.pool)}`}>Pool {g.pool}</span>:null}</td>
                        <td className="t-sm">{g.date}</td><td className="t-sm">{g.time}</td>
                        <td className="t-sm t-gray">{g.field}</td>
                        <td style={{fontWeight:w===g.t1?700:400}}>{t1?t1.name:"—"}</td>
                        <td className="fw8" style={{textAlign:"center"}}>{g.s1!=null?`${g.s1} — ${g.s2}`:""}</td>
                        <td style={{fontWeight:w===g.t2?700:400}}>{t2?t2.name:"—"}</td>
                        <td><span className={`status ${g.status==="final"?"s-final":"s-scheduled"}`}>{g.status==="final"?"✓ Final":"Scheduled"}</span></td>
                      </tr>;
                    })}</tbody>
                  </table>
                </div>
              ):null}
            </div>
          </div>
        )
      )}
    </div>
  );
}

/* ════════════════════ DASHBOARD ════════════════════ */
function Dashboard({events,onSelect,onNav,evRosters,setEvRosters}){
  const [stateF,setStateF]=useState("all");
  const [seasonF,setSeasonF]=useState("all");
  const [directorF,setDirectorF]=useState("all");
  const [statureF,setStatureF]=useState("all");
  const [evTab,setEvTab]=useState("active");
  const [refreshing,setRefreshing]=useState(false);
  const [refreshMsg,setRefreshMsg]=useState('');

  async function refreshTeams(){
    if(!setEvRosters||refreshing)return;
    setRefreshing(true);setRefreshMsg('');
    const updates={};
    await Promise.all(tabShown.map(async ev=>{
      try{
        const r=await fetch('https://usssa-poller.chad-157.workers.dev/event-teams?event_id='+encodeURIComponent(ev.evid||ev.id));
        const j=await r.json();
        if(j.status==='ok'&&j.teams&&j.teams.length){
          const evId=String(ev.id);
          const normalizedDivs=(ev.divisions||[]).map(normDiv);
          const byDivLabel={};
          j.teams.forEach(t=>{const dl=(t.division||'').trim();if(!byDivLabel[dl])byDivLabel[dl]=[];byDivLabel[dl].push(t);});
          normalizedDivs.forEach(d=>{
            const rk=evId+'_'+d.id;
            const divTeams=byDivLabel[d.label]||[];
            if(divTeams.length){
              updates[rk]=divTeams.map(t=>({
                id:'us_'+evId+'_'+(t.team_name||'').replace(/\W+/g,'_'),
                name:t.team_name||'',city:t.team_city||'',state:t.team_state||'FL',
                cls:d.label,coach:t.manager_name||'',email:t.manager_email||'',
                phone:t.manager_phone||'',entryStatus:t.entry_status||'Approved',
                payStatus:t.payment_status||'Not Paid',entryFee:'',gateFee:'',discount:'',notes:''
              }));
            }
          });
        }
      }catch(e){}
    }));
    setEvRosters(prev=>({...prev,...updates}));
    setRefreshing(false);
    const teamTotal=Object.values(updates).reduce((s,a)=>s+a.length,0);
    const divTotal=Object.keys(updates).length;
    setRefreshMsg(teamTotal>0
      ?`✅ ${teamTotal} teams loaded across ${divTotal} divisions`
      :'⚠️ No team data found in cloud — open an event in Director Tools → Roster to import teams first');
  }
  const getYear=d=>{const m=d.match(/\d{4}/);return m?m[0]:null;};
  const seasons=[...new Set(events.map(e=>getYear(e.date)).filter(Boolean))].sort((a,b)=>b-a);
  const directors=[...new Set(events.map(e=>e.director).filter(Boolean))].sort();
  const statures=[...new Set(events.map(e=>e.stature).filter(Boolean))].sort();
  const shown=events.filter(e=>
    (stateF==="all"||e.state===stateF)&&
    (seasonF==="all"||getYear(e.date)===seasonF)&&
    (directorF==="all"||e.director===directorF)&&
    (statureF==="all"||e.stature===statureF)
  );
  const tabShown=shown.filter(e=>evTab==="all"||(evTab==="active"?e.status!=="complete":e.status==="complete"));
  const totalTeams=shown.reduce((a,ev)=>a+ev.divisions.reduce((b,d)=>b+(d.numTeams||0),0),0);
  const TABS=[{id:"active",label:"Upcoming / Active",ico:"⏳",count:shown.filter(e=>e.status!=="complete").length},{id:"past",label:"Past Events",ico:"✅",count:shown.filter(e=>e.status==="complete").length},{id:"all",label:"All Events",ico:"📅",count:shown.length}];
  const tabBase={padding:"8px 18px",fontSize:12,fontWeight:700,cursor:"pointer",border:"none",borderRadius:"6px 6px 0 0",transition:"background .15s"};
  return(
    <div>
      <div className="g4 mb4">
        <div className="stat-card"><div className="stat-ico" style={{background:"#fde8e8"}}>📅</div><div><div className="stat-val">{shown.length}</div><div className="stat-lbl">Total Events</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#d6eaf8"}}>⏳</div><div><div className="stat-val">{shown.filter(e=>e.status!=="complete").length}</div><div className="stat-lbl">Upcoming / Active</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#d5f5e3"}}>✅</div><div><div className="stat-val">{shown.filter(e=>e.status==="complete").length}</div><div className="stat-lbl">Completed</div></div></div>
        <div className="stat-card"><div className="stat-ico" style={{background:"#fef5e7"}}>👥</div><div><div className="stat-val">{totalTeams}</div><div className="stat-lbl">Total Teams</div></div></div>
      </div>
      <div className="card">
        <div className="card-hd">
          <span className="card-title">Event Information — {tabShown.length} of {events.length} Results</span>
          <div className="flex-w gap-2">
            <select value={seasonF} onChange={e=>setSeasonF(e.target.value)}>
              <option value="all">All Seasons</option>
              {seasons.map(s=><option key={s} value={s}>Season: {s}</option>)}
            </select>
            <select value={stateF} onChange={e=>setStateF(e.target.value)}>
              <option value="all">All States</option>
              {[...new Set(events.map(e=>e.state))].sort().map(s=><option key={s}>{s}</option>)}
            </select>
            <select value={directorF} onChange={e=>setDirectorF(e.target.value)}>
              <option value="all">All Directors</option>
              {directors.map(d=><option key={d}>{d}</option>)}
            </select>
            <select value={statureF} onChange={e=>setStatureF(e.target.value)}>
              <option value="all">All Statures</option>
              {statures.map(s=><option key={s}>{s}</option>)}
            </select>
            <button className="btn btn-secondary btn-sm"
              onClick={refreshTeams}
              disabled={refreshing}
              style={{opacity:refreshing?.6:1,display:"flex",alignItems:"center",gap:5}}>
              <span style={{display:"inline-block",animation:refreshing?"spin 1s linear infinite":"none"}}>🔄</span>
              {refreshing?"Refreshing…":"Refresh Teams"}
            </button>
            <button className="btn btn-primary btn-sm" onClick={()=>onNav("create")}>+ Create New Event</button>
          </div>
        </div>
        {refreshMsg&&(
          <div style={{padding:"8px 16px",fontSize:12,fontWeight:600,
            color:refreshMsg.startsWith('✅')?'#166534':'#92400e',
            background:refreshMsg.startsWith('✅')?'#f0fdf4':'#fefce8',
            borderBottom:'1px solid '+(refreshMsg.startsWith('✅')?'#86efac':'#fde047')}}>
            {refreshMsg}
            <button onClick={()=>setRefreshMsg('')} style={{float:'right',background:'none',border:'none',cursor:'pointer',fontSize:12,color:'inherit'}}>✕</button>
          </div>
        )}
        <div style={{display:"flex",gap:0,padding:"0 16px",background:"#f8fafc",borderBottom:"2px solid #e2e8f0"}}>
          {TABS.map(t=><button key={t.id} onClick={()=>setEvTab(t.id)} style={{...tabBase,background:evTab===t.id?"#fff":"transparent",color:evTab===t.id?"#1e3a5f":"#64748b",borderBottom:evTab===t.id?"2px solid #1e3a5f":"2px solid transparent",marginBottom:"-2px"}}>{t.ico} {t.label} <span style={{background:evTab===t.id?"#1e3a5f":"#e2e8f0",color:evTab===t.id?"#fff":"#64748b",borderRadius:10,padding:"1px 7px",fontSize:11,marginLeft:4,fontWeight:700}}>{t.count}</span></button>)}
        </div>
        <div className="tbl-scroll">
          <table>
            <thead><tr>
              <th style={{width:14}}></th><th>Event ID</th><th>State</th><th>Start Date</th>
              <th>Event Name</th><th># Div</th><th>Teams</th><th>Stature</th><th>Director</th><th>Status</th><th style={{width:90}}>Actions</th>
            </tr></thead>
            <tbody>{tabShown.map(ev=>(
              <tr key={ev.id} onClick={()=>onSelect(ev)} style={{cursor:"pointer"}}>
                <td style={{paddingLeft:12}}><div style={{width:8,height:8,borderRadius:"50%",background:ev.status==="complete"?"var(--green)":ev.status==="live"?"var(--red)":"var(--blue)"}}/></td>
                <td className="fw7 t-sm">{ev.evid}</td>
                <td><span className="badge b-gray">{ev.state}</span></td>
                <td className="t-sm">{ev.date}</td>
                <td><span style={{color:"var(--blue)",fontWeight:700}}>{ev.name}</span></td>
                <td className="t-sm">{ev.divisions.length}</td>
                <td className="t-sm">{(()=>{
                  const loaded=(ev.divisions||[]).map(normDiv).reduce((s,d)=>{const rk=String(ev.id)+'_'+d.id;return s+((evRosters&&evRosters[rk])||[]).length;},0);
                  const meta=(ev.divisions||[]).reduce((a,d)=>a+(d.numTeams||0),0);
                  return loaded>0
                    ?<span>{loaded}<span style={{color:"#16a34a",fontWeight:900,marginLeft:3}}>✓</span></span>
                    :<span style={{color:"#94a3b8"}}>{meta}</span>;
                })()}</td>
                <td className="t-sm">{ev.stature}</td>
                <td className="t-sm">{ev.director}</td>
                <td><Ev_StatusBadge status={ev.status}/></td>
                <td onClick={e=>e.stopPropagation()} style={{whiteSpace:"nowrap"}}>
                  <button className="btn btn-secondary btn-sm" style={{fontSize:11,padding:"3px 8px",marginRight:4}} onClick={()=>onSelect(ev)}>Open</button>
                  <button className="btn btn-primary btn-sm" style={{fontSize:11,padding:"3px 8px"}} onClick={()=>onNav("s-layout")}>📋</button>
                </td>
              </tr>
            ))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

const ALL_STATES=["AL","AK","AZ","AR","CA","CO","CT","DE","FL","GA","HI","ID","IL","IN","IA","KS","KY","LA","ME","MD","MA","MI","MN","MS","MO","MT","NE","NV","NH","NJ","NM","NY","NC","ND","OH","OK","OR","PA","RI","SC","SD","TN","TX","UT","VT","VA","WA","WV","WI","WY"];

function CreateEventView(){
  const [f,setF]=useState({

    dbSave('events',newEvent);
    alert(`Event "${newEvent.name}" created! Event ID: ${newEvent.evid}`);
    setF(p=>({...p,name:"",city:"",startDate:"",endDate:"",entryDeadline:"",director:"",lodgingDirector:"",quickDetails:"",advancedDesc:"",hotelInfo:"",alertMsg:"",streamURL:"",rainoutEmbed:"",divisions:[],alertEnabled:false,streamEnabled:false,entryFeeAmt:"",entryFeePublic:"",gateFeeAmt:"",gateFeePublic:"",otherFeeAmt:"",otherFeePublic:"",otherFeeDesc:"",refundPolicy:""}));

          <SectionHead title="Directors"/>

            <div style={fieldWrap}><label style={labelStyle}>Lodging Director</label><input style={inputStyle} value={f.lodgingDirector} onChange={e=>set("lodgingDirector",e.target.value)} placeholder="Lodging contact (optional)"/></div>

          <SectionHead title="Age Divisions"/>
          <div style={{overflowX:"auto",marginBottom:8}}>
            <table style={{borderCollapse:"collapse",fontSize:13,width:"auto"}}>

              </div>
              <div style={fieldWrap}>

                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontWeight:600,fontSize:15,color:"#4a5568"}}>$</span>
                  <input style={inputStyle} type="number" min="0" step="0.01" value={f.otherFeeAmt} onChange={e=>set("otherFeeAmt",e.target.value)} placeholder="0.00"/>
                </div>
              </div>
              <div style={fieldWrap}>
                <label style={labelStyle}>Other Fees Displayed to Public</label>
                <input style={inputStyle} value={f.otherFeePublic} onChange={e=>set("otherFeePublic",e.target.value)} placeholder="Public description of other fee"/>

              <div style={fieldWrap}>
                <label style={labelStyle}>Other Fee Description <span style={{color:"#888",fontWeight:400}}>(Optional)</span></label>
                <input style={inputStyle} value={f.otherFeeDesc} onChange={e=>set("otherFeeDesc",e.target.value)} placeholder="Internal note on other fee"/>

              <textarea style={{...inputStyle,resize:"vertical"}} rows={3} value={f.refundPolicy} onChange={e=>set("refundPolicy",e.target.value)} placeholder="Describe your refund policy for teams..."/>
            </div>
          </div>

          <SectionHead title="Alerts & Features"/>
          <div style={{display:"grid",gap:12}}>
            <label style={{...toggleRow,cursor:"pointer"}}>
              <input type="checkbox" checked={f.alertEnabled} onChange={e=>set("alertEnabled",e.target.checked)} style={{width:16,height:16}}/>
              <span style={{fontSize:13,fontWeight:600}}>Enable Alert Message</span>
            </label>
            {f.alertEnabled&&<div style={fieldWrap}><input style={inputStyle} value={f.alertMsg} onChange={e=>set("alertMsg",e.target.value)} placeholder="Alert message shown to teams on this event..."/></div>}
            <label style={{...toggleRow,cursor:"pointer"}}>
              <input type="checkbox" checked={f.streamEnabled} onChange={e=>set("streamEnabled",e.target.checked)} style={{width:16,height:16}}/>
              <span style={{fontSize:13,fontWeight:600}}>Enable Live Streaming</span>
            </label>
            {f.streamEnabled&&<div style={fieldWrap}><input style={inputStyle} value={f.streamURL} onChange={e=>set("streamURL",e.target.value)} placeholder="Live stream URL..."/></div>}
            <div style={fieldWrap}><label style={labelStyle}>Rainout Line Embed</label><input style={inputStyle} value={f.rainoutEmbed} onChange={e=>set("rainoutEmbed",e.target.value)} placeholder="Rainout line embed code or URL"/></div>
          </div>

          <div style={{marginTop:28,display:"flex",gap:12}}>
            <button className="btn btn-primary" onClick={handleCreate}>✓ Create Event</button>
            <button className="btn btn-secondary" onClick={()=>setF(p=>({...p,name:"",city:"",startDate:"",endDate:"",entryDeadline:"",director:"",lodgingDirector:"",quickDetails:"",advancedDesc:"",hotelInfo:"",alertMsg:"",streamURL:"",rainoutEmbed:"",divisions:[],alertEnabled:false,streamEnabled:false,entryFeeAmt:"",entryFeePublic:"",gateFeeAmt:"",gateFeePublic:"",otherFeeAmt:"",otherFeePublic:"",otherFeeDesc:"",refundPolicy:""}))}>✕ Clear Form</button>
          </div>

        </div>
      </div>
    </div>
  );
}

/* ════════════════════ GLOBAL PUBLIC FAN VIEW ════════════════════ */
function GlobalPublicFanView({events,evRosters,allGames}){
  const [selEvId,setSelEvId]=useState(null);
  const [pubDivId,setPubDivId]=useState(null);
  const [pubTab,setPubTab]=useState("standings");
  const [pubBg,setPubBg]=useState([]);
  const displayEvents=events.filter(e=>e.status!=="complete").sort((a,b)=>a.date<b.date?-1:1);
  const selEv=selEvId?events.find(e=>String(e.id)===String(selEvId)):null;
  const divisions=selEv?(selEv.divisions||[]).map(normDiv):[];
  const activeDivObj=(pubDivId&&divisions.find(d=>d.id===pubDivId))||divisions[0]||null;
  const rosterKey=selEv&&activeDivObj?String(selEv.id)+"_"+activeDivObj.id:"";
  const pubTeams=evRosters[rosterKey]||[];
  const teamIdSet=new Set(pubTeams.map(t=>t.id));
  const pubGames=allGames.filter(g=>teamIdSet.has(g.t1)||teamIdSet.has(g.t2));
  if(!selEv){
    return(
      <div>
        <div className="card">
          <div className="card-hd" style={{paddingBottom:12}}>
            <span className="card-title">👁 Public Fan View</span>
            <span style={{fontSize:12,color:"var(--gray)"}}>Select an event to view live standings, brackets and schedule</span>
          </div>
          {displayEvents.length===0?(
            <div style={{padding:"32px",textAlign:"center",color:"var(--gray)",fontSize:13}}>No upcoming events found.</div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14,padding:"0 18px 18px"}}>
              {displayEvents.map(ev=>{
                const divs=(ev.divisions||[]).map(normDiv);
                const totalTeams=divs.reduce((a,d)=>a+(d.numTeams||0),0);
                return(
                  <div key={ev.id} onClick={()=>{setSelEvId(ev.id);setPubDivId(null);setPubTab("standings");setPubBg([]);}}
                    style={{border:"1px solid #e2e8f0",borderRadius:10,padding:"14px 16px",cursor:"pointer",
                      background:"#fff",transition:"box-shadow .15s,border-color .15s",boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
                    <div style={{fontWeight:800,fontSize:14,color:"var(--navy)",marginBottom:3,lineHeight:1.3}}>{ev.name}</div>
                    <div style={{fontSize:11,color:"var(--gray)",marginBottom:10}}>📍 {ev.loc} · 📅 {ev.date}</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      <span className="badge b-blue" style={{fontSize:10}}>{ev.stature||"Event"}</span>
                      <span className="badge b-gray" style={{fontSize:10}}>{divs.length} Div{divs.length!==1?"s":""}</span>
                      {totalTeams>0&&<span className="badge b-gray" style={{fontSize:10}}>{totalTeams} Teams</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      </div>
    );
  }
  return(
    <div>
      <div style={{marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
        <button className="btn btn-secondary btn-sm" onClick={()=>setSelEvId(null)}>← All Events</button>
        <span style={{fontWeight:700,fontSize:13,color:"var(--navy)"}}>{selEv.name}</span>
      </div>
      <div style={{background:"#fff",borderRadius:12,overflow:"hidden",boxShadow:"var(--sh-lg)"}}>
        <div className="pub-header">
          <div className="pub-ename">{selEv.name}</div>
          <div className="pub-meta">📍 {selEv.loc} · 📅 {selEv.date} · {selEv.stature}</div>
          {divisions.length>0?(
            <div className="pub-divs">
              {divisions.map(d=>(
                <div key={d.id} className={`pub-div ${activeDivObj?.id===d.id?"on":""}`}
                  onClick={()=>{setPubDivId(d.id);setPubBg(bracketGamesDB(d.id));}}>
                  {d.label}
                </div>
              ))}
            </div>
          ):null}
          <div className="pub-tabs">
            {["standings","bracket","schedule"].map(t=>(
              <div key={t} className={`pub-tab ${pubTab===t?"on":""}`} onClick={()=>setPubTab(t)}>
                {t==="standings"?"📊 Standings":t==="bracket"?"🏆 Bracket":"📅 Schedule"}
              </div>
            ))}
          </div>
        </div>
        <div className="pub-body">
          {pubTeams.length===0&&(
            <div style={{padding:"24px",textAlign:"center",color:"var(--gray)",fontSize:13,borderBottom:"1px solid #f0f4f8"}}>
              No team data loaded for this division yet. Open the event in Event Management to sync teams.
            </div>
          )}
          {pubTab==="standings"?<StandingsView teams={pubTeams} games={pubGames}/>:null}
          {pubTab==="bracket"?<BracketView bGames={pubBg} setBGames={setPubBg} teams={pubTeams} editable={false}/>:null}
          {pubTab==="schedule"?(
            pubGames.length===0?(
              <div style={{padding:"24px",textAlign:"center",color:"var(--gray)",fontSize:13}}>No scheduled games found for this division.</div>
            ):(
              <div className="tbl-wrap">
                <table>
                  <thead><tr><th>#</th><th>Pool</th><th>Date</th><th>Time</th><th>Field</th><th>Home</th><th>Score</th><th>Away</th><th>Status</th></tr></thead>
                  <tbody>{pubGames.map(g=>{
                    const t1=tByIdFrom(g.t1,pubTeams),t2=tByIdFrom(g.t2,pubTeams),w=winOf(g);
                    return<tr key={g.id}>
                      <td className="fw7">{g.num}</td>
                      <td>{g.pool?<span className={`chip ${poolChipClass(g.pool)}`}>Pool {g.pool}</span>:null}</td>
                      <td className="t-sm">{g.date}</td><td className="t-sm">{g.time}</td>
                      <td className="t-sm t-gray">{g.field}</td>
                      <td style={{fontWeight:w===g.t1?700:400}}>{t1?t1.name:"—"}</td>
                      <td className="fw8" style={{textAlign:"center"}}>{g.s1!=null?`${g.s1} — ${g.s2}`:""}</td>
                      <td style={{fontWeight:w===g.t2?700:400}}>{t2?t2.name:"—"}</td>
                      <td><span className={`status ${g.status==="final"?"s-final":"s-scheduled"}`}>{g.status==="final"?"✓ Final":"Scheduled"}</span></td>
                    </tr>;
                  })}</tbody>
                </table>
              </div>
            )
          ):null}
        </div>
      </div>
    </div>
  );
}

function ShortcutHint({id}){
  const labels={"s-game-mgr":["🗂","Game Manager","View/edit game assignments, swap teams, enter scores. Access via: Events → Event → Division → Pool Flight → Game Manager tab."],"s-grid":["🗺","Grid Builder","Plan which divisions play on which fields at each time slot across all your parks. The division assignment layer before scheduling. Access via: Scheduling Tools → Grid Builder."],"s-layout":["📋","Schedule Builder","Build matchups, assign games to time slots and fields, import from Excel. Access via: Events → Event → Division → Pool Flight → Schedule Builder tab."],"s-bracket":["🏆","Brackets","Single/double elimination bracket management. Access via: Events → Event → Division → Bracket Flight → Bracket tab."],"s-standings":["📊","Pool Standings","Real-time W/L/T, PF/PA, run differential. Access via: Events → Event → Division → Pool Flight → Standings tab."],"s-seeds":["🎯","Seeding","USSSA Points + Power Rating seeding table. Access via: Events → Event → Division → Flight → Seeds tab."],"s-parks":["🏟","Parks & Fields","Select and assign tournament parks. Access via: Events → Event → Division → Flight → Parks tab."],"s-umpires":["🟡","Umpires","Assign certified umpires to games. Access via: Events → Event → Division → Flight → Umpires tab."],"s-pitching":["⚾","Pitching Tracker","Pitch counts and rest requirements by age group. Access via: Events → Event → Division → Pool Flight → Pitching tab."],"s-ppmatrix":["🔢","Pool Matrix","Serpentine seeding matrix calculator. Access via: Events → Event → Division → Flight → PP Matrix tab."],"s-placing":["🥇","Final Placing","Division champion and runner-up display. Access via: Events → Event → Division → Bracket Flight → Placing tab."],"s-rosters":["👥","Rosters","Team rosters for any division. Access via: Events → Event → Division → Flight → Contact tab."],"s-livelock":["🔒","Live & Lock Settings","Control public visibility and lock events. Access via: Events → Event → Division → Flight → Live & Lock tab."],"s-public":["👁","Public Fan View","Toggle any event to Public Fan View mode using the view toggle in the event detail page."]};
  const info=labels[id];
  if(!info)return null;
  const [ico,title,desc]=info;
  return(
    <div className="card">
      <div className="card-body" style={{textAlign:"center",padding:"50px 28px"}}>
        <div style={{fontSize:48,marginBottom:10}}>{ico}</div>
        <div style={{fontSize:17,fontWeight:800,color:"var(--navy)",marginBottom:6}}>{title}</div>
        <div style={{fontSize:13,color:"var(--gray)",maxWidth:420,margin:"0 auto",lineHeight:1.6}}>{desc}</div>
        <div style={{marginTop:20,padding:"12px 16px",background:"var(--blue-l)",borderRadius:8,fontSize:12,color:"var(--blue)",fontWeight:600}}>
          💡 Tip: All scheduling tools are available inline when you open an event and navigate to a specific division and flight.
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ APP ROOT ════════════════════ */
function App(){
  const [view,setView]=useState("events");
  const [selEv,setSelEv]=useState(null);
  const [events,setEvents]=useState(EVENTS_DB);
  const [allGames,setAllGames]=useState([...PG8,...PG9,...PG12]);
  const [allBracketGames,setAllBracketGames]=useState([...BG8,...BG9]);
  const [evRosters,setEvRosters]=useState({});
  const [schedCtx,setSchedCtx]=useState(null);
  const [gridCtx,setGridCtx]=useState(null);
  const [bracketCtx,setBracketCtx]=useState(null);
  const [savedBrackets,setSavedBrackets]=useState({}); // {divLabel:{games,seeds,savedAt}}
  const [standingsCtx,setStandingsCtx]=useState(null);
  const [seedsCtx,setSeedsCtx]=useState(null);
  const [gameMgrCtx,setGameMgrCtx]=useState(null);
  const [pitchCtx,setPitchCtx]=useState(null);
  const [evFieldAssignments,setEvFieldAssignments]=useState({});
  const [dbStatus,setDbStatus]=useState('connecting');
  const [liveDiv,setLiveDiv]=useState({status:'idle',updatedAt:null});
  useEffect(()=>{
    (async()=>{
      const rows=await dbLoad('events');
      if(rows&&rows.length>0){
        const merged=[...EVENTS_DB];
        rows.forEach(r=>{
          if(!merged.find(e=>String(e.id)===String(r.id)))
            merged.push({...r,divisions:r.divisions||[]});
        });
        setEvents(merged);
        setDbStatus('connected');
      }else{
        setDbStatus(rows!==null?'connected':'offline');
      }
    })();
  },[]);
  useEffect(()=>{
    setLiveDiv({status:'loading',updatedAt:null});
    fetch('https://usssa-poller.chad-157.workers.dev/divisions')
      .then(r=>r.json())
      .then(data=>{
        if(data.status==='ok'&&data.divisions){
          setEvents(prev=>prev.map(ev=>{
            const live=data.divisions[String(ev.id)];
            if(live&&live.length>0)return{...ev,divisions:live};
            return ev;
          }));
          setLiveDiv({status:'loaded',updatedAt:data.updatedAt,source:data.source});
        }else{
          setLiveDiv({status:'error',updatedAt:null});
        }
      })
      .catch(()=>setLiveDiv({status:'error',updatedAt:null}));
  },[]);
  function nav(id){setView(id);if(id==="events")setSelEv(null)}
  function selectEvent(ev){setSelEv(ev);setView("event-detail")}
  function handleSchedule(ctx){setSchedCtx(ctx);nav("s-layout");}
  function handleGrid(ctx){
    const fa=evFieldAssignments[ctx.evId]||[];
    const assignedParks=fa.length>0?fa.map((a,i)=>({id:`pk_${a.venueId||i}`,name:a.venueName,color:PARK_COLORS[i%PARK_COLORS.length],fields:a.fields||["Field 1","Field 2"]})):null;
    setGridCtx({...ctx,assignedParks});
    nav("s-grid");
  }
  function handleSendToSchedule(fieldData){setSchedCtx(prev=>({...(prev||{}),fieldData}));nav("s-layout");}
  const title=()=>{
    if(view==="event-detail"&&selEv)return selEv.name;
    if(view==="create")return "Create New Event";
    return NAV.flatMap(s=>s.items).find(i=>i.id===view)?.label||"USSSA Tournament Manager";
  };
  const sub=()=>view==="event-detail"&&selEv?`${selEv.loc} · ${selEv.date}`:null;
  return(
    <div className="app">
      <nav className="sidebar">
        <div className="sb-logo">
          <div className="brand">USSSA</div>
          <div className="sub">Tournament Manager</div>
        </div>
        {NAV.map(s=>(
          <div key={s.sec} className="sb-sec">
            <div className="sb-lbl">{s.sec}</div>
            {s.items.map(item=>(
              <div key={item.id}
                className={`sb-item ${view===item.id||(item.id==="events"&&view==="event-detail")?"active":""}`}
                onClick={()=>nav(item.id)}>
                <span className="ico">{item.ico}</span>{item.label}
              </div>
            ))}
          </div>
        ))}
        <div className="sb-user">
          <div style={{fontSize:10,color:"rgba(255,255,255,.35)",textTransform:"uppercase",letterSpacing:.8}}>Signed in as</div>
          <div style={{fontSize:13,fontWeight:700,color:"#fff",marginTop:2}}>Steve Hassett</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.4)"}}>steve@utproducts.com</div>
        </div>
      </nav>
      <main className="main">
        <div className="topbar">
          <div>
            <div className="tb-title">{title()}</div>
            {sub()&&<div className="tb-sub">{sub()}</div>}
          </div>
          <div className="tb-right">
            <span className={`badge ${dbStatus==='connected'?'b-green':dbStatus==='connecting'?'b-gold':'b-red'}`} style={{fontSize:10}}>{dbStatus==='connected'?'● DB Connected':dbStatus==='connecting'?'◌ Connecting...':'○ Offline (Demo)'}</span>
            {liveDiv.status==='loading'&&<span className="badge b-gold" style={{fontSize:10}}>⟳ Divisions loading…</span>}
            {liveDiv.status==='loaded'&&<span className="badge b-green" title={`Source: ${liveDiv.source} · Updated: ${new Date(liveDiv.updatedAt).toLocaleTimeString()}`} style={{fontSize:10}}>● Divisions live</span>}
            {liveDiv.status==='error'&&<span className="badge b-red" style={{fontSize:10}}>○ Divisions offline</span>}
            <span className="badge b-gray" style={{fontSize:10}}>2026 Season</span>
            {view!=="create"&&<button className="btn btn-primary btn-sm" onClick={()=>nav("create")}>+ New Event</button>}
          </div>
        </div>
        <div className="content">
          {view==="events"&&<Dashboard events={events} onSelect={selectEvent} onNav={nav} evRosters={evRosters} setEvRosters={setEvRosters}/>}
          {view==="event-detail"&&selEv&&<EventDetailView ev={selEv} onBack={()=>nav("events")} onNav={nav} evRosters={evRosters} setEvRosters={setEvRosters} onSchedule={handleSchedule} onGrid={handleGrid} fieldAssignments={evFieldAssignments[selEv?.id]||[]} setFieldAssignments={fa=>setEvFieldAssignments(prev=>({...prev,[selEv.id]:fa}))}/>}
          {view==="create"&&<CreateEventView/>}
          {view==="s-game-mgr"&&<GameMgrView games={allGames} setGames={setAllGames} teams={ALL_TEAMS} gameMgrCtx={gameMgrCtx} setGameMgrCtx={setGameMgrCtx} events={events} evRosters={evRosters}/>}
          {view==="s-grid"&&<GridBuilderView gridCtx={gridCtx} setGridCtx={setGridCtx} onSendToSchedule={handleSendToSchedule} events={events} evRosters={evRosters}/>}
          {view==="s-layout"&&<LayoutView games={allGames} setGames={setAllGames} teams={[]} schedCtx={schedCtx} setSchedCtx={setSchedCtx} events={events} evRosters={evRosters}/>}
          {view==="s-bracket"&&<BracketView bGames={allBracketGames} setBGames={setAllBracketGames} teams={[]} games={allGames} editable={true} events={events} evRosters={evRosters} bracketCtx={bracketCtx} setBracketCtx={setBracketCtx} savedBrackets={savedBrackets} setSavedBrackets={setSavedBrackets}/>}
          {view==="s-standings"&&<StandingsView standingsCtx={standingsCtx} setStandingsCtx={setStandingsCtx} events={events} evRosters={evRosters} allGames={allGames}/>}
          {view==="s-seeds"&&<SeedsView seedsCtx={seedsCtx} setSeedsCtx={setSeedsCtx} events={events} evRosters={evRosters}/>}
          {view==="s-parks"&&<ParksView eventParks={[]}/>}
          {view==="s-umpires"&&<UmpiresView/>}
          {view==="s-pitching"&&<PitchingView teams={ALL_TEAMS} games={allGames} setGames={setAllGames} pitchCtx={pitchCtx} setPitchCtx={setPitchCtx} events={events} evRosters={evRosters}/>}
          {view==="s-ppmatrix"&&<PPMatrixView/>}
          {view==="s-placing"&&<PlacingView bGames={allBracketGames} teams={ALL_TEAMS}/>}
          {view==="s-livelock"&&<LiveLockView/>}
          {view==="s-public"&&<GlobalPublicFanView events={events} evRosters={evRosters} allGames={allGames}/>}
          {SHORTCUT_IDS.has(view)&&!["s-game-mgr","s-grid","s-layout","s-bracket","s-standings","s-seeds","s-parks","s-umpires","s-pitching","s-ppmatrix","s-placing","s-livelock","s-public"].includes(view)&&<ShortcutHint id={view}/>}
        </div>
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
