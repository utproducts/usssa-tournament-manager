<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}
:root{
  --red:#c0392b;--red-d:#922b21;--red-l:#fadbd8;
  --navy:#1a1a2e;--navy-m:#16213e;--navy-l:#0f3460;
  --gold:#e67e22;--gold-l:#fef5e7;
  --green:#27ae60;--green-l:#d5f5e3;
  --blue:#2980b9;--blue-l:#d6eaf8;
  --purple:#8e44ad;--purple-l:#f4ecf7;
  --gray:#95a5a6;--gray-l:#f8f9fa;--gray-m:#ecf0f1;--gray-d:#7f8c8d;
  --white:#fff;
  --sh:0 2px 8px rgba(0,0,0,.1);--sh-lg:0 8px 32px rgba(0,0,0,.15);
  --r:10px;--r-sm:6px
}
.app{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--navy);color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:200;overflow-y:auto;flex-shrink:0}
.main{margin-left:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08);position:sticky;top:0;z-index:100}
.content{padding:20px 24px;flex:1}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.1)}
.sb-logo .brand{font-size:20px;font-weight:900;color:var(--red);letter-spacing:-.5px}
.sb-logo .sub{font-size:10px;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:1px;margin-top:1px}
.sb-sec{padding:6px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.sb-lbl{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1.2px;padding:6px 14px 3px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);transition:.15s;border-left:3px solid transparent;white-space:nowrap}
.sb-item:hover{background:rgba(255,255,255,.07);color:#fff}
.sb-item.active{background:rgba(192,57,43,.22);color:#fff;border-left-color:var(--red);font-weight:600}
.sb-item .ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sb-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.1);margin-top:auto}
.tb-title{font-size:17px;font-weight:800;color:var(--navy)}
.tb-sub{font-size:11px;color:var(--gray);margin-top:1px}
.tb-right{display:flex;align-items:center;gap:10px}
.card{background:#fff;border-radius:var(--r);box-shadow:var(--sh)}
.card-hd{padding:14px 18px 10px;border-bottom:1px solid var(--gray-m);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13.5px;font-weight:700;color:var(--navy)}
.card-body{padding:18px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.15s;white-space:nowrap}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--red);color:#fff}.btn-primary:hover{background:var(--red-d)}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:var(--navy-m)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#1e8449}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#1a6fa0}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#ca6f1e}
.btn-secondary{background:var(--gray-m);color:var(--navy)}.btn-secondary:hover{background:#dde}
.btn-outline{background:transparent;border:1.5px solid var(--gray);color:#555}.btn-outline:hover{border-color:var(--navy);color:var(--navy)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px}
.btn-danger{background:var(--red-l);color:var(--red-d)}.btn-danger:hover{background:var(--red-d);color:#fff}
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:700}
.b-red{background:var(--red-l);color:var(--red-d)}
.b-green{background:var(--green-l);color:#1e6b3d}
.b-blue{background:var(--blue-l);color:#1a5276}
.b-gold{background:var(--gold-l);color:#7a4f00}
.b-gray{background:var(--gray-m);color:#555}
.b-navy{background:var(--navy);color:#fff}
.status{display:inline-flex;align-items:center;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700}
.s-final{background:var(--green-l);color:var(--green)}
.s-live{background:#fef3cd;color:#b7770d}
.s-scheduled{background:var(--blue-l);color:var(--blue)}
.s-upcoming{background:var(--gray-m);color:var(--gray-d)}
.tabs{display:flex;border-bottom:2px solid var(--gray-m);margin-bottom:18px;overflow-x:auto;gap:0}
.tab{padding:9px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--gray);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:.15s}
.tab:hover{color:var(--navy)}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.flex{display:flex}.flex-c{display:flex;align-items:center}.flex-b{display:flex;align-items:center;justify-content:space-between}.flex-w{display:flex;flex-wrap:wrap}
.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}
.stat-card{background:#fff;border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);display:flex;align-items:center;gap:14px}
.stat-ico{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.stat-val{font-size:26px;font-weight:900;color:var(--navy);line-height:1}
.stat-lbl{font-size:11px;color:var(--gray);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--navy);color:#fff;padding:9px 12px;text-align:left;font-weight:600;font-size:11.5px;letter-spacing:.3px;white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--gray-m);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}
.tbl-wrap{border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.tbl-scroll{overflow-x:auto}
.div-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.div-pill{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:2px solid transparent;transition:.15s}
.dp-off{background:var(--gray-m);color:#555}.dp-off:hover{background:#dde}
.dp-on{background:var(--navy);color:#fff;border-color:var(--navy)}
.fl-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.fl-tab{padding:6px 12px;border-radius:var(--r-sm);font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--gray-m);color:#666;background:#fff;transition:.15s}
.fl-tab:hover{border-color:var(--navy-l);color:var(--navy)}
.fl-tab.on{border-color:var(--red);color:var(--red);background:var(--red-l)}
.fl-tab.fl-live::after{content:" 🔴";font-size:9px}
.fl-add{border-style:dashed!important}
.score-in{width:54px;padding:5px 6px;border:2px solid var(--gray-m);border-radius:var(--r-sm);font-size:14px;font-weight:800;text-align:center;transition:.15s}
.score-in:focus{outline:none;border-color:var(--blue)}
.score-w{background:var(--green-l);border-color:var(--green);color:var(--green)}
.score-l{color:var(--gray)}
.seed-rank{width:26px;height:26px;border-radius:50%;background:var(--navy);color:#fff;font-weight:800;font-size:11px;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.sr-1{background:#f39c12;color:#7a5000}
.sr-2{background:#adb5bd}
.sr-3{background:#cd7f32}
.brk-wrap{overflow-x:auto;padding:8px 0}
.brk{display:flex;align-items:flex-start;min-width:600px}
.brk-col{display:flex;flex-direction:column;min-width:195px}
.brk-rnd-lbl{text-align:center;font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.8px;padding:4px 0 10px}
.brk-game{border:2px solid var(--gray-m);border-radius:8px;margin:5px 8px;background:#fff;overflow:hidden;box-shadow:var(--sh)}
.brk-team{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;font-size:12px;border-bottom:1px solid var(--gray-m);gap:8px;min-height:34px}
.brk-team:last-child{border-bottom:none}
.brk-w{background:var(--green-l);font-weight:700}
.brk-l{color:#bbb}
.brk-tbd{color:#ccc;font-style:italic;font-size:11px}
.brk-sc{font-weight:900;font-size:14px;min-width:22px;text-align:right}
.brk-sc-w{color:var(--green)}
.brk-meta{font-size:10px;color:var(--gray);padding:0 8px 4px;text-align:center}
.ly-wrap{border:2px solid var(--gray-m);border-radius:var(--r);overflow:hidden;margin-top:12px}
.ly-hdr{display:flex;background:var(--navy)}
.ly-time-hdr{width:85px;padding:8px;font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-align:center;flex-shrink:0;border-right:1px solid rgba(255,255,255,.1)}
.ly-fld-hdr{flex:1;padding:8px;text-align:center;font-size:11px;font-weight:700;color:#fff;border-left:1px solid rgba(255,255,255,.1)}
.ly-row{display:flex;border-top:1px solid var(--gray-m)}
.ly-row:hover{background:#fafbff}
.ly-time{width:85px;padding:8px 6px;font-size:11px;font-weight:600;color:var(--gray-d);text-align:center;flex-shrink:0;border-right:2px solid var(--gray-m);display:flex;align-items:center;justify-content:center}
.ly-slot{flex:1;border-left:1px solid var(--gray-m);min-height:50px;cursor:pointer;transition:background .1s;display:flex;align-items:center;justify-content:center;padding:4px}
.ly-slot:hover{background:#eff6ff}
.ly-slot.has-game{background:#e8f4fd;cursor:default}
.ly-slot.blocked{background:var(--red-l);cursor:not-allowed}
.ly-chip{background:var(--blue);color:#fff;border-radius:4px;padding:3px 6px;font-size:10px;font-weight:700;text-align:center;width:100%;line-height:1.3}
.ly-chip .t2{font-size:9px;opacity:.8;margin-top:2px}
.pool-hdr{font-size:12px;font-weight:800;padding:8px 12px;background:var(--navy);color:#fff;border-radius:var(--r-sm) var(--r-sm) 0 0;letter-spacing:.3px}
.pool-tbl{border:1px solid var(--gray-m);border-top:none;border-radius:0 0 var(--r-sm) var(--r-sm);overflow:hidden;margin-bottom:18px}
.alert{padding:10px 14px;border-radius:var(--r-sm);font-size:12.5px;margin-bottom:14px;display:flex;gap:9px;align-items:flex-start}
.a-info{background:var(--blue-l);color:#1a5276;border-left:4px solid var(--blue)}
.a-warn{background:var(--gold-l);color:#7a4f00;border-left:4px solid var(--gold)}
.a-success{background:var(--green-l);color:#1e6b3d;border-left:4px solid var(--green)}
.a-purple{background:var(--purple-l);color:#5b2c6f;border-left:4px solid var(--purple)}
input[type=text],input[type=number],select,textarea{padding:7px 10px;border:1.5px solid var(--gray-m);border-radius:var(--r-sm);font-size:13px;color:var(--navy);background:#fff;transition:.15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
label{font-size:12px;font-weight:600;color:var(--gray-d);display:block;margin-bottom:3px}
.pp-cell{width:34px;height:34px;border-radius:6px;background:var(--gray-m);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;margin:auto}
.pp-cell-top{background:var(--gold-l);color:#7a4f00}
.pp-cell-2{background:#e8f4fd;color:var(--blue)}
.pitch-bar{height:12px;border-radius:6px;background:var(--green-l);overflow:hidden;margin-top:4px}
.pitch-fill{height:100%;background:var(--green);border-radius:6px;transition:width .3s}
.pitch-fill.warn{background:var(--gold)}
.pitch-fill.danger{background:var(--red)}
.place-card{background:#fff;border-radius:10px;padding:16px;box-shadow:var(--sh);text-align:center}
.place-medal{font-size:36px;margin-bottom:8px}
.place-team{font-size:14px;font-weight:800;color:var(--navy)}
.place-detail{font-size:11px;color:var(--gray);margin-top:3px}
.pub-header{background:linear-gradient(135deg,var(--navy) 0%,var(--navy-l) 100%);color:#fff;padding:28px 32px 0}
.pub-ename{font-size:24px;font-weight:900;letter-spacing:-.5px}
.pub-meta{font-size:13px;opacity:.7;margin-top:3px}
.pub-divs{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.pub-div{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.6);border:2px solid rgba(255,255,255,.2);transition:.15s}
.pub-div:hover{color:#fff;border-color:rgba(255,255,255,.5)}
.pub-div.on{color:#fff;background:var(--red);border-color:var(--red)}
.pub-tabs{display:flex;margin-top:16px}
.pub-tab{padding:11px 18px;font-size:13px;font-weight:700;cursor:pointer;color:rgba(255,255,255,.6);border-bottom:3px solid transparent;transition:.15s}
.pub-tab:hover{color:#fff}
.pub-tab.on{color:#fff;border-bottom-color:var(--red)}
.pub-body{padding:22px 32px}
.v-toggle{display:flex;border:2px solid var(--gray-m);border-radius:8px;overflow:hidden}
.v-btn{padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:#fff;color:#777;transition:.15s}
.v-btn.on{background:var(--navy);color:#fff}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}
.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}
.t-sm{font-size:12px}.t-xs{font-size:11px}.t-gray{color:var(--gray)}.t-navy{color:var(--navy)}.t-red{color:var(--red)}.t-green{color:var(--green)}
.fw7{font-weight:700}.fw8{font-weight:800}.fw9{font-weight:900}
.w100{width:100%}
hr{border:none;border-top:1px solid var(--gray-m);margin:16px 0}
.chip{display:inline-flex;padding:2px 7px;border-radius:4px;font-size:11px;font-weight:700}
.chip-a{background:#dbeafe;color:#1e40af}
.chip-b{background:#dcfce7;color:#15803d}
.chip-c{background:#fef3c7;color:#92400e}
.chip-d{background:#fce7f3;color:#9d174d}
.tgl{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray-m)}
.tgl:last-child{border-bottom:none}
.tgl-sw{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;transition:.2s;flex-shrink:0}
.tgl-dot{width:18px;height:18px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
</style>

/* ════════════════════ HELPERS ════════════════════ */
function tByIdFrom(id,db){return db.find(t=>t.id===id)}
function winOf(g){if(g.status==="bye"&&g.t1)return g.t1;if(g.status!=="final"||g.s1===null||g.s2===null)return null;return g.s1>g.s2?g.t1:g.t2}
function loseOf(g){if(g.status==="bye")return null;if(g.status!=="final"||g.s1===null||g.s2===null)return null;return g.s1>g.s2?g.t2:g.t1}
function calcStandings(teams,games){
  const s={};
  teams.forEach(t=>{s[t.id]={...t,w:0,l:0,t_:0,pf:0,pa:0,pts:0}});
  games.forEach(g=>{
    if(g.status!=="final"||g.s1===null)return;
    if(!s[g.t1]||!s[g.t2])return;
    s[g.t1].pf+=g.s1;s[g.t1].pa+=g.s2;
    s[g.t2].pf+=g.s2;s[g.t2].pa+=g.s1;
    if(g.s1>g.s2){s[g.t1].w++;s[g.t2].l++;s[g.t1].pts+=2}
    else if(g.s2>g.s1){s[g.t2].w++;s[g.t1].l++;s[g.t2].pts+=2}
    else{s[g.t1].t_++;s[g.t2].t_++;s[g.t1].pts++;s[g.t2].pts++}
  });
  return Object.values(s).sort((a,b)=>b.pts-a.pts||(b.pf-b.pa)-(a.pf-a.pa)||b.pf-a.pf);
}
function poolChipClass(pool){return{A:"chip-a",B:"chip-b",C:"chip-c",D:"chip-d"}[pool]||"chip-a"}
function teamDB(divId){
  const map={101:T9,102:T12,103:T9,104:T9,105:T9,106:T8,203:T12,501:T12};
  return map[divId]||T8;
}
function poolGamesDB(divId){
  const map={106:PG8,105:PG9,203:PG12};
  return map[divId]||[];
}
function bracketGamesDB(divId){
  const map={106:BG8,105:BG9};
  return map[divId]||[];
}

/* ════ normDiv — unify live {divID,ageCode,numTeams} vs old {id,label,teams,flights} ════ */
function normDiv(d){
  return{
    id:d.divID||d.id||"d"+d.ageCode||"d0",
    label:d.ageCode||d.label||"Division",
    code:d.code||(d.ageCode||"").replace(/\s+/g,""),
    numTeams:d.numTeams!=null?d.numTeams:(d.teams!=null?d.teams:0),
    flights:d.flights||[],
    wl:d.wl||""
  };
}

/* ════════════════════ SEEDS ════════════════════ */
function SeedsView({seedsCtx,setSeedsCtx,events,evRosters}){
  const [noTeamsMsg,setNoTeamsMsg]=useState('');

  async function loadEvent(ev){
    if(!ev||!setSeedsCtx)return;
    const normalizedDivs=(ev.divisions||[]).map(normDiv);
    const divCounts={};
    let allTeams=normalizedDivs.flatMap(d=>{
      const rk=String(ev.id)+"_"+d.id;
      const t=(evRosters&&evRosters[rk])||[];
      if(d.label)divCounts[d.label]=t.length||d.numTeams||0;
      return t;
    });
    const usssaId=String(ev.evid||ev.id);
    setSeedsCtx({evId:String(ev.id),usssaId,evName:ev.name,teams:allTeams,divCounts,loadingTeams:!allTeams.length,_divisions:ev.divisions||[]});
    if(!allTeams.length){
      setSeedsCtx(prev=>prev?{...prev,loadingTeams:true}:null);
      try{
        const r=await fetch('https://usssa-poller.chad-157.workers.dev/event-teams?event_id='+encodeURIComponent(usssaId));
        const j=await r.json();
        if(j.status==='ok'&&j.teams&&j.teams.length){
          const evId=String(ev.id);
          const appTeams=j.teams.map(t=>({
            id:'us_'+evId+'_'+(t.team_name||'').replace(/\W+/g,'_'),
            name:t.team_name||'',cls:t.division||'',city:t.team_city||'',
            state:t.team_state||'FL',pts:t.pts||0,pr:t.pr||0,
            icr:t.icr||'',ovr:t.ovr||''
          }));
          setSeedsCtx(prev=>prev?{...prev,teams:appTeams,loadingTeams:false}:null);
        }else{
          setSeedsCtx(prev=>prev?{...prev,loadingTeams:false}:null);
          setNoTeamsMsg('No teams found — sync teams in Director Tools → Roster first.');
        }
      }catch(e){
        setSeedsCtx(prev=>prev?{...prev,loadingTeams:false}:null);
        setNoTeamsMsg('Could not load teams: '+e.message);
      }
    }
  }

  const teams=seedsCtx?.teams||[];
  const divCode=seedsCtx?._divisions?.[0]?.label||"";
  const ageNum=cls=>{const m=(cls||"").match(/^(\d+)/);return m?parseInt(m[1]):0};
  const clsSuffix=cls=>(cls||"").replace(/^\d+/,"");
  const CLASS_ORDER=["Maj","AAA","AA","A","B","C"];
  const isOpen=/Op$/i.test(divCode);
  const groupMap={};
  teams.forEach(t=>{
    const age=ageNum(t.cls);
    const suf=isOpen?"Open":clsSuffix(t.cls)||t.cls||"Other";
    const key=isOpen?`${age}`:`${age}||${suf}`;
    if(!groupMap[key])groupMap[key]={age,suf,teams:[]};
    groupMap[key].teams.push(t);
  });
  const groups=Object.values(groupMap).sort((a,b)=>{
    if(a.age!==b.age)return a.age-b.age;
    if(a.suf==="Open"&&b.suf==="Open")return 0;
    const ai=CLASS_ORDER.indexOf(a.suf),bi=CLASS_ORDER.indexOf(b.suf);
    return (ai<0?99:ai)-(bi<0?99:bi);
  });
  groups.forEach(g=>g.teams.sort((a,b)=>((b.pts||0)+(b.pr||0))-((a.pts||0)+(a.pr||0))));

  return(
    <div>
      {/* ── Event selector ── */}
      {!seedsCtx&&events&&events.length>0&&(
        <div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:10,padding:"14px 18px",marginBottom:18,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
          <span style={{fontSize:14}}>🎯</span>
          <span style={{fontSize:13,fontWeight:700,color:"#92400e"}}>Select an event to view seedings:</span>
          <select defaultValue="" onChange={e=>{const ev=(events||[]).find(ev=>String(ev.id)===e.target.value);if(ev)loadEvent(ev);}}
            style={{flex:1,minWidth:220,padding:"7px 10px",borderRadius:7,border:"1px solid #d1d5db",fontSize:13,fontWeight:600,background:"#fff"}}>
            <option value="">— choose event —</option>
            {(events||[]).map(ev=><option key={ev.id} value={String(ev.id)}>{ev.name}{ev.date?` · ${ev.date}`:""}</option>)}
          </select>
        </div>
      )}
      {/* ── Active event banner ── */}
      {seedsCtx&&(
        <div style={{background:"#dbeafe",border:"1px solid #93c5fd",borderRadius:8,padding:"10px 16px",marginBottom:14,
          display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
          <div style={{fontSize:13,fontWeight:700,color:"#1e40af",display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:15}}>🎯</span>
            <span>Seedings for: <strong>{seedsCtx.evName}</strong></span>
            {seedsCtx.loadingTeams&&<span style={{color:"#2563eb",fontStyle:"italic",fontSize:12}}>loading teams…</span>}
            {!seedsCtx.loadingTeams&&teams.length>0&&<span style={{fontWeight:500,fontSize:12,color:"#3b82f6"}}>· {teams.length} teams</span>}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {events&&events.length>0&&(
              <select defaultValue="" onChange={e=>{const ev=(events||[]).find(ev=>String(ev.id)===e.target.value);if(ev)loadEvent(ev);}}
                style={{padding:"5px 8px",borderRadius:6,border:"1px solid #93c5fd",fontSize:12,fontWeight:600,background:"#eff6ff",color:"#1e40af"}}>
                <option value="">↔ Switch event</option>
                {(events||[]).map(ev=><option key={ev.id} value={String(ev.id)}>{ev.name}</option>)}
              </select>
            )}
            <button onClick={()=>{setSeedsCtx&&setSeedsCtx(null);setNoTeamsMsg('');}}
              style={{padding:"4px 12px",fontSize:11,fontWeight:700,borderRadius:6,border:"1px solid #93c5fd",background:"#fff",color:"#1e40af",cursor:"pointer"}}>
              ✕ Clear
            </button>
          </div>
        </div>
      )}
      {noTeamsMsg&&<Alrt type="warn">{noTeamsMsg}</Alrt>}
      {!seedsCtx&&(!events||!events.length)&&(
        <Alrt type="info">No events found. Create an event first in Event Management.</Alrt>
      )}
      {seedsCtx&&!seedsCtx.loadingTeams&&teams.length===0&&(
        <Alrt type="info">No teams found for <strong>{seedsCtx.evName}</strong>. Sync teams in Director Tools → Roster first.</Alrt>
      )}
      {/* ── Seedings table ── */}
      {groups.length>0&&(<>
        <Alrt type="info">📊 Teams seeded by USSSA Points + Power Rating.{isOpen?" Open event — all teams seeded together by age.":" Classed event — each age + class division seeds independently."}</Alrt>
        {groups.map(g=>(
          <div key={`${g.age}${g.suf}`} style={{marginBottom:24}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,padding:"7px 14px",
              background:"#eff6ff",borderLeft:"4px solid #1e3a5f",borderRadius:"0 5px 5px 0"}}>
              <span style={{fontWeight:800,fontSize:15,color:"#1e3a5f"}}>{g.age>0?`${g.age}U`:""}{g.suf?" "+g.suf:""}</span>
              <span style={{fontSize:12,color:"#64748b",fontWeight:600}}>{g.teams.length} {g.teams.length===1?"team":"teams"}</span>
            </div>
            <div className="tbl-wrap">
              <table>
                <thead><tr>
                  <th style={{width:40}}>#</th>
                  <th>Team</th>
                  <th>State · City</th>
                  <th>USSSA Pts</th>
                  <th>Power Rating</th>
                  <th>Total Score</th>
                  <th>In-Class</th>
                  <th>Overall</th>
                </tr></thead>
                <tbody>{g.teams.map((t,i)=>(
                  <tr key={t.id}>
                    <td><SeedRank n={i+1}/></td>
                    <td className="fw7" style={{color:"var(--blue)"}}>{t.name}</td>
                    <td className="t-sm">{t.state} · {t.city}</td>
                    <td className="fw7">{t.pts||"—"}</td>
                    <td>{t.pr||"—"}</td>
                    <td className="fw8" style={{color:"var(--navy)"}}>{(t.pts||0)+(t.pr||0)||"—"}</td>
                    <td>{t.icr||"—"}</td>
                    <td>{t.ovr||"—"}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        ))}
      </>)}
    </div>
  );
}

      )}
    </div>
  );
}

function GameMgrView({games,setGames,teams,readOnly,gameMgrCtx,setGameMgrCtx,events,evRosters}){
  const [fTeam,setFTeam]=useState("all");
  const [fPool,setFPool]=useState("all");
  const [showAddGame,setShowAddGame]=useState(false);
  const [newGame,setNewGame]=useState({pool:"A",date:"",time:"",field:"",t1:"",t2:""});
  async function loadEvent(ev){
    if(!ev||!setGameMgrCtx)return;
    const normalizedDivs=(ev.divisions||[]).map(normDiv);
    const divCounts={};
    let allTeams=normalizedDivs.flatMap(d=>{
      const rk=String(ev.id)+"_"+d.id;
      const t=(evRosters&&evRosters[rk])||[];
      if(d.label)divCounts[d.label]=t.length||d.numTeams||0;
      return t;
    });
    const usssaId=String(ev.evid||ev.id);
    setGameMgrCtx({evId:String(ev.id),usssaId,evName:ev.name,teams:allTeams,divCounts,loadingTeams:!allTeams.length,_divisions:ev.divisions||[]});
    if(!allTeams.length){
      try{
        const r=await fetch('https://usssa-poller.chad-157.workers.dev/event-teams?event_id='+encodeURIComponent(usssaId));
        const j=await r.json();
        if(j.status==='ok'&&j.teams&&j.teams.length){
          const evId=String(ev.id);
          const byDivLabel={};
          j.teams.forEach(t=>{const dl=(t.division||'').trim();if(!byDivLabel[dl])byDivLabel[dl]=[];byDivLabel[dl].push(t);});
          const newDivCounts={};
          normalizedDivs.forEach(d=>{newDivCounts[d.label]=(byDivLabel[d.label]||[]).length||d.numTeams||0;});
          allTeams=j.teams.map(t=>({
            id:'us_'+evId+'_'+(t.team_name||'').replace(/\W+/g,'_'),
            name:t.team_name||'',cls:t.division||'',city:t.team_city||'',
            state:t.team_state||'FL',coach:t.manager_name||'',
            email:t.manager_email||'',phone:t.manager_phone||''
          }));
          setGameMgrCtx({evId,usssaId,evName:ev.name,teams:allTeams,divCounts:newDivCounts,loadingTeams:false,_divisions:ev.divisions||[]});
        }else{
          setGameMgrCtx(prev=>prev?{...prev,loadingTeams:false}:null);
        }
      }catch(err){setGameMgrCtx(prev=>prev?{...prev,loadingTeams:false}:null);}
    }
  }
  const ctxTeams=gameMgrCtx?.teams?.length?gameMgrCtx.teams:teams;
  const evGames=gameMgrCtx?games.filter(g=>g.evId===gameMgrCtx.evId):[];
  const pools=[...new Set(evGames.map(g=>g.pool))].filter(Boolean).sort();
  const shown=evGames.filter(g=>(fPool==="all"||g.pool===fPool)&&(fTeam==="all"||g.t1===fTeam||g.t2===fTeam));
  const byPool={};
  shown.forEach(g=>{if(!byPool[g.pool])byPool[g.pool]=[];byPool[g.pool].push(g);});
  const poolPalette=[
    {bg:"#eff6ff",c:"#1d4ed8"},{bg:"#f0fdf4",c:"#15803d"},{bg:"#fdf4ff",c:"#7e22ce"},
    {bg:"#fff7ed",c:"#c2410c"},{bg:"#f0f9ff",c:"#0369a1"},{bg:"#fefce8",c:"#a16207"},
  ];

  function updField(id,k,v){
    if(readOnly)return;
    setGames(prev=>{const u=prev.map(g=>g.id===id?{...g,[k]:v}:g);const gm=u.find(g=>g.id===id);if(gm&&gm.evId!=="__demo__")dbSave('games',gm);return u;});
  }
  function updScore(id,k,v){
    if(readOnly)return;
    const n=v===""?null:parseInt(v);
    setGames(prev=>{
      const u=prev.map(g=>{if(g.id!==id)return g;const u2={...g,[k]:isNaN(n)?null:n};if(u2.s1!=null&&u2.s2!=null)u2.status="final";return u2;});
      const gm=u.find(g=>g.id===id);if(gm&&gm.evId!=="__demo__")dbSave('games',gm);return u;
    });
  }
  function setStatus(id,status){
    if(readOnly)return;
    setGames(prev=>{
      const u=prev.map(g=>{if(g.id!==id)return g;
        if(status==="clear")return{...g,s1:null,s2:null,status:"scheduled",home:null,gameType:"scored"};
        if(status==="scheduled")return{...g,s1:null,s2:null,status:"scheduled"};
        return{...g,status,gameType:status};});
      const gm=u.find(g=>g.id===id);if(gm&&gm.evId!=="__demo__")dbSave('games',gm);return u;
    });
  }
  function swapTeams(id){

      });

      evId:gameMgrCtx?.evId};

  }

  {id:"silver",label:"Silver",      color:"#475569", bg:"#f8fafc"},
  {id:"bronze",label:"Bronze",      color:"#92400e", bg:"#fff7ed"},
  {id:"blocked",label:"Blocked",    color:"#dc2626", bg:"#fee2e2"},
  {id:"open",  label:"Open",        color:"#94a3b8", bg:"#fff"},
];
const SLOT_MAP=Object.fromEntries(SLOT_TYPES.map(s=>[s.id,s]));
const DEFAULT_TIMES=["8:00 AM","10:00 AM","12:00 PM","2:00 PM","4:00 PM","6:00 PM"];
const PARK_COLORS=["#1e3a5f","#14532d","#4c1d95","#7c2d12","#164e63","#713f12","#881337","#134e4a"];

function GridBuilderView({gridCtx,setGridCtx,onSendToSchedule,events,evRosters}){
  const NAVY="#1e3a5f";
  const Btn=(bg,fg,x={})=>({padding:"5px 12px",background:bg,color:fg,border:"none",borderRadius:5,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",...x});
  const Inp={padding:"4px 7px",border:"1px solid #cbd5e1",borderRadius:5,fontSize:11,background:"#fff",color:"#0f172a"};
  const SLOT_ABBR={pool:"",selim:"SE",gold:"G",silver:"S",bronze:"B",blocked:"—",open:""};

  // ── State ──────────────────────────────────────────────
  const initParks=React.useMemo(()=>{
    if(gridCtx&&gridCtx.assignedParks&&gridCtx.assignedParks.length>0) return gridCtx.assignedParks;
    return [{id:"pk_1",name:"Complex 1",color:PARK_COLORS[0],fields:["Field 1","Field 2"]}];
  },[]);
  const [parks,setParks]=useState(initParks);
  const [activePkId,setActivePkId]=useState("pk_1");
  const [times,setTimes]=useState(DEFAULT_TIMES);
  const [grid,setGrid]=useState({SAT:{},SUN:{}});
  const [selCell,setSelCell]=useState(null);
  const [newField,setNewField]=useState("");
  const [showSummary,setShowSummary]=useState(false);
  const [divFilter,setDivFilter]=useState("");
  const [addTimeVal,setAddTimeVal]=useState("08:00");
  const [showTimeAdd,setShowTimeAdd]=useState(false);
  const [editingPkId,setEditingPkId]=useState(null);
  const [fillSrc,setFillSrc]=useState(null);   // {day,pkId,f,t,div,type} — fill-handle source cell
  const [fillOver,setFillOver]=useState(null);  // {day,pkId,f,t} — cell currently dragged over

  const pk=parks.find(p=>p.id===activePkId)||parks[0];

  function ck(pkId,f,t){return `${pkId}¦${f}¦${t}`;}
  function gc(d,pkId,f,t){return (grid[d]||{})[ck(pkId,f,t)]||{div:"",type:"open"};}
  function sc(d,pkId,f,t,upd){
    setGrid(prev=>{const dg={...(prev[d]||{})},key=ck(pkId,f,t),cur=dg[key]||{div:"",type:"open"};
      dg[key]={...cur,...upd};if(!dg[key].div&&dg[key].type==="open")delete dg[key];
      return{...prev,[d]:dg};});
    setSelCell(null);setDivFilter("");
  }

  function addComplex(){
    const id=`pk_${Date.now()}`,color=PARK_COLORS[parks.length%PARK_COLORS.length];
    setParks(p=>[...p,{id,name:`Complex ${parks.length+1}`,color,fields:["Field 1","Field 2"]}]);
    setActivePkId(id);setSelCell(null);
  }
  function delComplex(id){
    const rest=parks.filter(p=>p.id!==id);
    setParks(rest);if(activePkId===id)setActivePkId(rest[0]?.id||null);
  }
  function upd(id,u){setParks(p=>p.map(pk=>pk.id===id?{...pk,...u}:pk));}
  function addField(){if(!newField.trim()||!pk)return;upd(pk.id,{fields:[...pk.fields,newField.trim()]});setNewField("");}
  function delField(fi){if(!pk)return;upd(pk.id,{fields:pk.fields.filter((_,i)=>i!==fi)});}

  function t12(v){const[h,m]=v.split(":").map(Number),ap=h>=12?"PM":"AM",h12=h>12?h-12:h===0?12:h;return`${h12}:${m.toString().padStart(2,"0")} ${ap}`;}
  function tShort(s){// "8:00 AM" → "8am", "12:00 PM" → "12pm"
    const[t,ap]=s.split(" ");const[h]=t.split(":");return`${h}${ap.toLowerCase()}`;}
  function tMins(s){const[t,ap]=s.split(" ");const[h,m]=t.split(":").map(Number);return(h%12+(ap==="PM"?12:0))*60+m;}
  function addTime(){
    const lbl=t12(addTimeVal);
    if(!times.includes(lbl))setTimes(ts=>[...ts,lbl].sort((a,b)=>tMins(a)-tMins(b)));
    setShowTimeAdd(false);
  }
  function delTime(t){setTimes(ts=>ts.filter(x=>x!==t));}

  const divStats=React.useMemo(()=>{
    const c={};["SAT","SUN"].forEach(d=>Object.values(grid[d]||{}).forEach(v=>{if(v.div&&v.type!=="blocked"&&v.type!=="open")c[v.div]=(c[v.div]||0)+1;}));return c;
  },[grid]);

  const pkStats=React.useMemo(()=>{
    if(!pk)return{};const c={};
    ["SAT","SUN"].forEach(d=>pk.fields.forEach(f=>times.forEach(t=>{const v=(grid[d]||{})[ck(pk.id,f,t)];if(v?.div&&v.type!=="blocked"&&v.type!=="open")c[v.div]=(c[v.div]||0)+1;})));
    return c;
  },[pk,grid,times]);

  const _divPool=(gridCtx&&gridCtx.divisions&&gridCtx.divisions.length)?gridCtx.divisions:DIV_CODES;
  const filtDivs=divFilter?_divPool.filter(d=>d.toLowerCase().includes(divFilter.toLowerCase())):_divPool;

  if(parks.length===0) return(
    <div style={{padding:"60px 22px",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:12}}>🏟</div>
      <div style={{fontSize:18,fontWeight:900,color:NAVY,marginBottom:6}}>No complexes yet</div>
      <div style={{fontSize:13,color:"#64748b",marginBottom:20}}>Add your first complex to start planning divisions</div>
      <button onClick={addComplex} style={Btn("#2563eb","#fff",{fontSize:13,padding:"10px 28px"})}>+ Add Complex</button>
    </div>
  );

  return(
    <div style={{padding:"12px 16px",maxWidth:"100%"}}>

      {/* ══ Event selector (shown when arriving directly from sidebar with no context) ══ */}
      {!gridCtx&&events&&events.length>0&&(
        <div style={{background:"#fffbeb",border:"1px solid #fcd34d",borderRadius:8,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span style={{fontSize:13,fontWeight:700,color:"#92400e"}}>🗺 Select an event to build a grid for:</span>
          <select
            defaultValue=""
            onChange={e=>{
              const ev=(events||[]).find(ev=>String(ev.id)===e.target.value);
              if(!ev||!setGridCtx)return;
              const normalizedDivs=(ev.divisions||[]).map(normDiv);
              const divCounts={};
              normalizedDivs.forEach(d=>{
                const rk=String(ev.id)+"_"+d.id;
                const cnt=(evRosters&&evRosters[rk]||[]).length||d.numTeams||0;
                if(d.label)divCounts[d.label]=cnt;
              });
              const divLabels=normalizedDivs.map(d=>d.label).filter(Boolean);
              const totalTeams=Object.values(divCounts).reduce((s,c)=>s+c,0)||ev.numTeams||0;
              setGridCtx({evId:String(ev.id),evName:ev.name,divisions:divLabels,divCounts,totalTeams,assignedParks:null});
            }}
            style={{padding:"5px 10px",borderRadius:6,border:"1px solid #fcd34d",fontSize:13,background:"#fff",minWidth:220,cursor:"pointer"}}>
            <option value="">— Choose event —</option>
            {(events||[]).filter(ev=>ev.status!=="complete").map(ev=>(
              <option key={ev.id} value={String(ev.id)}>{ev.name}{ev.date?` (${ev.date})`:""}</option>
            ))}
          </select>
          <span style={{fontSize:11,color:"#78350f"}}>Or just use the grid freely — select an event later</span>
        </div>
      )}

      {/* ══ Event context banner + division roster ══ */}
      {gridCtx&&(
        <div style={{marginBottom:16}}>
          <div style={{background:"#dbeafe",border:"1px solid #93c5fd",borderRadius:"8px 8px 0 0",padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:13,fontWeight:700,color:"#1e40af"}}>
              🗺 Building grid for: <span style={{fontWeight:900}}>{gridCtx.evName}</span> · <span style={{fontWeight:900}}>{gridCtx.divisions?.length||0} divisions</span> · {gridCtx.totalTeams} teams
            </div>
            <button className="btn btn-secondary btn-sm" onClick={()=>setGridCtx&&setGridCtx(null)} style={{padding:"3px 12px",fontSize:11}}>✕ Clear</button>
          </div>
          {gridCtx.divCounts&&Object.keys(gridCtx.divCounts).length>0&&(
            <div style={{background:"#eff6ff",border:"1px solid #93c5fd",borderTop:"none",borderRadius:"0 0 8px 8px",padding:"10px 16px",display:"flex",flexWrap:"wrap",gap:6}}>
              {Object.entries(gridCtx.divCounts).sort((a,b)=>b[1]-a[1]).map(([lbl,cnt])=>{
                const dc=getDivColor(lbl);
                return(
                  <span key={lbl} style={{fontSize:11,fontWeight:800,padding:"3px 10px",borderRadius:14,
                    background:dc.bg,color:dc.text,border:`1.5px solid ${dc.border}`,whiteSpace:"nowrap"}}>
                    {lbl} <span style={{opacity:.7,fontWeight:600}}>· {cnt} teams</span>
                  </span>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ══ Header row ══ */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,flexWrap:"wrap"}}>
        <div>
          <span style={{fontSize:18,fontWeight:900,color:NAVY}}>🗺 Grid Builder</span>
          <span style={{fontSize:11,color:"#94a3b8",marginLeft:10}}>Click any cell to assign a division</span>
        </div>
        <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>setShowSummary(s=>!s)}
            style={Btn(showSummary?"#1e3a5f":"#f1f5f9",showSummary?"#fff":"#475569")}>
            📊 {showSummary?"Hide":"Summary"}
          </button>
          {onSendToSchedule&&(
            <button
              onClick={()=>{
                const fieldNames=[];
                parks.forEach(pk=>{pk.fields.forEach(f=>{fieldNames.push(parks.length>1?`${pk.name} - ${f}`:f);});});
                onSendToSchedule({parks,fieldNames,nf:fieldNames.length,gridState:grid,times,evName:gridCtx?.evName});
              }}
              style={Btn("#16a34a","#fff",{fontSize:12,padding:"6px 14px",boxShadow:"0 2px 8px rgba(22,163,74,.2)"})}>
              📅 Send to Schedule Builder →
            </button>
          )}
        </div>
      </div>

      {/* ══ Complex tabs ══ */}
      <div style={{display:"flex",alignItems:"stretch",gap:0,overflowX:"auto",
        borderBottom:`2px solid ${pk?.color||NAVY}`,marginBottom:0,userSelect:"none"}}>
        {parks.map(p=>{
          const isAct=p.id===activePkId;
          return(
            <div key={p.id}
              onClick={()=>{setActivePkId(p.id);setSelCell(null);setNewField("");setEditingPkId(null);}}
              style={{display:"flex",alignItems:"center",gap:5,padding:"7px 13px",
                cursor:"pointer",fontWeight:isAct?800:600,fontSize:12,whiteSpace:"nowrap",
                background:isAct?p.color:"#f8fafc",color:isAct?"#fff":"#475569",
                borderRadius:"7px 7px 0 0",border:isAct?`2px solid ${p.color}`:"2px solid #e2e8f0",
                borderBottom:isAct?"2px solid "+p.color:"2px solid #e2e8f0",
                marginRight:2,marginBottom:isAct?-2:0,transition:"all .12s",
                boxShadow:isAct?"0 -2px 8px rgba(0,0,0,.09)":"none"}}>

              {editingPkId===p.id?(
                /* ── Rename input — shows when pencil clicked ── */
                <input
                  autoFocus
                  value={p.name}
                  onClick={e=>e.stopPropagation()}
                  onChange={e=>upd(p.id,{name:e.target.value})}
                  onBlur={()=>setEditingPkId(null)}
                  onKeyDown={e=>{if(e.key==="Enter"||e.key==="Escape")setEditingPkId(null);}}
                  style={{border:"none",borderBottom:"2px solid rgba(255,255,255,.6)",
                    background:"rgba(255,255,255,.15)",color:"#fff",outline:"none",
                    fontSize:12,fontWeight:800,padding:"1px 4px",borderRadius:3,
                    width:Math.max(70,p.name.length*8),minWidth:70}}/>
              ):(
                /* ── Static name + pencil icon ── */
                <span style={{display:"flex",alignItems:"center",gap:4}}>
                  <span>{p.name}</span>
                  {isAct&&(
                    <span
                      onClick={e=>{e.stopPropagation();setEditingPkId(p.id);}}
                      title="Rename complex"
                      style={{fontSize:11,opacity:.7,cursor:"pointer",lineHeight:1,
                        padding:"1px 4px",borderRadius:3,
                        background:"rgba(255,255,255,.2)",
                        transition:"opacity .1s"}}
                    >✏️</span>
                  )}
                </span>
              )}

              <span style={{fontSize:10,opacity:.55,flexShrink:0,marginLeft:2}}>{p.fields.length}f</span>
              <span onClick={e=>{e.stopPropagation();delComplex(p.id);}}
                style={{opacity:.5,cursor:"pointer",fontSize:15,lineHeight:1,flexShrink:0,
                  padding:"0 2px"}}
                title="Remove complex">×</span>
            </div>
          );
        })}
        <button onClick={addComplex}
          style={{...Btn("#eff6ff","#2563eb"),borderRadius:"7px 7px 0 0",
            border:"2px dashed #93c5fd",borderBottom:"2px solid #e2e8f0",
            marginLeft:4,fontSize:11,padding:"7px 14px",alignSelf:"stretch"}}>
          + Complex
        </button>
      </div>

      {pk&&(
        <div style={{border:`2px solid ${pk.color}`,borderTop:"none",
          borderRadius:"0 0 8px 8px",overflow:"hidden",
          boxShadow:"0 3px 10px rgba(0,0,0,.06)"}}>

          {/* ── Field manager + time controls ── */}
          <div style={{background:"#f8fafc",borderBottom:"1px solid #e2e8f0",
            padding:"6px 12px",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>

            {/* Color dot */}
            <input type="color" value={pk.color} onChange={e=>upd(pk.id,{color:e.target.value})}
              title="Complex color"
              style={{width:22,height:22,padding:0,border:"none",borderRadius:"50%",cursor:"pointer",flexShrink:0}}/>

            <span style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",
              letterSpacing:.7,marginRight:2,flexShrink:0}}>Fields</span>

            {pk.fields.map((f,fi)=>(
              <span key={fi} style={{display:"inline-flex",alignItems:"center",gap:2,
                padding:"2px 8px",background:"#fff",border:`1.5px solid ${pk.color}60`,
                borderRadius:14,fontSize:10,fontWeight:700,color:pk.color,flexShrink:0}}>
                {f}
                <span onClick={()=>delField(fi)}
                  style={{cursor:"pointer",color:"#94a3b8",fontSize:11,lineHeight:1,marginLeft:1}}>×</span>
              </span>
            ))}

            <input value={newField} onChange={e=>setNewField(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&addField()}
              placeholder="Add field…"
              style={{...Inp,width:90,flexShrink:0}}/>
            <button onClick={addField} style={Btn(pk.color,"#fff",{padding:"3px 10px",flexShrink:0})}>+ Add</button>

            <div style={{width:1,height:20,background:"#e2e8f0",margin:"0 4px",flexShrink:0}}/>

            <span style={{fontSize:10,fontWeight:800,color:"#94a3b8",textTransform:"uppercase",
              letterSpacing:.7,flexShrink:0}}>Times</span>

            {times.map(t=>(
              <span key={t} style={{display:"inline-flex",alignItems:"center",gap:2,
                padding:"2px 7px",background:"#fff",border:"1px solid #bae6fd",
                borderRadius:12,fontSize:10,fontWeight:700,color:"#0284c7",flexShrink:0}}>
                {tShort(t)}
                <span onClick={()=>delTime(t)}
                  style={{cursor:"pointer",color:"#94a3b8",fontSize:11,lineHeight:1}}>×</span>
              </span>
            ))}

            {showTimeAdd?(
              <span style={{display:"inline-flex",alignItems:"center",gap:4,flexShrink:0}}>
                <input type="time" value={addTimeVal} onChange={e=>setAddTimeVal(e.target.value)}
                  style={{...Inp,width:88}}/>
                <button onClick={addTime} style={Btn("#0ea5e9","#fff",{padding:"3px 9px"})}>Add</button>
                <button onClick={()=>setShowTimeAdd(false)} style={Btn("#f1f5f9","#64748b",{padding:"3px 7px"})}>✕</button>
              </span>
            ):(
              <button onClick={()=>setShowTimeAdd(true)}
                style={Btn("#f0f9ff","#0284c7",{padding:"3px 10px",border:"1px dashed #7dd3fc",borderRadius:12,flexShrink:0})}>
                + Time
              </button>
            )}
          </div>

          {/* ── Division count strip for this complex ── */}
          {Object.keys(pkStats).length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:4,padding:"5px 12px",
              background:"#fafafa",borderBottom:"1px solid #f0f0f0"}}>
              <span style={{fontSize:9,fontWeight:800,color:"#94a3b8",alignSelf:"center",
                textTransform:"uppercase",letterSpacing:.7,marginRight:3}}>Totals:</span>
              {Object.entries(pkStats).sort((a,b)=>b[1]-a[1]).map(([div,cnt])=>{
                const dc=getDivColor(div);
                return(
                  <span key={div} style={{fontSize:10,fontWeight:800,padding:"1px 8px",
                    borderRadius:12,background:dc.bg,color:dc.text,border:`1px solid ${dc.border}`}}>
                    {div} <span style={{opacity:.6}}>×{cnt}</span>
                  </span>
                );
              })}
            </div>
          )}

          {/* ══ GRIDS: SAT then SUN stacked ══ */}
          {["SAT","SUN"].map(day=>(
            <div key={day}>
              {/* Day banner */}
              <div style={{background:day==="SAT"?"#1e3a5f":"#0f3460",color:"#fff",
                padding:"5px 12px",display:"flex",alignItems:"center",gap:8,
                borderTop:day==="SUN"?"3px solid #e2e8f0":"none"}}>
                <span style={{fontSize:13,fontWeight:900,letterSpacing:.5}}>
                  {day==="SAT"?"⛅ Saturday":"🌤 Sunday"}
                </span>
                <span style={{fontSize:10,opacity:.6,fontWeight:600}}>
                  — {pk.fields.length} field{pk.fields.length!==1?"s":""}, {times.length} time slot{times.length!==1?"s":""}
                </span>
              </div>
              <div style={{overflowX:"auto"}}>
                <table style={{borderCollapse:"collapse",tableLayout:"fixed"}}>
                  <colgroup>
                    <col style={{width:52}}/>
                    {pk.fields.map((_,i)=><col key={i} style={{width:72}}/>)}
                  </colgroup>
                  <thead>
                    <tr>
                      <th style={{background:pk.color,color:"rgba(255,255,255,.7)",fontSize:9,
                        fontWeight:700,textTransform:"uppercase",letterSpacing:.5,padding:"5px 4px",
                        textAlign:"center",position:"sticky",left:0,zIndex:3}}>
                        Time
                      </th>
                      {pk.fields.map((f,fi)=>(
                        <th key={fi} style={{background:pk.color,color:"#fff",fontSize:10,fontWeight:700,
                          padding:"5px 3px",textAlign:"center",whiteSpace:"nowrap",overflow:"hidden",
                          textOverflow:"ellipsis",maxWidth:72,borderLeft:"1px solid rgba(255,255,255,.15)"}}>
                          {f}
                        </th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {times.map((t,ti)=>(
                      <tr key={t} style={{background:ti%2===0?"#fff":"#fafcff"}}>
                        {/* Time cell */}
                        <td style={{padding:"0 4px",height:30,fontWeight:800,fontSize:11,color:"#334155",
                          borderBottom:"1px solid #edf0f4",borderRight:"2px solid #dde3ea",
                          textAlign:"center",whiteSpace:"nowrap",
                          position:"sticky",left:0,zIndex:1,
                          background:ti%2===0?"#f8fafc":"#f1f5f9"}}>
                          {tShort(t)}
                        </td>
                        {pk.fields.map((f,fi)=>{
                          const key=`${day}¦${ck(pk.id,f,t)}`;
                          const isSel=selCell===key;
                          const cell=gc(day,pk.id,f,t);
                          const st=SLOT_MAP[cell.type]||SLOT_MAP.open;
                          const dc=cell.div?getDivColor(cell.div):null;
                          const isBlk=cell.type==="blocked";
                          const isEmpty=!cell.div&&cell.type==="open";
                          const abbr=SLOT_ABBR[cell.type]||"";
                          const inFillRange=(()=>{if(!fillSrc||fillSrc.day!==day||fillSrc.pkId!==pk.id||fillSrc.f!==f)return false;if(!fillOver||fillOver.day!==day||fillOver.pkId!==pk.id||fillOver.f!==f)return false;const si=times.indexOf(fillSrc.t),di=times.indexOf(fillOver.t),ci=times.indexOf(t);if(si===-1||di===-1||ci===-1)return false;return ci>=Math.min(si,di)&&ci<=Math.max(si,di);})();
                          const bg=inFillRange?"#bbf7d0":isSel?"#dbeafe":isBlk?"#fecaca":dc?dc.bg:ti%2===0?"#fff":"#fafcff";
                          return(
                            <td key={fi}
                              onClick={()=>{if(fillSrc)return;setSelCell(isSel?null:key);if(!isSel)setDivFilter("");}}
                              onDragOver={e=>{if(fillSrc&&fillSrc.day===day&&fillSrc.pkId===pk.id&&fillSrc.f===f){e.preventDefault();e.stopPropagation();setFillOver({day,pkId:pk.id,f,t});}}}
                              onDrop={e=>{e.preventDefault();e.stopPropagation();if(!fillSrc||fillSrc.day!==day||fillSrc.pkId!==pk.id||fillSrc.f!==f){return;}const si=times.indexOf(fillSrc.t),di=times.indexOf(t);if(si===-1||di===-1){setFillSrc(null);setFillOver(null);return;}const[lo,hi]=si<=di?[si,di]:[di,si];setGrid(prev=>{const dg={...(prev[day]||{})};for(let i=lo;i<=hi;i++){dg[ck(fillSrc.pkId,fillSrc.f,times[i])]={div:fillSrc.div,type:fillSrc.type};}return{...prev,[day]:dg};});setFillSrc(null);setFillOver(null);}}
                              style={{borderLeft:"1px solid #e8ecf0",borderBottom:"1px solid #edf0f4",
                                padding:0,cursor:"pointer",background:bg,height:30,
                                outline:inFillRange?`2px solid #16a34a`:isSel?`2px solid ${pk.color}`:"none",outlineOffset:-1,
                                transition:"background .08s",position:"relative",
                                textAlign:"center",verticalAlign:"middle"}}>

                              {dc&&!isSel&&(
                                <div style={{position:"absolute",top:0,left:0,right:0,height:3,
                                  background:dc.border,borderRadius:0}}/>
                              )}

                              {isEmpty?(
                                <span style={{fontSize:9,color:isSel?pk.color:"#d1d5db",
                                  fontWeight:isSel?700:400}}>{isSel?"▾":"·"}</span>
                              ):isBlk?(
                                <span style={{fontSize:9,fontWeight:800,color:"#dc2626",
                                  letterSpacing:.3}}>BLK</span>
                              ):(

/* ════════════════════ SCHEDULE BUILDER (formerly Layout Builder) ════════════════════ */
function LayoutView({games:propGames,setGames,teams:propTeams,schedCtx,setSchedCtx,events,evRosters}){
  // Imported games/teams layers — local state, avoids parent-batching race condition
  const [xlGames,setXlGames]=useState([]);
  const [xlTeams,setXlTeams]=useState([]);
  // Merge: imported games replace prop games when present
  const games=React.useMemo(()=>xlGames.length?xlGames:propGames,[propGames,xlGames]);
  const teams=React.useMemo(()=>{
    if(schedCtx&&schedCtx.teams&&schedCtx.teams.length>0){
      if(!xlTeams.length)return schedCtx.teams;
      const existIds=new Set(schedCtx.teams.map(t=>t.id));
      return [...schedCtx.teams,...xlTeams.filter(t=>!existIds.has(t.id))];
    }
    // When an event is selected (schedCtx.evId set) but teams haven't loaded yet,
    // return empty array — do NOT fall through to propTeams (ALL_TEAMS demo data)
    if(schedCtx&&schedCtx.evId){
      return xlTeams.length?xlTeams:[];
    }
    if(!xlTeams.length)return propTeams;
    const existIds=new Set(propTeams.map(t=>t.id));
    return [...propTeams,...xlTeams.filter(t=>!existIds.has(t.id))];
  },[propTeams,xlTeams,schedCtx]);
  const fmtISO=d=>{const y=d.getFullYear(),m=(d.getMonth()+1).toString().padStart(2,'0'),dd=d.getDate().toString().padStart(2,'0');return`${y}-${m}-${dd}`;};
  const toMins=t=>{const[h,mn]=t.split(":").map(Number);return h*60+mn;};
  const toLabel=m=>{const h=Math.floor(m/60),mn=m%60,ap=h>=12?"PM":"AM",h12=h>12?h-12:h===0?12:h;return`${h12}:${mn.toString().padStart(2,"0")} ${ap}`;};
  const TIME_OPTS=["6:00 AM","6:30 AM","7:00 AM","7:30 AM","8:00 AM","8:30 AM","9:00 AM","9:30 AM","10:00 AM","10:30 AM","11:00 AM","11:30 AM","12:00 PM","12:30 PM","1:00 PM","1:30 PM","2:00 PM","2:30 PM","3:00 PM","3:30 PM","4:00 PM","4:30 PM","5:00 PM","5:30 PM","6:00 PM","6:30 PM","7:00 PM","7:30 PM","8:00 PM","8:30 PM","9:00 PM"];
  const FIELD_OPTS=["BR Field 1","BR Field 2","BR Field 3","BR Field 4","BR Field 5","BR Field 6","BR Field 7","LWR B1","LWR B2","LWR B3","LWR B4","LWR B5","LWR B6","Frank Brown F1","Frank Brown F2","Frank Brown F3","Frank Brown F4","Frank Brown F5","Field 1","Field 2","Field 3","Field 4","Field 5","Field 6","Field 7","Field 8","Diamond 1","Diamond 2","Diamond 3","Diamond 4","Turf 1","Turf 2","Turf 3","Main Field","Varsity","JV Field","East 1","East 2","West 1","West 2","North 1","North 2","South 1","South 2","Complex A","Complex B","Complex C","Showcase 1","Showcase 2","Championship","Stadium","Auxiliary","Practice 1","Practice 2","TBD"];
  // Per-field color palettes: [headerBg, headerBorder, cellTintEven, cellTintOdd, accentText, accentBorder]
  const FIELD_COLORS=[
    ["#1e3a5f","#16305a","#eff6ff","#e0f0ff","#1d4ed8","#93c5fd"],   // blue (F1)
    ["#14532d","#0f4024","#f0fdf4","#dcfce7","#15803d","#86efac"],   // green (F2)
    ["#4c1d95","#3b155f","#faf5ff","#ede9fe","#7c3aed","#c4b5fd"],   // purple (F3)
    ["#7c2d12","#6b1f0a","#fff7ed","#fed7aa","#c2410c","#fdba74"],   // orange (F4)
    ["#164e63","#0e3a4a","#ecfeff","#cffafe","#0e7490","#67e8f9"],   // cyan (F5)
    ["#713f12","#5a3009","#fefce8","#fef9c3","#a16207","#fde047"],   // yellow (F6)
    ["#881337","#6d0f2a","#fff1f2","#ffe4e6","#be123c","#fda4af"],   // rose (F7)
    ["#134e4a","#0c3a37","#f0fdfa","#ccfbf1","#0f766e","#5eead4"],   // teal (F8)
  ];
  function getFC(fi){return FIELD_COLORS[fi%FIELD_COLORS.length];}
  function makeRows(){
    const base=new Date();let n=1;const r=[];
    [{t:"2:30 PM",off:0},{t:"4:30 PM",off:0},{t:"6:30 PM",off:0}].forEach(({t,off})=>{const d=new Date(base);d.setDate(d.getDate()+off);r.push({id:`r${n}`,num:n++,date:fmtISO(d),time:t,cells:{}});});
    for(let i=1;i<=5;i++){const d=new Date(base);d.setDate(d.getDate()+i);r.push({id:`r${n}`,num:n++,date:fmtISO(d),time:"7:00 AM",cells:{}});}
    return r;
  }
  const [nf,setNf]=useState(()=>schedCtx?.fieldData?.nf||2);
  const [gl,setGl]=useState("60");
  const [d1Start,setD1Start]=useState("08:00");
  const [d1End,setD1End]=useState("19:00");
  const [remStart,setRemStart]=useState("07:00");
  const [remEnd,setRemEnd]=useState("19:00");
  const [evtStart,setEvtStart]=useState(new Date().toISOString().slice(0,10));
  const [evtEnd,setEvtEnd]=useState(new Date().toISOString().slice(0,10));
  const [startRow,setStartRow]=useState("1");
  const [timeVar,setTimeVar]=useState("5");
  const [timeAct,setTimeAct]=useState("increase");
  const [coverage,setCoverage]=useState("day_chosen");
  const [fieldNames,setFieldNames]=useState(()=>{
    if(schedCtx?.fieldData?.fieldNames&&schedCtx.fieldData.fieldNames.length>0){
      const base=Array.from({length:50},(_,i)=>FIELD_OPTS[i]||`Field ${i+1}`);
      schedCtx.fieldData.fieldNames.forEach((f,i)=>{base[i]=f;});
      return base;
    }
    return Array.from({length:50},(_,i)=>FIELD_OPTS[i]||`Field ${i+1}`);
  });
  const [rows,setRows]=useState(makeRows);
  const [picked,setPicked]=useState(null);
  const [showNames,setShowNames]=useState(true);
  const [showHomeAway,setShowHomeAway]=useState(false);
  const [teamPick,setTeamPick]=useState([]);
  const [gamePool,setGamePool]=useState("A");
  const [halfFill,setHalfFill]=useState(null); // {rowId,fi,t1Id} — cell waiting for 2nd team drag
  const [maxGames,setMaxGames]=useState(2);    // max pool play games per team
  const [dropAlert,setDropAlert]=useState(null); // {msg,type} for inline validation alert
  const [selAge,setSelAge]=useState(null);
  // Auto-select the first age group when teams arrive from event context
  useEffect(()=>{
    if(!teams||!teams.length)return;
    const ages=[...new Set(teams.map(t=>parseInt(t.cls)||0))].filter(Boolean).sort((a,b)=>a-b);
    if(ages.length)setSelAge(prev=>prev||ages[0]);
  },[teams]);
  const [selCell,setSelCell]=useState(null); // "rowId|fi" — selected grid cell for Block Selected
  const [gridBuiltMsg,setGridBuiltMsg]=useState(""); // toast after Build Grid
  const [fieldPickModal,setFieldPickModal]=useState(null); // {fi} — which field column is being renamed
  const [fieldPickSearch,setFieldPickSearch]=useState("");
  const [cellPickModal,setCellPickModal]=useState(null); // {rowId,fi,fieldLabel,step:1|2,t1Id}
  const [cellPickSearch,setCellPickSearch]=useState("");
  const [cellPickPos,setCellPickPos]=useState(null);    // {bottom,left} — autocomplete anchor
  const [fieldPageStart,setFieldPageStart]=useState(0);
  const FIELDS_PER_PAGE=5;

  const fields=fieldNames.slice(fieldPageStart,Math.min(fieldPageStart+FIELDS_PER_PAGE,nf));
  const assignedIds=new Set(rows.flatMap(r=>Object.values(r.cells)).filter(v=>v!=="blocked"));
  const unscheduled=games.filter(g=>!assignedIds.has(g.id));
  const pickedGame=picked?games.find(g=>g.id===picked):null;
  const dayGroups=[...new Set(rows.map(r=>r.date))].sort();

  // Fetch teams for an age group from the known_teams index (used when event teams not in KV)
  // Import teams for this event from a JSON paste (same contract as Director Tools import)
  const [schedNoTeamsMsg,setSchedNoTeamsMsg]=useState('');
  // Click a division pill → load that event's teams from KV then jump to that age
  async function loadDivisionTeams(divLabel){
    if(!schedCtx?.evId||!setSchedCtx)return;
    const age=parseInt(divLabel)||0;
    // Already have some teams? Just switch age tab
    if(teams&&teams.length){setSelAge(age);return;}
    setSchedCtx(prev=>prev?{...prev,loadingTeams:true}:null);
    setSchedNoTeamsMsg('');
    try{
      const r=await fetch('https://usssa-poller.chad-157.workers.dev/event-teams?event_id='+encodeURIComponent(schedCtx.usssaId||schedCtx.evId));
      const j=await r.json();
      if(j.status==='ok'&&j.teams&&j.teams.length){
        const evId=schedCtx.evId;
        const normalizedDivs=((schedCtx._divisions||[])).map(normDiv);
        // Build divCounts from fetched data
        const byDivLabel={};
        j.teams.forEach(t=>{const dl=(t.division||'').trim();if(!byDivLabel[dl])byDivLabel[dl]=[];byDivLabel[dl].push(t);});
        const newDivCounts={};
        Object.keys(schedCtx.divCounts||{}).forEach(lbl=>{newDivCounts[lbl]=(byDivLabel[lbl]||[]).length||schedCtx.divCounts[lbl]||0;});
        const appTeams=j.teams.map(t=>({
          id:'us_'+evId+'_'+(t.team_name||'').replace(/\W+/g,'_'),
          name:t.team_name||'',cls:t.division||'',city:t.team_city||'',
          state:t.team_state||'FL',coach:t.manager_name||'',
          email:t.manager_email||'',phone:t.manager_phone||'',
          entryStatus:t.entry_status||'Approved',payStatus:t.payment_status||'Not Paid'
        }));
        setSchedCtx(prev=>prev?{...prev,teams:appTeams,divCounts:newDivCounts,loadingTeams:false}:null);
        setSelAge(age);
      } else {
        setSchedCtx(prev=>prev?{...prev,loadingTeams:false}:null);
        setSchedNoTeamsMsg('No teams found for this event. Open it in Director Tools → Roster → Sync or Import first.');
      }
    }catch(e){
      setSchedCtx(prev=>prev?{...prev,loadingTeams:false}:null);
      setSchedNoTeamsMsg('Could not load teams: '+e.message);
    }
  }
  async function importSchedTeams(){
    setSchedImportErr('');
    let parsed;
    try{parsed=JSON.parse(schedImportText.trim());}catch(e){setSchedImportErr('Invalid JSON: '+e.message);return;}
    if(!Array.isArray(parsed)||!parsed.length){setSchedImportErr('Expected a JSON array of team objects.');return;}
    const first=parsed[0];
    if(!first.team_name&&!first.TeamName&&!first.name){setSchedImportErr('Each object needs a "team_name" field.');return;}
    const evId=schedCtx?.evId;
    if(!evId){setSchedImportErr('No event selected.');return;}
    const kvTeams=parsed.map(t=>({
      team_id:String(t.team_id||t.TeamID||t.id||''),
      team_name:t.team_name||t.TeamName||t.name||'',
      division:t.division||t.Division||t.cls||t.ClassName||'',
      team_city:t.team_city||t.City||t.city||'',
      team_state:t.team_state||t.State||t.state||'FL',
      manager_name:t.manager_name||t.ManagerName||t.manager||t.coach||'',
      manager_email:t.manager_email||t.ManagerEmail||t.email||'',
      manager_phone:t.manager_phone||t.ManagerPhone||t.phone||'',
      entry_status:t.entry_status||t.EntryStatus||'Approved',
      payment_status:t.payment_status||t.PaymentStatus||'Not Paid'
    }));
    try{
      await fetch('https://usssa-poller.chad-157.workers.dev/event-teams/seed',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event_id:evId,teams:kvTeams})});
      const appTeams=kvTeams.map(t=>({
        id:'imp_'+evId+'_'+(t.team_name||'').replace(/\W+/g,'_'),
        name:t.team_name,cls:t.division,city:t.team_city,state:t.team_state,
        coach:t.manager_name,email:t.manager_email,phone:t.manager_phone,
        entryStatus:t.entry_status,payStatus:t.payment_status
      }));
      const newDivCounts={};
      appTeams.forEach(t=>{if(t.cls)newDivCounts[t.cls]=(newDivCounts[t.cls]||0)+1;});
      setSchedCtx(prev=>prev?{...prev,teams:appTeams,divCounts:Object.keys(newDivCounts).length?newDivCounts:prev.divCounts,loadingTeams:false}:null);
      setShowSchedImport(false);setSchedImportText('');
    }catch(e){setSchedImportErr('Import failed: '+e.message);}
  }

  /* ══ Auto-Schedule ══════════════════════════════════════════ */
  const [autoModal,setAutoModal]=useState(false);
  const [autoRules,setAutoRules]=useState({noRematch:true,noConsecBreak:true,balanceFields:true,allowOverride:false});
  const [autoResult,setAutoResult]=useState(null);

  function autoScheduleGames(){
    // 1 — Group teams by division (cls)
    const divGroups={};
    teams.forEach(t=>{
      const key=t.cls||t.division||'General';
      if(!divGroups[key])divGroups[key]=[];
      divGroups[key].push(t.id);
    });

    // 2 — Generate round-robin matchups per division
    const allMatchups=[]; // [{t1,t2,div}]
    Object.entries(divGroups).forEach(([div,tIds])=>{
      if(tIds.length<2)return;
      const arr=[...tIds];
      if(arr.length%2===1)arr.push(null); // bye slot for odd teams
      const numRounds=arr.length-1;
      const half=arr.length/2;
      const rot=[...arr];
      for(let r=0;r<numRounds;r++){
        for(let i=0;i<half;i++){
          const t1=rot[i],t2=rot[rot.length-1-i];
          if(t1&&t2)allMatchups.push({t1,t2,div});
        }
        // Rotate: keep index 0 fixed, rotate [1..end]
        rot.splice(1,0,rot.pop());
      }
    });

    // 3 — Build available slots sorted by date→time→field
    const slots=[];
    rows.forEach(row=>{
      for(let fi=0;fi<nf;fi++){
        const v=row.cells[fi];
        if(!v||v==='blocked') slots.push({rowId:row.id,fi,date:row.date,time:row.time,taken:false});
      }
    });
    // Sort: pack games into earliest slots first, then by field
    slots.sort((a,b)=>{
      if(a.date!==b.date)return a.date<b.date?-1:1;
      if(a.time!==b.time)return a.time<b.time?-1:1;
      return a.fi-b.fi;
    });
    // Optionally shuffle field order within each time slot for balance
    if(autoRules.balanceFields){
      const timeKeys=[...new Set(slots.map(s=>`${s.date}|${s.time}`))];
      timeKeys.forEach(tk=>{
        const [d,t]=tk.split('|');
        const idxs=slots.reduce((acc,s,i)=>s.date===d&&s.time===t?[...acc,i]:acc,[]);
        // shuffle within this time slot
        for(let i=idxs.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const tmp=slots[idxs[i]].fi;slots[idxs[i]].fi=slots[idxs[j]].fi;slots[idxs[j]].fi=tmp;}
      });
    }

    // 4 — Assign matchups to slots (greedy)
    const teamBusy={};       // rowId → Set of team IDs busy in that slot
    const pairPlayed={};     // "t1|t2" → count of times played
    const teamSchedule={};   // teamId → [rowId] list of slots they play in
    const newGames=[];
    const updatedCells={};
    let gNum=xlGames.length+games.filter(g=>!xlGames.find(x=>x.id===g.id)).length+1;
    const failed=[];

    allMatchups.forEach(({t1,t2,div})=>{
      const pairKey=[t1,t2].sort().join('|');
      // Check rematch rule
      if(autoRules.noRematch&&(pairPlayed[pairKey]||0)>0){failed.push({t1,t2,div,reason:'rematch'});return;}

      let placed=false;
      for(const slot of slots){
        if(slot.taken)continue;
        const busy=teamBusy[slot.rowId]||new Set();
        if(busy.has(t1)||busy.has(t2))continue;

        // Check consecutive-break rule: if a team already has >1 consecutive unplayed rows, prefer not adding another
        if(autoRules.noConsecBreak){
          const t1sched=teamSchedule[t1]||[];
          const t2sched=teamSchedule[t2]||[];
          // Get row index for this slot
          const rowIdx=rows.findIndex(r=>r.id===slot.rowId);
          // Count consecutive rows skipped before this one for each team
          const countSkips=(sched)=>{
            let skips=0;
            for(let ri=rowIdx-1;ri>=0;ri--){
              if(sched.includes(rows[ri].id))break;
              skips++;
            }
            return skips;
          };
          if(t1sched.length>0&&countSkips(t1sched)>1)continue;
          if(t2sched.length>0&&countSkips(t2sched)>1)continue;
        }

        // Place the game
        const gameId=`ga_${gNum}`;
        newGames.push({id:gameId,num:`G${gNum}`,pool:'A',division:div,
          date:slot.date,time:slot.time,field:fieldNames[slot.fi],
          t1,t2,s1:null,s2:null,status:'scheduled'});
        if(!updatedCells[slot.rowId])updatedCells[slot.rowId]={};
        updatedCells[slot.rowId][slot.fi]=gameId;
        if(!teamBusy[slot.rowId])teamBusy[slot.rowId]=new Set();
        teamBusy[slot.rowId].add(t1);teamBusy[slot.rowId].add(t2);
        pairPlayed[pairKey]=(pairPlayed[pairKey]||0)+1;
        if(!teamSchedule[t1])teamSchedule[t1]=[];teamSchedule[t1].push(slot.rowId);
        if(!teamSchedule[t2])teamSchedule[t2]=[];teamSchedule[t2].push(slot.rowId);
        slot.taken=true;gNum++;placed=true;break;
      }
      if(!placed)failed.push({t1,t2,div,reason:'no_slot'});
    });

    // 5 — Apply state
    const newRows=rows.map(r=>updatedCells[r.id]?{...r,cells:{...r.cells,...updatedCells[r.id]}}:r);
    setXlGames(prev=>[...prev,...newGames]);
    setRows(newRows);
    setShowNames(true);
    setAutoResult({placed:newGames.length,failed:failed.length,failedList:failed,
      days:[...new Set(newGames.map(g=>g.date))].length});
  }

  /* ══ Excel Import ══════════════════════════════════════════ */
  const [xlImport,setXlImport]=useState({status:'idle',msg:'',counts:null});

  function xlTimeToLabel(val){
    // SheetJS raw time = decimal fraction of a day (e.g. 0.333... = 8:00 AM)
    if(typeof val!=='number')return String(val);
    const totalMins=Math.round(val*24*60);
    const h=Math.floor(totalMins/60), m=totalMins%60;
    const ap=h>=12?'PM':'AM', h12=h>12?h-12:h===0?12:h;
    return `${h12}:${m.toString().padStart(2,'0')} ${ap}`;
  }
  function xlTimeMins(val){
    if(typeof val!=='number')return 0;
    return Math.round(val*24*60);
  }

  function importExcelFile(file){
    if(!file)return;
    if(typeof XLSX==='undefined'){alert('SheetJS not loaded – please refresh.');return;}
    setXlImport({status:'loading',msg:'Reading file…',counts:null});
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array',cellDates:false});
        // Detect file type: Grid (has division codes) vs Schedule (has "vs" matchups)
        const firstSheet=wb.Sheets[wb.SheetNames[0]];
        const sample=XLSX.utils.sheet_to_json(firstSheet,{header:1,defval:null,raw:false}).flat().filter(Boolean).join(' ');
        const isSchedule=/ vs\.? /i.test(sample);
        if(isSchedule) parseScheduleWorkbook(wb);
        else parseGridWorkbook(wb);
      }catch(err){
        setXlImport({status:'error',msg:'Error reading file: '+err.message,counts:null});
      }
    };
    reader.readAsArrayBuffer(file);
  }

  function parseScheduleWorkbook(wb){
    const teamMapObj={};
    const newTeams=[];
    const newGames=[];
    const newRows=[];
    const newFieldNames=[];
    let gameNum=1, rowNum=1;

    function getOrMakeTeam(name){
      const key=name.trim().toLowerCase();
      if(!teamMapObj[key]){
        const id=`t_xl_${Date.now()}_${newTeams.length}`;
        teamMapObj[key]=id;
        newTeams.push({id,name:name.trim(),division:'',pool:'A',seed:null});
      }
      return teamMapObj[key];
    }
    function getOrRegField(fn){
      const f=fn.trim();
      let idx=newFieldNames.indexOf(f);
      if(idx===-1){idx=newFieldNames.length;newFieldNames.push(f);}
      return idx;
    }
    function parseMatchup(str){
      if(!str||typeof str!=='string')return null;
      // Handle: "A vs B", "A vs. B", "A v.s B", "A vs, B", "A v B", "A VS B"
      const m=str.match(/^(.+?)\s+v(?:s\.?|\.s\.?|s,)\s*(.+)$/i)||str.match(/^(.+?)\s+v\s+(.+)$/i);
      return m?[m[1].trim(),m[2].trim()]:null;
    }

    // Determine SAT/SUN → calendar dates
    const satDate=evtStart;
    const sunDate=evtEnd;

    for(const sheetName of wb.SheetNames){
      if(sheetName.toLowerCase()==='requests')continue;
      // Derive short age-group label from sheet name: "9u-12u Pool Play" → "9u-12u"
      const ageLabel=sheetName.replace(/\s*(pool\s*play|bracket|schedule)\s*/gi,'').trim()||sheetName;
      const sheet=wb.Sheets[sheetName];
      const data=XLSX.utils.sheet_to_json(sheet,{header:1,defval:null,raw:true});
      let curDay=null, sectionFields=[];

      for(const row of data){
        if(!row||!row.length)continue;
        const first=row[0];

        // Section header: "SAT" or "SUN"
        if(first==='SAT'||first==='SUN'){
          curDay=first;
          sectionFields=[];
          for(let ci=1;ci<row.length;ci++){
            const fn=row[ci];
            if(fn&&typeof fn==='string'&&fn.trim()){
              sectionFields.push({name:fn.trim(),ci,gIdx:getOrRegField(fn.trim())});
            }
          }
          continue;
        }

        // Time row: numeric < 1 = Excel time fraction
        if(typeof first==='number'&&first>0&&first<1&&curDay){
          const timeStr=xlTimeToLabel(first);
          const timeMins=xlTimeMins(first);
          const dateStr=curDay==='SAT'?satDate:sunDate;

          let gridRow=newRows.find(r=>r.date===dateStr&&r.time===timeStr);
          if(!gridRow){
            gridRow={id:`r_xl_${rowNum}`,num:rowNum++,date:dateStr,time:timeStr,_mins:timeMins,cells:{}};
            newRows.push(gridRow);
          }

          for(const {name,ci,gIdx} of sectionFields){
            const cell=row[ci];
            if(!cell)continue;
            const parsed=parseMatchup(String(cell));
            if(!parsed)continue;
            const [t1n,t2n]=parsed;
            const t1id=getOrMakeTeam(t1n), t2id=getOrMakeTeam(t2n);
            const gameId=`g_xl_${gameNum}`;
            newGames.push({id:gameId,num:`G${gameNum}`,pool:'A',division:ageLabel,date:dateStr,time:timeStr,field:name,
              t1:t1id,t2:t2id,s1:null,s2:null,status:'scheduled'});
            gameNum++;
            gridRow.cells[gIdx]=gameId;
          }
        }
      }
    }

    // Sort rows: by date then time (minutes)
    newRows.sort((a,b)=>a.date!==b.date?(a.date<b.date?-1:1):a._mins-b._mins);
    newRows.forEach((r,i)=>{r.num=i+1;delete r._mins;});

    if(!newGames.length){
      setXlImport({status:'error',msg:'No game matchups found. Make sure this is the Schedule file.',counts:null});
      return;
    }
    // Apply all state locally — keeps games/rows/fields in one batch, no parent re-render race
    setXlTeams(newTeams);
    setXlGames(newGames);
    setRows(newRows);
    setFieldNames(prev=>{const n=[...prev];newFieldNames.forEach((f,i)=>{n[i]=f;});return n;});
    setNf(newFieldNames.length);
    setShowNames(true); // auto-enable team names so matchups are visible
    setXlImport({status:'done',msg:`✅ Imported ${newGames.length} games across ${newFieldNames.length} fields (${newRows.length} time slots)`,counts:{games:newGames.length,teams:newTeams.length,fields:newFieldNames.length,rows:newRows.length}});
  }

  function parseGridWorkbook(wb){
    // Grid file: set up fields and time-slot rows from division assignment sheet
    const newFieldNames=[];
    const newRows=[];
    let rowNum=1;
    const satDate=evtStart, sunDate=evtEnd;

    function getOrRegField(fn){
      const f=fn.trim();
      let idx=newFieldNames.indexOf(f);
      if(idx===-1){idx=newFieldNames.length;newFieldNames.push(f);}
      return idx;
    }

    for(const sheetName of wb.SheetNames){
      const sheet=wb.Sheets[sheetName];
      const data=XLSX.utils.sheet_to_json(sheet,{header:1,defval:null,raw:true});
      let curDay=null, sectionFields=[];

      for(const row of data){
        if(!row||!row.length)continue;
        const first=row[0];
        if(first==='Sat'||first==='SAT'){curDay='SAT';sectionFields=[];
          for(let ci=1;ci<row.length;ci++){const fn=row[ci];if(fn&&typeof fn==='string'&&fn.trim()&&fn!=='Sat'&&fn!=='Sun')sectionFields.push({name:fn.trim(),ci,gIdx:getOrRegField(fn.trim())});}
          continue;}
        if(first==='Sun'||first==='SUN'){curDay='SUN';sectionFields=[];
          for(let ci=1;ci<row.length;ci++){const fn=row[ci];if(fn&&typeof fn==='string'&&fn.trim()&&fn!=='Sat'&&fn!=='Sun')sectionFields.push({name:fn.trim(),ci,gIdx:getOrRegField(fn.trim())});}
          continue;}
        if(typeof first==='number'&&first>0&&first<1&&curDay){
          const timeStr=xlTimeToLabel(first);
          const timeMins=xlTimeMins(first);
          const dateStr=curDay==='SAT'?satDate:sunDate;
          let gridRow=newRows.find(r=>r.date===dateStr&&r.time===timeStr);
          if(!gridRow){gridRow={id:`r_xl_${rowNum}`,num:rowNum++,date:dateStr,time:timeStr,_mins:timeMins,cells:{}};newRows.push(gridRow);}
        }
      }
    }
    newRows.sort((a,b)=>a.date!==b.date?(a.date<b.date?-1:1):a._mins-b._mins);
    newRows.forEach((r,i)=>{r.num=i+1;delete r._mins;});
    if(!newRows.length){setXlImport({status:'error',msg:'No time slots found in Grid file.',counts:null});return;}
    setRows(newRows);
    setFieldNames(prev=>{const n=[...prev];newFieldNames.forEach((f,i)=>{n[i]=f;});return n;});
    setNf(newFieldNames.length);
    setXlImport({status:'done',msg:'Grid imported — fields and time slots set up.',counts:{fields:newFieldNames.length,rows:newRows.length}});
  }

  function submitFieldData(){
    const len=parseInt(gl);
    // Build one slot row per game time per event day
    const days=[];
    const s=new Date(evtStart+'T12:00:00');
    const e=new Date(evtEnd+'T12:00:00');
    if(isNaN(s)||isNaN(e)){alert("Please set valid Event Start and End dates.");return;}
    for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1)) days.push(fmtISO(new Date(d)));
    if(!days.length)days.push(fmtISO(new Date()));
    const r=[];let n=1;
    days.forEach((date,di)=>{
      let cur=toMins(di===0?d1Start:remStart),endMin=toMins(di===0?d1End:remEnd);
      while(cur<=endMin){r.push({id:`r_${Date.now()}_${n}`,num:n++,date,time:toLabel(cur),cells:{}});cur+=len;}
    });
    setRows(r);
    const totalSlots=r.length;
    const dayCount=days.length;
    setGridBuiltMsg(`✅ Grid built — ${totalSlots} time slot${totalSlots!==1?"s":""} across ${dayCount} day${dayCount!==1?"s":""}`);
    setTimeout(()=>setGridBuiltMsg(""),5000);
  }
  function setResetTimes(){
    const len=parseInt(gl);
    const byDate={};rows.forEach(r=>{if(!byDate[r.date])byDate[r.date]=[];byDate[r.date].push(r.id);});
    const dates=Object.keys(byDate).sort();
    const nr=[...rows];
    dates.forEach((date,di)=>{
      let cur=toMins(di===0?d1Start:remStart),end=toMins(di===0?d1End:remEnd);
      byDate[date].forEach(id=>{const idx=nr.findIndex(r=>r.id===id);if(idx>=0){nr[idx]={...nr[idx],time:toLabel(cur)};cur+=len;}});
    });
    setRows(nr);
  }
  function blockDay(date){setRows(prev=>prev.map(r=>{if(r.date!==date)return r;const c={};for(let i=0;i<nf;i++)c[i]="blocked";return{...r,cells:c};}));}
  function clearAllBlocked(){setRows(prev=>prev.map(r=>{const c={...r.cells};Object.keys(c).forEach(k=>{if(c[k]==="blocked")delete c[k];});return{...r,cells:c};}));}
  function clearGameCells(){setRows(prev=>prev.map(r=>{const c={...r.cells};Object.keys(c).forEach(k=>{if(c[k]!=="blocked")delete c[k];});return{...r,cells:c};}));}
  function autoSchedule(){
    let i=0;const toPlace=[...unscheduled];
    setRows(prev=>{
      const nr=prev.map(r=>({...r,cells:{...r.cells}}));
      outer:for(let ri=0;ri<nr.length;ri++){for(let fi=0;fi<nf;fi++){if(!nr[ri].cells[fi]&&i<toPlace.length){nr[ri].cells[fi]=toPlace[i].id;i++;}if(i>=toPlace.length)break outer;}}
      return nr;
    });
  }
  function addRow(){
    const last=rows[rows.length-1];
    setRows(prev=>[...prev,{id:`r_${Date.now()}`,num:prev.length+1,date:last?.date||fmtISO(new Date()),time:"7:00 AM",cells:{}}]);
  }
  function delRow(id){setRows(prev=>prev.filter(r=>r.id!==id).map((r,i)=>({...r,num:i+1})));}
  function updRow(id,k,v){setRows(prev=>prev.map(r=>r.id===id?{...r,[k]:v}:r));}
  function clickCell(rowId,fi){
    const row=rows.find(r=>r.id===rowId);const cur=row?.cells[fi];
    // Moving a picked-up game (from the ↩ icon)
    if(picked){
      if(!cur||cur==="blocked"){
        setRows(prev=>prev.map(r=>r.id===rowId?{...r,cells:{...r.cells,[fi]:picked}}:r));
        setGames(prev=>prev.map(g=>g.id===picked?{...g,time:row?.time,field:fieldNames[fi],date:row?.date}:g));
        setPicked(null);
      }else if(cur!=="blocked"){
        setRows(prev=>prev.map(r=>r.id===rowId?{...r,cells:{...r.cells,[fi]:picked}}:r));
        setGames(prev=>prev.map(g=>g.id===picked?{...g,time:row?.time,field:fieldNames[fi],date:row?.date}:g));
        setPicked(cur);
      }
      return;
    }
    // Toggle block on empty cells; cancel halfFill on that cell if set
    if(!cur){
      if(halfFill&&halfFill.rowId===rowId&&halfFill.fi===fi){setHalfFill(null);return;}
      setRows(prev=>prev.map(r=>r.id===rowId?{...r,cells:{...r.cells,[fi]:"blocked"}}:r));
    }
    else if(cur==="blocked"){setRows(prev=>prev.map(r=>{if(r.id!==rowId)return r;const c={...r.cells};delete c[fi];return{...r,cells:c};}));}
  }

  /* ── Drop Validation ─────────────────────────────────────────── */
  function validateDrop(teamId,targetRowId){
    const errs=[];
    // Count how many placed games this team already has
    const placed=rows.flatMap(r=>Object.values(r.cells))
      .filter(v=>v&&v!=="blocked")
      .filter(v=>{const g=games.find(g2=>g2.id===v);return g&&(g.t1===teamId||g.t2===teamId);});
    if(placed.length>=maxGames){
      const tn=teams.find(t=>t.id===teamId)?.name||"Team";
      errs.push(`${tn} already has ${placed.length} of ${maxGames} allowed pool play game${maxGames!==1?"s":""}.`);
    }
    // Check same time slot (any cell in the same row)
    const targetRow=rows.find(r=>r.id===targetRowId);
    if(targetRow){
      const conflict=Object.values(targetRow.cells).some(v=>{
        if(!v||v==="blocked")return false;
        const g=games.find(g2=>g2.id===v);
        return g&&(g.t1===teamId||g.t2===teamId);
      });
      if(conflict){
        const tn=teams.find(t=>t.id===teamId)?.name||"Team";
        errs.push(`${tn} already has a game at ${targetRow.time} on ${targetRow.date}.`);
      }
    }
    return errs;
  }
  function showDropAlert(msgs){
    setDropAlert(msgs);
    setTimeout(()=>setDropAlert(null),5000);
  }
